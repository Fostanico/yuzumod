l_simp_chinese:
#芳乃工业决议决议部分：
 yz_economy_department_category_close: "关闭经济决议组（你可以在核心圈决议组重新开启）"
 show_yuzu_economy_department: "显示柚子经济局"
 Yoshino_industry_five_year_yes_by_loan: "发行债券启动芳乃穗织振兴计划（试做版，内容为测试内容，目前可玩）"
 Yoshino_industry_five_year_yes_by_loan_desc: "如果我们并没有足够的工厂来启动穗织民族伟大复兴，我们也可以可以选择其他方式————发行债券来启动芳乃的伟大计划，而且我们的工业计划的效果会增强，但是会大幅提高柚子币花费。\n§R债务是要还的§!，§C但是我们的回报会远大于我们从支出，同时我们会在完成工业化后解锁一系列中长期投资决议§!（工厂足够也可以选择这种方式）\n开发者提示：因为这个内容的开发者因为身体原因无法继续开发，所以现在的是半成品，但是可以左脚踩右脚升天，所以我们还是保留下来了"
 bond_we_issuing_tooltip: "我们获得£GFX_yz_money §Y4000§!的债券"
 Yoshino_industry_540days_by_loan: "芳乃的穗织振兴计划"
 Yoshino_industry_540days_by_loan_desc: "尽管芳乃的穗织振兴计划为我国工业化发展绘制出了一个美好的前景，但是债券的发行以及芳乃本身在国内的支持率并不高，除非芳乃小姐可以在2年内拿出成绩，不然她很难继续在建设部门中任职了。\n§R同时，我们发行的债券也是不可忽视的§!"
 
 yuzu_auto_industrialization: "自动化工业投资"
 yuzu_auto_industrialization_desc: "芳乃同志决定在工业领域开展一项投资计划。（如果我们柚子币不足投资计划会自动停止）"
 Yoshino_industry_five_year_industrial_complex_by_bonds_1: "一阶段工业投资"
 Yoshino_industry_five_year_industrial_complex_by_bonds_1_desc: "我们国家的工业基础薄弱，芳乃同志决定就几个重点领域进行投资。"
 Yoshino_industry_five_year_industrial_complex_by_bonds_2: "二阶段工业投资"
 Yoshino_industry_five_year_industrial_complex_by_bonds_2_desc: "在对一个重点领域进行投资之后，芳乃同志决定把目光放在更长远的地方上。"
 Yoshino_industry_five_year_industrial_complex_by_bonds_3: "三阶段工业投资"
 Yoshino_industry_five_year_industrial_complex_by_bonds_3_desc: "我们如今已经建立了足够的工业基础，芳乃同志将把资源放在我国工业的方方面面。"
 yuzu_auto_infrastructurlization: "自动完成基础建设投资"
 Yoshino_industry_five_year_infrastructure_by_bonds_1: "一阶段基础建设投资"
 Yoshino_industry_five_year_infrastructure_by_bonds_1_desc: "我国的基础建设就如绫濑的欧派一样贫瘠，芳乃同志决定在几个重点地区开展基础设施投资。"
 Yoshino_industry_five_year_infrastructure_by_bonds_2: "二阶段基础建设投资"
 Yoshino_industry_five_year_infrastructure_by_bonds_2_desc: "在对重点地区进行投资后，我们要把目光投向更广大的地区。"
 Yoshino_industry_five_year_infrastructure_by_bonds_3: "三阶段基础建设投资"
 Yoshino_industry_five_year_infrastructure_by_bonds_3_desc: "我们的目光不能局限于目前的地区，我们要对更多的地区进行投资。"
 yuzu_auto_state_category: "自动地区建设投资"
 yuzu_auto_state_category_desc: "如今我国很多地区还处于落后当中，我们可以对一些地区进行投资，帮助这些地区的发展，并作为模范地区"
 Yoshino_industry_five_year_state_category_by_bonds_1: "一阶段地区建设投资"
 Yoshino_industry_five_year_state_category_by_bonds_1_desc: "芳乃同志已经选定了第一阶段的投资地区，我们会把这里建设成芳乃示范区。"
 Yoshino_industry_five_year_state_category_by_bonds_2: "二阶段地区建设投资"
 Yoshino_industry_five_year_state_category_by_bonds_2_desc: "在一阶段的投资之后，全国人民都认识到了芳乃投资的正确，我们可以在更多的地区推进投资。"
 Yoshino_industry_five_year_state_category_by_bonds_3: "三阶段地区建设投资"
 Yoshino_industry_five_year_state_category_by_bonds_3_desc: "在两轮投资之后，我们许多地区的人民生活有了巨大的提高，我们要给其他人民也带来生活上的巨大进步。"
 yuzu_auto_others: "自动化进行其他投资"
 yuzu_auto_others_desc: "我国在其他领域内的基础通用薄弱，芳乃觉得在其他领域也得进行投资"
 Yoshino_industry_five_year_3_by_bonds: "投资钢铁产业"
 Yoshino_industry_five_year_3_by_bonds_desc: "我国的钢铁产业相比于其他大国而言简直可以直接忽略，芳乃决定对我们目前已经勘探好的富矿区进行开采，最终实现属于我们的“赶英超美”。"
 Yoshino_industry_five_year_4_by_bonds: "产业发展投资"
 Yoshino_industry_five_year_4_by_bonds_desc: "我国的生产线科技仍然不够发达，我们必须在这些领域进行投资，实现我国工业的协调发展。"
 Yoshino_industry_five_year_5_by_bonds: "投资工农业协同发展"
 Yoshino_industry_five_year_5_by_bonds_desc: "我国的工业与农业之前任然存在不平衡，人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾已经开始逐渐激化，芳乃决定在工农重点产业进行投资。"
 Yoshino_industry_five_year_20_by_bonds: "投资农业机械化"
 Yoshino_industry_five_year_20_by_bonds_desc: "在实现了我国农业的迅猛发展之后，我们需要把投资我国的农业机械化进程，实现我国农业的高质量发展。" 
 #经济决议：
 yuzu_economy_department_category: "柚子经济部"
 yuzu_economy_department_category_desc: "[yz_economy_department_category_describe]"
 we_dont_start_yz_invest: "我们选择了以债券投资的方式启动了我们的工业化项目，现在我们运营着我们国家的债券，如果我们操作得当的话债券是绝对有利于我们的，§R前提是我们操作得当§! \n\n当前我们的周利息为[?yz_interest_rate_we_can_see|.3+Y]§G%§!，需要偿还的柚子币£GFX_yz_money：[?bond_we_need_to_repay|.0+Y]"
 we_now_start_yoshino_industry_long_term_invest: "我们选择了以债券投资的方式启动了我们的工业化项目，现在我们运营着我们的芳乃ciallo券，如果我们操作得当的话债券是绝对有利于我们的，芳乃同志的投资计划也是绝对利国利民的，§R前提是我们操作得当§! \n\n当前我们的周利息为[?yz_interest_rate_we_can_see|.3+Y]§G%§!，需要偿还的柚子币£GFX_yz_money：[?bond_we_need_to_repay|.0+Y] \n\n我们现在正在进行芳乃的投资计划，目前我们每月的额外柚子币消耗为£GFX_yz_money [?basic_additional_yz_money_spend|.0+Y]" 
 Yoshino_industry_debt_cycle: "债务周期"
 Yoshino_industry_debt_cycle_desc: "我们正在发行芳乃穗织券。每周我们的债务以及周利息都会增加。"
 we_need_to_make_choice_about_yz_bonds: "§R我们需要在债务上做出选择§!"
 Expanding_debt_issuance_first_time: "初步扩大债券发行"
 Expanding_debt_issuance_first_time_desc: "如果我们的柚子币不足以支持我们的投资的话，我们可以扩大债券的发行，但是，这样势必会导致我们债券利率的提高。"
 expend_debt_issuance_first: "我们获得£GFX_yz_money §Y3500§!的债券"
 bond_we_need_to_repay_add_tooltip: "我们需要偿还的金额增加£GFX_yz_money §R$RIGHT|R0$§!"
 add_interest_rate_tooltip: "周利率增加$RIGHT|R3$%"
 yz_debt_collapse: "债务崩溃"
 Expanding_debt_issuance_second_time: "第二次扩大债券发行"
 Expanding_debt_issuance_second_time_desc: "如果我们的柚子币还是不足以支持我们的投资，我们可以进一步扩大债券的发行，但是，我们的利率会更大幅度地提高。"
 expend_debt_issuance_second: "我们获得£GFX_yz_money §Y3000§!的债券"
 Expanding_debt_issuance_third_time: "第三次扩大债券发行"
 Expanding_debt_issuance_third_time_desc: "看来两次的债券发行都无法满足我们的需求，我们可以再次发行债券，但是，我们的利率将会有显著的提升。"
 expend_debt_issuance_third: "我们获得£GFX_yz_money §Y3000§!的债券"
 Expanding_debt_issuance_after_third_time: "额外债券发行"
 Expanding_debt_issuance_after_third_time_desc: "在三次债券发行之后，我们可以继续扩大债券的发行，但是每一次都会扩大我们的利率"
 repay_the_bonds_when_have_no_yzmoney: "用其他方式偿付债券"
 repay_the_bonds_when_have_no_yzmoney_desc: "由于我们的柚子币不足以支付我们的债券，我们可以选择其他方式支付我们的债券，虽然这一过程是痛苦的。§R但是这比强制偿付的成本低多了§!\n§C债券偿付完成后将无法继续发行债券。§!"
 now_we_repay_the_bonds_without_yzmoney_tooltip: "我们尝试用其他东西偿付债券。"
 repay_the_bonds_by_yzmoney: "用柚子币偿付债券"
 repay_the_bonds_by_yzmoney_desc: "我们的柚子币已经有了足够的剩余，我们可以偿付那些债券了，毕竟那些债权人也算是对我们工业发展做出了一定程度的贡献。\n§C债券偿付完成后将无法继续发行债券。§!"
 YM_can_repay: "£GFX_yz_money [?bond_we_need_to_repay|.0+Y]"
 partly_repay_the_bonds_by_yzmoney: "部分偿还债券"
 partly_repay_the_bonds_by_yzmoney_desc: "尽管我们的柚子币不足以偿还全部债券，但是我们可以先偿还一部分"
 YM_can_partly_repay: "£GFX_yz_money [?yz_money|.0+Y]"
 now_we_partly_repay_the_bonds_with_yzmoney_tooltip: "我们部分偿还了债务，同时由于我们遵守了债务约定，我们的周利率会部分降低。"
 now_we_repay_the_bonds_with_yzmoney_tooltip: "我们用柚子币偿还了债务"
 start_rob_the_yz_gold_of_the_land: "开始强迫占领地区人民购买并游玩柚子社gal"
 start_rob_the_yz_gold_of_the_land_desc: "我们占领区的人民有巨大的财富，我们是文明的柚子厨，不能明抢。我们可以让他们买柚子社gal，我们相信他们会愿意的"
 close_rob_the_yz_gold: "停止强迫占领区人民购买并游玩柚子社gal"
 rob_the_yz_gold_of_the_land_we_occupied: "强迫[FROM.GetName]的人民购买并游玩柚子社gal"
 rob_the_yz_gold_of_the_land_we_occupied_desc: "我们可以强迫我们占领区的人民购买柚子社的gal，同时，我们可以用这笔钱来偿还我们的债券，§C虽然这可能会导致占领区的人民沉迷柚子社gal。§!"
 we_force_people_to_buy_yuzu_game_tt: "我们通过强迫当地人民购买柚子社gal为我们偿还了£GFX_yz_money [FROM.GetAdjective]  / [?yuzu_rob_cont|.0+Y] / [?yuzu_rob_cont_to_show|.0+Y] / [?FROM.yuzu_rob_cont|.0+Y] / [?FROM.yuzu_rob_cont_to_show|.0+Y] / [?yuzu_rob_cont_to_show_out|.0+Y] / [?yuzu_rob_cont_to_show_out_1|.0+Y] / $LEFT$ / $RIGHT|R0$ "
 we_force_people_to_buy_yuzu_game_1_tt: "我们通过强迫当地人民购买柚子社gal为我们偿还了总额为£GFX_yz_money §G$RIGHT|R0$§!的债券。§C如果我们能获得的债券超过我们需要偿还的债券总额，我们的债务会直接清零，剩余部分会直接加入我们的柚子币账户中，§C由于我们遵守了信用，我们的债券利率会重置。§!"
 #2025.3.21,21:46,伊尔诺——这里我搞不定，我也不知道为什么两个本地化会重合
 we_force_people_to_buy_yuzu_game_2_tt: "我们通过强迫当地人民购买柚子社gal为我们偿还了总额为£GFX_yz_money §G$RIGHT|R0$§!的债券，而我们欠的债务为£GFX_yz_money [?bond_we_need_to_repay|.0+Y]，这超出了我们的总债券额度，超出的部分将会直接进入我们的柚子币账户"
 we_get_the_rest: "我们一共获得£GFX_yz_money §R$RIGHT|R0$§!结余"
 obsessed_in_yuzu_galgame: "沉迷柚子社gal中"
 obsessed_in_yuzu_galgame_desc: "在我们强制当地人民游玩柚子社gal之后，他们都爱上了这些游戏，现在，当地人民每天打招呼的方式都是：Ciallo～(∠・ω< )⌒☆"
 #test_yz_tooltip_1_tt: "[FROM.GetAdjective]  / [?yuzu_rob_cont|.0+Y] / [?yuzu_rob_cont_to_decti|.0+Y] / [?FROM.yuzu_rob_cont|.0+Y] / [?FROM.yuzu_rob_cont_to_decti|.0+Y] / [?yuzu_rob_cont_to_decti|.0+Y] / [?yuzu_rob_cont_to_decti|.0+Y]"
 #rob_the_yz_gold_description_1: "我们通过强迫当地人民购买柚子社gal为我们偿还了总额为£GFX_yz_money §G$RIGHT|R0$§!的债券"
 Yoshino_long_term_invest_start: "启动芳乃中长期投资"
 Yoshino_long_term_invest_start_desc: "在完成了芳乃的投资计划之后，我们认识到芳乃在这一领域简直是不可多得的人才，芳乃正好也向我们递交了新的投资计划，这些投资计划必然是利国利民的。"
 Yoshino_long_term_invest_in_construction: "芳乃工程建设投资"
 Yoshino_long_term_invest_in_construction_desc: "在芳乃的工业计划完成之后，我们认识到我们的建设任然不足。正好，芳乃同志在工程建设领域提出了一项伟大的投资计划，这必然会促进我国的工程建设。"
 Yoshino_long_term_invest_resource_extraction: "芳乃资源开采投资"
 Yoshino_long_term_invest_resource_extraction_desc: "我国的资源逐渐无法满足我国工业生产的需求，芳乃同志决定开展一项伟大的投资计划，支持我国的工矿业领域。"
 Yoshino_long_term_invest_in_research: "芳乃科研投资"
 Yoshino_long_term_invest_in_research_desc: "我国的科研实力相对于其他打过而言简直不值一提，和他们相比简直是中专和清北比每年高水平论文发表数量，芳乃决定对国内的几所重点大学和研究所进行投资以提升我国的科研实力。"
 Yoshino_long_term_invest_in_industrialization: "芳乃工业化投资"
 Yoshino_long_term_invest_in_industrialization_desc: "我国的工业化水平仍然不足，芳乃决定就针对这一问题进行投资。在芳乃的正确领导下，文灾飞和我们比产能还是太嫩了。"
 Yoshino_long_term_invest_in_political_field: "芳乃恩情投资"
 Yoshino_long_term_invest_in_political_field_desc: "我们坚持芳乃总书记的领导，贯彻落实芳乃在穗织中央全会上做出的指示，坚定不移地走在芳乃同志所指明的穗织民族的伟大复兴路上。我们认识到：芳乃同志的意志就是我们的意志、芳乃同志指明的方向就是我们的前进方向。为此，我们需要开展一项投资，让大家都认识到芳乃的§R恩情。§!"
 #yz_money_monly_tooltip_subtain: "我们每月额外消耗的柚子币增加了"
 decide_on_choice_about_long_effert_or_stop_it_tt: "我们需要选择是否要把中期投资转变成长期投资"
 additional_yz_money_spend_raise: "我们每月额外柚子币消耗增加了£GFX_yz_money §R$RIGHT|R0$§! \n§R如果我们的柚子币不足，那么这些投资都会被取消§!"


