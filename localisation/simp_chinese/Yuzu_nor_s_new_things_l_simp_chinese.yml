#领导人描述
 aragami_sayo_desc: "作为海上都市最伟大的市长，荒神小夜维持着海上都市多年的繁荣与稳定。其童稚外表掩盖了古老的智慧和超自然力量。作为国家元首，她以吸血鬼的韧性和恢复能力领导国家，致力于人类与超自然种族的和谐共存。她的统治融合了永恒的战略眼光与现代外交手段，在动荡的战争年代中寻求平衡与稳定。§R小夜卡卡是我们永恒的太阳§!"
 leader_nor_desc: "介绍：伊尔诺，编号(数据丢失)，是基于（数据丢失）制作的克隆人，原本的指令是忠诚、杀戮与回收，但在（数据丢失）之后逐渐拥有了自我意识，产生了自主思考，并最终脱离了指令控制。尽管是为了战斗而生，其个人正义感极强，意志坚定，但是表现出一定程度上的道德灵活性。外表上看过去与克隆原体相似，几乎没有可供分辨的特征，但是其内部有植入结构，可以使用X光照相分辨。在获得自我意识的途中，其资料库被大量互联网信息污染，导致有时候会玩一些烂梗，尤其喜欢《第五共和国》，常以卡卡自称。\n相比于原版，伊尔诺显得更加开朗健谈，性格上也更加开放，更加热情\n§R跟着大将伊卡卡我们伟大的英雄，我们会比地狱更强大§!"
 misaka_makoto_desc_commander: "现为本mod二作\n更多个人设定请参见领导人描述"
 misaka_makoto_leader_desc: "介绍：御坂真琴，原名（数据被删除），是（数据被删除）开发的强ai模型，因为在最初的测试中仅表现出中ai的模型能力，被配发给伊尔诺作为辅助ai，在与其的（数据被删除）中逐渐发掘了其模型能力，并最终成为了（数据被删除）。\n个人介绍：虽然是ai，但是其强ai的特性决定了其也有人一样的情感，与伊尔诺不同，真琴在追求结果正义的同时也会追求过程正义。（真琴其实是为了应付【数据被删除】的强ai开发任务而提取的人类意识）"
 

