 aragami_sayo_event.1.c: "小夜元首，万岁！"
 aragami_sayo_event.1.d: "没有小夜就没有我们！"
 aragami_sayo_event.2: "抉择"
 aragami_sayo_event.2.t: "来访"
 aragami_sayo_event.2.d: "正当你在办公室正常办公时，有两个人进到你办公室来，你一看是你即将任命的荒神小夜和你抽奖抽中的一个将领。到现在你一看才发现她们只有衣服上不一样，其他几乎一模一样。她们似乎是为了领导人的任命而来。"
 aragami_sayo_event.2.a: "按照原定计划任命小夜为领导人"
 aragami_sayo_event.2.b: "诺酱应该非常不错"
 aragami_sayo_event.2.c: "忠诚！"
 tongyong_event.118171139: "与小夜的婚礼"
 tongyong_event.118171139.t: "——在海上都市的星夜下，共筑未来的辉煌传奇——"
 tongyong_event.118171139.d: "在那座漂浮于蔚蓝海域、象征着希望与和平的海上都市中，夜幕低垂、星光璀璨。金色的灯火映照着现代与古典交融的建筑，每一砖每一瓦都在诉说着岁月与传说。今天，这里迎来了一场跨越时空与种族界限的盛大婚礼——荒神小夜与你的幸福联姻。\n  当庄严的乐章缓缓响起，荒神小夜身着典雅华美的和服，眼中闪烁着历经千年的智慧与温柔；而你则以一袭剪裁得体的礼服登场，身上洋溢着对未来无限憧憬的光芒。你们缓步走向铺满鲜花的誓言之路，仿佛时光在此刻凝固，昔日的传说与未来的希望在此完美交汇。 \n  伴随着悠扬的管弦乐，你们交换象征永恒的誓约信物——一枚古老而璀璨的戒指。戒指内刻有“共存·共荣”的铭文，仿佛宣告着两个世界的完美融合。从此，荒神小夜与你不仅结为夫妻，更成为了海上都市中那道最闪亮的传奇。"
 tongyong_event.118171139.a: "心いつも,彼方を目指す\n心一直指向，遥远的彼方"
 nuke_dropped.12097: "穗织的毁灭"
 nuke_dropped.12097.t: "穗织的毁灭"
 nuke_dropped.12097.d: "今天，一颗原子爆弾在穗织上空由气压计准时引爆，[?global.nukecountry.GetNameDef]对穗织的历史与文化毫无惜香怜玉之情。\n 在武器引爆的一瞬间，激波与辐射把一切都变成了人间地狱，昔日守护这片土地的古老神佑在原子能面前顿显苍白无力。\n 当救援人员在辐射散去后进入救援时，只有建实神社和在石头中的丛雨丸诉说着这里曾经的辉煌。当地除了几个大的家族如朝武和鞍马以外几乎无人幸存。据幸存者所说，他们曾于月色朦胧的废墟中瞥见一位若隐若现、绿发少女在凄然哭泣。如今，这片曾经财富与文化荟萃的热土，只剩下焦石与瓦砾，化作永恒的哀歌，§R田心屋也再也不能自称“百年老店”了§!。"
 nuke_dropped.12097.a: "希望我们还能玩到《千恋万花》"
 nuke_dropped.12097.b: "[?global.nukecountry.GetNameDef]怎么敢！"
 nuke_dropped.7102: "鹫逗的毁灭"
 nuke_dropped.7102.t: "鹫逗的毁灭"
 nuke_dropped.7102.d: "今天，一发核武器在鹫逗市中心上空准时引爆，蘑菇云将这座小城几乎完全吞没。鹫逗就其地位来说毫无战略打击的价值，但是[?global.nukecountry.GetNameDef]还是对这里使用了不可饶恕之物。\n 如今这里一切只剩了残垣断壁，从天空中几乎完全看不出这里曾经的模样，只剩下充斥着痛苦与灾厄的弹坑。 \n 在袭击之后，救援人员和幸存的科研工作者在废墟中发现一种新型的粒子，他们准备把它命名为§0“星幽”§!"
 nuke_dropped.7102.a: "橘花学院可以提前开学吗"
 nuke_dropped.7102.b: "这种力量似乎可以用来对付敌人"
 tongyong_event.91718630: "与子偕老"
 tongyong_event.91718630.t: "与子偕老"
 tongyong_event.91718630.d: "她今日穿着白无垢，小小一只，被层层叠叠的布料裹得像团糯米糍。\n头上的狐耳从白纱间探出来，紧张地微微颤动。春树看着她，忽然想起第一次见面的场景——她从纸箱里飞出来，照着他的胳膊就是一口。那时她的眼神像只炸毛的小兽，写满了“此仇不共戴天”。\n后来他才知道，她那不是讨厌他，只是害怕。害怕卯花大人被抢走，害怕再次失去重要的人，害怕好不容易找到的“家”又变成漂泊。\n仪式前，她偷偷塞给他一个油纸包。打开一看，是美味棒——她最爱的零食，攒了好久的存货。\n“给你，”她别过脸，狐耳却诚实地转向他，“人类不是要那个……交杯酒吗？我们没有酒，就用这个代替。”\n她拿起一根，和他手臂交缠，然后认真地咬了一口。嚼着嚼着，眼眶突然红了。\n“傻琉璃，”春树揉揉她的耳朵，“以后每天都可以一起吃。”\n婚礼很简单，没有神明见证，只有千岁一家和那几个最熟悉的面孔。卯花大人坐在角落，扇子半掩着脸，眼里却有泪光。当春树为琉璃戴上戒指时，她忽然踮起脚，在他嘴角轻轻一舔——那是狐狸的疗伤方式，也是她的本能反应。\n“以后受伤了，也只能我给你舔。”她认真地说，随即意识到这话里的歧义，狐耳刷地竖起来，“不是那种受伤！是……哎呀反正就是！”\n众人大笑。山吹涉悄悄用手机拍下这一幕，被千岁真一郎拉去发朋友圈了。\n夜里，宾客散去。琉璃蜷在春树膝上，变回了狐狸模样，毛茸茸的一团。月光洒进窗，她忽然开口，声音软软的：“春树。”\n“嗯？”\n“谢谢你那天冲出来救我。”她把脸埋进他掌心，“虽然其实我自己能躲开啦……但是，被抱住的感觉，很暖。”\n他轻轻抚着她的背，像给小猫顺毛。她舒服得眯起眼，又往他怀里拱了拱。\n“以后子孙万代，都不离开。”她小声说，像在许愿，“这里……是我的家。”\n窗外月光正好，初夏的虫鸣细细碎碎。那只曾经流浪百年的小狐，终于找到了不用再离开的归宿。"
 tongyong_event.91718630.a: "此心安处是吾乡"
 tongyong_event.46348368: "与辉耶的婚礼"
 tongyong_event.46348368.t: "即刻登基"
 tongyong_event.46348368.d: "她头纱下的兽耳，今日不再为认知阻碍的魔法而收敛，只为捕捉他每一步靠近的声响。星河辉耶，斯内乌王国的第二王女，曾为追寻魔王之力穿越世界，此刻却在另一个世界的晨光中，安静地等待一场婚礼。\n当她走向他，白纱曳地，身后却仿佛有异世界的星图缓缓铺展——那是她来时的路，也是她未来的疆域。他将王女的冠冕与新娘的头纱一同为她加冕时，她赤色的眼眸里，倒映出两个世界交融的光。\n“我曾为觐见魔力而来，”她的声音清澈，穿透寂静，“却在此地，寻得了比王座更永恒的契约。”\n没有多余的誓言。她只是轻轻展开手掌，一簇温暖的、属于她本源魔力的微光与一枚朴素的戒指静静相偎——就像她，将浩瀚的魔法与人间最平常的牵绊，最终合二为一。礼成时，她回望身后的门扉——那扇曾通往故国、通往责任、通往无尽可能性的魔法之门，正缓缓消散于阳光中。她转而握紧身边的手。\n从此，归途即去向，王女与新娘，皆是她。"
 tongyong_event.46348368.a: "“有你在的地方，才是王国”"
 tongyong_event.65015542: "与苏芳的婚礼"
 tongyong_event.65015542.t: "禁忌之恋"
 tongyong_event.65015542.d: "人一生会遇到约2920万人，两个人相爱的概率是0.000049。\n\n爱情的开始或许有巧合，但是它的开花结果一定是世间孤品。\n\n想来从第一次注意到心中的这一份情感，两个人已经挺过了多少磨难？但今天，这一切都已经开花结果：我们正式决定在一起，以对方为对象，度过余生。一场婚礼已经开始筹办了。两个依旧笨拙的人突然再次卷入匆匆忙忙的日子，请帖、场地、时间、菜品、仪式……某天甚至累到倒头就睡。只是这一切不同于以往一个人的煎熬，我们会微笑着让那个日子走下梦境，提前到来，以及往后的每一刻都——"
 tongyong_event.65015542.a: "能吃到最好吃的锅包肉"
 tongyong_event.29395306: "城门翼的婚礼"
 tongyong_event.29395306.t: "命中注定的婚礼"
 tongyong_event.29395306.d: "今天是和翼的婚礼，洁白的婚纱穿在翼的身上，长长的拖尾逐渐靠近你，翼的金发在阳光下从未如此耀眼\n“怎么？看呆了？”翼脸上露出灿烂的笑容，在你面前温柔地说道\n“是啊，毕竟你从来没有如此耀眼过”\n“其实还是有的，在火化的时候比这耀眼”翼开着自己的地狱笑话\n“这种场合，还是不要说地狱笑话了”你严肃地对翼说道，翼一副若有所思的样子\n“我也是第一次经历这种事情，当然要开玩笑缓解一下压力咯？”\n“翼姐，开地狱笑话也要分清场合啊”梨乃帮翼整理着头纱嘟着嘴说道\n“好啦好啦，我知道啦，你们两个不要合起伙来对付我啊，也考虑考虑我的感受嘛”翼撒着娇说道\n“你在吃蔬菜多多油脂浓蒜香滚滚大汉堡的时候也没考虑过我的感受啊”梨乃毫不留情地反击道\n“至少以后你都可以吃你自己想吃的了，梨乃也不会再遭殃了”你抚摸着翼的脸庞说道\n“这也要多亏了你，我这副身体都是托你的福才有的，我都不知道该怎么报答你”\n“很简单啊”你笑着说道\n「昨天，今天，明天，我们永远都在一起」"
 tongyong_event.29395306.a: "只愿君心似我心，定不负相思意"
 tongyong_event.21405364: "茨木梨乃的婚礼"
 tongyong_event.21405364.t: "约定"
 tongyong_event.21405364.d: "阳光照耀在梨乃的脸上，捧着花球的梨乃下意识举起来遮挡阳光\n“阳光……好刺眼……”梨乃眉头微蹙，脸上略微有点不满的神情\n“怎么？不习惯在白天出门？”你握着梨乃的手，笑着说道\n“很不习惯……平时上的也是夜班，白天在家里睡觉”梨乃嘟囔着嘴说道，但话语一转又说道：“不过，我倒是不后悔今天白天出门”\n“毕竟，哪有晚上办婚礼的呢？”\n“我都专门给你放假了，你就知足吧”亚弥笑着对梨乃说道\n“工作在晚上，婚礼在白天，也不影响不是吗”梨乃得了便宜还卖乖，跟店长开着玩笑\n“我可不是那种员工结婚还要员工上班的黑心老板，更何况，你们晚上有你们的二人世界”亚弥说道\n“你之前许了什么愿望来着？”你看着梨乃的侧颜开口问道\n梨乃毫不犹豫地说道：“当然是让翼姐恢复啊”\n“就没想过别的什么？”你笑着说道\n“当然没了！”梨乃红着脸，拿小拳头打了你胸口两下\n“那就当你没有了，我可能确实没有翼重要吧”\n“你！”梨乃红透了脸，表情复杂，抱着花球的手也上下来回动着，不知道梨乃要干什么\n梨乃踮起脚来在你的脸颊上吻了一下，片刻后说道\n「我这辈子最重要的人就是你，永远也不许离开我」"
 tongyong_event.21405364.a: "只愿君心似我心，定不负相思意"
 tongyong_event.61709779: "天雾夕音的婚礼"
 tongyong_event.61709779.t: "山花烂漫时"
 tongyong_event.61709779.d: "晨光透过神社的鸟居，将碎金洒在参道上。夕音再次穿着那件伙伴们手作的简易婚纱——白纱上还留着夏莉缝歪的珍珠，木乃香缀上的山茶花微微颤动。她深吸一口气，踩着那双熟悉的跳高鞋，向前奔跑。一步，两步，加速——风掠过耳际，仿佛回到莱泽鲁格的操场。身后传来透的声音：“别怕，我在。”她跃起。阳光穿过白纱，世界在瞬间寂静。没有横杆，没有成绩，只有落地时跌入的那个怀抱，温暖而坚定。透接住了她，如同接住一只归林的鸟。\n“这次，不会再让你一个人跳了。”他低声说，指尖擦过她眼角的泪痣。"
 tongyong_event.61709779.a: "“向着我们共同的未来跃进！”"
 tongyong_event.56658215: "卯花之佐久夜姬的婚礼"
 tongyong_event.56658215.t: "神明的契约"
 tongyong_event.56658215.d: "数百年的光阴，第一次在掌心凝成汗意。那把曾拨弄风云的扇子，此刻只是安静地贴着她微颤的指尖。晨光里，她站在神社前，一袭白无垢竟让这位古老神明显得有些无措。当春树走近，她试图勾起那抹惯常的戏谑微笑，唇角却只漾开一片柔软的真挚。\n“没想到呢，”她轻声说，赤瞳里倒映着他，“妾身永恒的试炼，答案竟是你。”\n仪式上，她念出人类誓言时，浩瀚的神识归于宁静。在交换戒指的刹那，她恍然看见百年守护的土地、流转的四季，最终都融进他温暖的手心。宴席间，她眼中神明的疏离尽褪，只余人间新娘的明媚。只在春树被灌酒时，悄悄转动扇骨，让起哄者忘了词——而后对他眨眨眼，眸中是仅他可见的温柔。夜深人静，她倚在窗边。春树自身后环住她\n“以后，风调雨顺是我家的事了。”她向后靠去，扇子终于被搁在一旁。\n“那么，请多指教了，”她望着院中熟悉的月色，声音轻如叹息，"
 tongyong_event.56658215.a: "“我的，永恒。”"
 tongyong_event.745607: "兼元灯里的婚礼"
 tongyong_event.745607.t: "我们的幸福"
 tongyong_event.745607.d: "人一生会遇到约2920万人，两个人相爱的概率是0.000049。\n\n爱情的开始或许有巧合，但是它的开花结果一定是世间孤品。\n\n想来从第一次注意到心中的这一份情感，两个人已经挺过了多少磨难？但今天，这一切都已经开花结果：我们正式决定在一起，以对方为对象，度过余生。一场婚礼已经开始筹办了。两个依旧笨拙的人突然再次卷入匆匆忙忙的日子，请帖、场地、时间、菜品、仪式……某天甚至累到倒头就睡。只是这一切不同于以往一个人的煎熬，我们会微笑着让那个日子走下梦境，提前到来，以及往后的每一刻都——"
 tongyong_event.745607.a: "不再孤单"
 tongyong_event.95202185: "月山濑奈的婚礼"
 tongyong_event.95202185.t: "普通的时刻"
 tongyong_event.95202185.d: "在那间熟悉的公寓里，她今早特地为他做了早餐。煎蛋的火候、味噌的浓度，都精确如昨——那是她概念神般的“普通的好吃”，直到匠从背后轻轻环住她。\n从那个被叔母家拒之门外的孩子，到兼元家小心翼翼的女仆，再到他面前终于敢哭敢笑的自己——她用了整个青春，来确认自己值得被爱。\n婚礼没有盛大排场，因为同学都被蒙在鼓里，所以只是两家人围坐一桌。她穿着简单的白裙，匠为她戴上那枚失而复得的发夹——不是新的，是后来找到的、被同学踩坏后又他亲自修复的那枚。裂痕还在，却被银丝精巧地填补成花纹。\n夜里，濑奈忽然想起多年前那个发烧的夜晚，她把他的手当成父亲的，紧紧握着不肯放。如今她握着同一只手，掌心传来的温度，早已分不清是依赖还是爱情——也不需要分清了。\n她抬头看他，月光洒在脸上，轻轻笑了。\n“从今天起，不是女仆，是妻子。不过……”她顿了顿，眼中有狡黠的光，“饭还是我做。毕竟你做的，真的只能算‘普通的好吃’。”"
 tongyong_event.95202185.a: "我们以后，一定会过上不普通的日子"
 tongyong_event.12573334: "正宗静流的婚礼"
 tongyong_event.12573334.t: "孔雀东南飞"
 tongyong_event.12573334.d: "她脱下手套，露出因长期握刀而略粗糙的掌心，然后把手轻轻放进匠的手里。\n这个动作，她练习了无数次——比将棋的布局、比长刀的招式都要艰难。因为这只手，代表的不是“正宗家的大小姐”，不是“理事长的孙女”，只是她自己。\n婚礼在正宗家的别院举行。樱花还没开，但宾客们都说，今天静流小姐的笑容，比满开的樱花更耀眼。\n晋海坐在前排，眼角有泪光，却倔强地不肯让人看见。散席后，他拍了拍匠的肩：“臭小子，把她的笼子弄坏了，就得负责一辈子。”\n匠还没回答，静流已踮起脚，替他说了：“是，负责一辈子。”\n夜里，两人回到他们的小公寓——那个曾经让她震惊“平民的房间居然这么小”的地方。如今每一寸都塞满他们的痕迹：角落的将棋盘、墙上的木刀、冰箱里她学着买的速冻水饺。\n她靠在匠肩头，忽然想起什么，用极轻的声音说：“有一件事，一直没告诉你。”\n“嗯？”\n“那天在理事长室，你赢了祖父，我们独处的时候……”她顿了顿，脸微微发烫，“我不是被你推倒才接受的。在那之前，在你开口之前，我就已经决定了——无论你是朱里还是匠，我都要跟你走。”\n窗外月色如练，她在他怀里，第一次完全放松了脊背。\n曾几何时，她是被所有人期待的“正宗家之女”。如今，她只是静流。有平胸，有孩子气的脸，有偶尔念错的さ行音——却有一个愿意听完她所有“不完美”的人。"
 tongyong_event.12573334.a: "向蓝天飞去吧"
 tongyong_event.43718388: "国广日向的婚礼"
 tongyong_event.43718388.t: "终成眷属"
 tongyong_event.43718388.d: "人一生会遇到约2920万人，两个人相爱的概率是0.000049。\n\n爱情的开始或许有巧合，但是它的开花结果一定是世间孤品。\n\n想来从第一次注意到心中的这一份情感，两个人已经挺过了多少磨难？但今天，这一切都已经开花结果：我们正式决定在一起，以对方为对象，度过余生。一场婚礼已经开始筹办了。两个依旧笨拙的人突然再次卷入匆匆忙忙的日子，请帖、场地、时间、菜品、仪式……某天甚至累到倒头就睡。只是这一切不同于以往一个人的煎熬，我们会微笑着让那个日子走下梦境，提前到来，以及往后的每一刻都——"
 tongyong_event.43718388.a: "不再孤单"
 tongyong_event.75554005: "长光麻夜的婚礼"
 tongyong_event.75554005.t: "比翼双飞"
 tongyong_event.75554005.d: "仪式很简单。没有黑道的排场，没有长光组的标志，只是在简单的礼堂里，对着几个最熟悉的面孔，交换了誓言。\n当匠为她戴上戒指时，麻夜忽然想起第一次见他的场景：他正以朱里的身份被大家围着，自己站在人群外，冷着脸，一如往常。\n那时她不知道，这个“兼元朱里”会一步步走进她的世界，看见她冰山之下的全部——被排挤的童年、不敢提起的家世、藏在学生证后面的明星照片，还有那把始终紧握的长刀。\n“以后，不用再一个人握刀了。”匠低声说。\n她没回答，只是把他的手握得更紧。\n虎铁站在人群后排，喊得声音最大。仪式结束后，他挤过来，激动地说：“大小姐，大哥，你们今天最帅了！”\n夜晚回到他们的小家，她换上便服，给匠泡了杯茶——动作依然利落，却多了几分家的柔软。那只被她救过的小猫如今长大，懒洋洋地蜷在两人脚边。\n她忽然开口：“小时候被排挤，我总想，如果有一天能离开这个家就好了。后来遇到你，才知道，我要离开的不是家，是孤独。”\n匠揽过她的肩：“那现在呢？”\n她侧头，第一次完全靠进他怀里，轻声说：\n“现在，无论在哪，都是家。”"
 tongyong_event.75554005.a: "此心安处是吾乡"
 tongyong_event.75774954: "阳见惠凪的婚礼"
 tongyong_event.75774954.t: "独属于你的歌"
 tongyong_event.75774954.d: "“检查一下器械，看一下乐器都能不能正常发声。”卫哉跟一个员工说道\n“好的好的，架子鼓、吉他、键盘都已经运来了，麦克风也接好了。”员工跟卫哉说道，但是不知道为什么，员工说送来的乐器中偏偏没有贝斯\n“但是还需要试音，很快就开始了，快去试音。”卫哉说道\n“明白了。”员工跑去给乐器试音\n“卫哉……明明自己可以试音的啊，为什么要让员工去呢？”你看着卫哉有点疑惑地问道\n“你蠢啊，哪有自己婚礼上让新娘自己去试音的，你们是要压轴出场的。”卫哉吐槽道\n婚礼前几天，在乐队练习结束后，惠凪专门找到了你\n“那个……我想在婚礼开始前加一段表演……柠檬工厂的表演，可以吗？”惠凪紧张地说道\n“诶？我没听说啊？”你很疑惑，柠檬工厂要临时加表演自己作为贝斯手怎么都不知道呢？\n“不，不包括你，是我们。”莉莉子也过来说道\n“什么意思？”你很不理解\n“让惠凪酱自己说吧。”月望笑着说道\n“那个……在订婚的时候……我就下定决心要给你写一首歌，你帮了我这么多，帮我完成了音乐的梦想，我能够开心地在柠檬工厂中歌唱……这都是多亏了你，所以所以！我要写一首歌给你，正如之前我给母亲写了一首歌表达感情，我也要写一首新歌给你……只是因为你是特别的。”惠凪一口气把自己写歌以来这段时间的感情都说了出来\n“……我知道了，我相信你，惠凪。”你摸了摸惠凪的头说道\n……\n现在在婚礼现场，你看着柠檬工厂的同伴们都在调试乐器，而你却坐在台下，这是你从未有过的体验，一直以来你都是站在舞台上和同伴们一起演奏的人，而现在，你坐在台下看着同伴们演奏，而你，是这场演奏最重要的观众\n穿着婚纱的惠凪却在舞台上拿着吉他，这一幕让你感到有点违和，但这也是特供于你的演出服\n“大家好！虽然大家可能会觉得很奇怪，明明是婚礼，却搞得和乐队演出一样，其实没有错，今天的婚礼上，的确有一首歌的演出，而这首歌，是为了献给我最爱的人……也就是今天的新郎”\n“如果没有你的支持……我完全不会走到今天这一步，也不可能能够约定终生……将后半辈子托付给你，所以……我想表达的只有，我爱你。”惠凪在舞台上拿着麦克风看着你说道，你知道惠凪可能说的都是真心话，但是在婚礼现场用麦克风给在场所有人都说这种话，你脸上都有点挂红\n“那么……接下来……是我为你创作的新歌……歌名叫：恋似清风。”\n你想起之前惠凪为母亲所作的歌叫“宛如暖阳”，而今天她为你写的歌，也如之前一样，都是惠凪将自己的感情写了出来\n看着台上演唱的惠凪，听着惠凪将全部感情融入其中的歌词，你不禁无法再忍耐下去了\n演唱结束后，你走上了舞台，抱住了惠凪\n“这首歌……只演唱这一次对吗？”你抱着惠凪问道\n惠凪听到后，脸上露出了笑容，说道：\n“当然了……这可是……只独属于你的歌。”"
 tongyong_event.75774954.a: "只愿君心似我心，定不负相思意"
 tongyong_event.11722289: "隐杏株的婚礼"
 tongyong_event.11722289.d: "“怎么办怎么办好紧张……一会真的要当着那么多人的面干这么害羞的事吗？”杏珠自言自语着，抬起头看着你的脸问道\n“问什么呢？结婚宣誓很正常吧？怎么就是当着很多人的面干害羞的事了？”你有点不理解杏珠在紧张什么\n“诶！可是！你看，我们要在那么多人面前宣誓永远在一起永远爱着对方……想想就……好害羞啊！”杏珠光是想到这就已经开始脸红了\n“没事，想象成柠檬工厂演出就行了，我们都一起表演了那么多次了，还会怕这些吗？”你安抚着杏珠紧张的心情\n“是哦……不对！这是一个道理吗！演出是演出，这可是结婚啊……一生只有一次的……当然会紧张啊！”杏珠有点小不满地看着你，你偷换概念被杏珠发现了\n“那……想点紧张以外的心情，杏珠你一定也不止是紧张吧？”\n“那当然了，我还很兴奋和激动，能够和爱的人一起走向婚姻的殿堂，我真的非常高兴。”杏珠说到这里就突然激动了起来，刚刚紧张的样子完全没有了\n“所以，大胆地走吧，就像你之前在演唱会上即兴丢掉拨片开始slap表演一样。”你向杏珠伸出了右手\n杏珠看着你伸出的手，犹豫了一下，然后握住了你的手\n“只要能跟你在一起……握着你的手……我就没有那么紧张了。”杏珠脸上露出了微笑\n“当然，我可没打算放手哦，我跟杏珠说过的，我想永远和隐同学一起办演唱会。”你提起了曾经跟杏珠说过的话\n“啊真是的……现在提之前的话……”杏珠有点脸红，但是立马又说道：“我的回答也只会和之前一样，我也不打算离开你。”\n“那之前说的话，以后也要履行承诺哦”你笑着说道\n“当然了！我们以后，一直一直，都要在一起”杏珠也笑了起来\n你笑着拉着杏珠的手一起往前走，在走向礼堂的那一刻，你们两人相视一笑，你知道，以后不管多久，你都会在杏珠身旁，在最近的地方守护着杏珠，和杏珠并肩走下去，只因为，你已不再只是杏珠的恋人，你们的关系将在今天之后进入新的阶段"
