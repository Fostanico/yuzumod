 tongyong_event.36732743: "岛越月望的婚礼"
 tongyong_event.36732743.t: "以乐知心"
 tongyong_event.36732743.d: "金发少女在舞台上优雅地演奏着钢琴，专场音乐会能举办的音乐家并不多，但，台上的少女是其中之一\n你在台下倾听着少女的演奏，你身旁的女性也是你的熟人，不如说，这场音乐会就是她请你来的\n“岳母……月望她知道我来吗？”\n“哦呵呵……她当然不知道了，最近在欧洲的巡回演出，我也担心她很累，就联系你把你从日本叫来巴黎了。”月望妈妈笑着说道\n“没事的岳母，你不用担心，她没有特别累。”你安抚了月望妈妈，月望的状态不差，不需要担心\n“哦？你是怎么知道的？”月望妈妈有点不理解你为什么这么说\n“月望的音色里体现出来的……还是沉浸于演奏之中，而没有已经绷在弦上的感觉。”你聆听着月望的钢琴曲说道\n“那就好……不过……你们竟然能靠音乐就了解对方啊……之前你跟我说把月望交给你的时候我还没明白……现在看来……呵呵，你也很让人放心啊，月望嫁给你也没有很吃亏。”月望妈妈说道\n但就在这时，月望的演奏结束了，音乐厅爆发出轰鸣的掌声\n“好了，演奏结束了，月望……一定很想见到你，我去发动车了，你接上月望以后上车就行。”月望妈妈微笑着说完后就走了，已经很明显是为了给你们留二人空间了\n“月望。”你在月望演出结束后走到了舞台前，本来你是想等她去后台换完衣服以后让她再来的，但是，月望看到你的那一刻，就冲了下来扑到了你怀里\n“月望！小心一点，摔倒了怎么办。”你接住了月望，月望把头埋在你怀里\n“怎么来了也不提前告诉我……坏蛋。”月望把头在你怀里蹭来蹭去，你把手放在月望后脑勺上轻轻抚摸着月望\n“岳母说想给你个惊喜……”\n“嘁，妈妈是坏蛋，你也是坏蛋。”月望撒着娇说道\n“那……早知道我就不来了。”\n“不可以！你知道我有多想你吗！我每到一处巡演地，下火车的时候就在希望能看到你……尽管我知道那不可能，但我还是会想……”月望说道\n“所以我现在出现了。”你笑着说道\n“是啊……你真的回应了我的愿望……巡回演出……比赛……我都不在乎，我只想看到你。”月望说道\n“好啦好啦，快去换衣服，你妈妈在外面等你。”你说道\n“好哦，但是，我出来以后，你不许消失。”月望有点不舍地松开了你\n“不会消失的，我会一直等着你。”\n月望脸上露出了笑容，在你脸颊上轻轻吻了一下后就小步跑去了演出后台\n尽管在欧洲文化中，亲吻脸颊属于很正常的举动，月望跑走以后突然想到了这点，又小步跑了回来，轻吻着你的嘴唇，然后又跑走了\n你站在原地看着月望的背影，心里不禁感叹到\n「今后在我身边，只要有月望在就足够了」\n这是月望曾说过的话，而你现在完全认同了这一点"
 tongyong_event.36732743.a: "一语不入意，从君万曲梁尘飞"
 tongyong_event.9782093: "莉莉子的婚礼"
 tongyong_event.9782093.t: "青梅の大胜利"
 tongyong_event.9782093.d: "这一天早上，你与往常一样早起，接下来也是和往常一样去莉莉子家里叫莉莉子起床，你的这个青梅竹马没有你可是连起床都费事\n想到这里，你摇了摇头，然后走去了去莉莉子家的路上\n你用钥匙打开了莉莉子的家门，准备上楼叫莉莉子起床，突然你的眼睛被一个红色的身影吸引在梳妆台前\n“今天你竟然没有我叫就醒了啊。”你笑着说道\n“你到底是怎么看我的，什么人会在婚礼当天早上睡过头啊？”莉莉子很不满地说道\n“因为，你不是一直都需要我来叫醒吗，我以为你会和往常一样呢”\n“真是的……早知道你这样，我就不把钥匙给你了，哪有你这样接新娘的，我就应该把你关在门外。”莉莉子嘟起了嘴，有点生气地说道。\n“你给我钥匙也不是最近的事啊，你不是早就把钥匙给我了吗。”\n“嘁，这就是青梅竹马的坏处，不行，你出去再来一遍，要不然告你非法入侵民宅。”莉莉子对你来接新娘的态度不满意\n“哪有这样无功而返的接新娘呢？你都在我面前了，我当然不会就这样出去了”你坏笑一下，走近了莉莉子的身边\n你突然蹲下，用手环住莉莉子的后背和小腿，然后公主抱起了莉莉子\n“你以后都会是我的公主，我不会放开你的。”你对着在怀里的莉莉子耳旁轻声说道，莉莉子脸颊微红，一时间没有回你什么\n“看吧看吧，我就说，他们两个根本不会给我们闹的机会的。”卫哉在门口说道，乐队的其他人也都凑在这里\n“你们怎么来了？”\n“月望说这个时候需要闺蜜们待在新娘身旁来给新郎捣乱……我们就来了”惠凪说道\n“还捣乱，月望你都看的什么奇奇怪怪的知识啊。”你吐槽道，那个金发女孩只是吐了吐舌头\n“等一下！你先把莉莉子放下来！”杏珠突然说道\n“嗯？为什么？”\n“先放下来。”杏珠说道\n你把莉莉子放在了地上，然后突然，你看到了闪光灯，月望拍下了你单膝跪在莉莉子面前的一幕\n“这就拍到了嘛，比起婚纱照还更有意义的照片。”月望笑着说道\n“那么！”卫哉清了清嗓子，停顿了一下\n“新婚快乐！”四人一起喊道\n是啊，今天开始，莉莉子就是你的老婆了呢，你想到这点，不禁拉住了莉莉子的手\n「从今往后，也请永远……永远地多指教了……！」"
 tongyong_event.9782093.a: "执子之手，与子偕老"
 tongyong_event.47496112: "硕川美玖的婚礼"
 tongyong_event.47496112.t: "不是一家人，不进一家门"
 tongyong_event.47496112.d: "站在礼堂门口，你心里充满了忐忑不安，白发少女穿着婚纱轻轻握住你的手\n“不要紧张，我们都是第一次嘛。”美玖笑着说道\n“就是就是，别紧张啊！”杰拍着你的左肩说道\n“是啊，多高兴的一天！你跟美玖终于结婚了，我们能不高兴吗。”雄真拍着你的右肩说道\n“就是因为有你们两个我才不安啊！你们两个给婚礼上安排的什么玩意啊！为什么我要跟你们nor一起演出啊！”你吐槽道\n“你可是入赘我们家了，当然得让你加入我们乐队咯。”雄真说道\n“我还有自己的乐队啊！我是柠檬工厂的人！”\n“好啦好啦，开个玩笑而已，你跟我们一起演出一次不就能说明你是自己人了吗。”杰说道\n“可是……”你还想吐槽什么，但是美玖拉了下你的手\n“好啦，你是跟我结婚，又不是跟这两个笨蛋结婚，这么在乎他们干什么”美玖笑着说道\n“妹妹还没嫁出去就已经胳膊肘向外拐了！”雄真一副很心痛的样子说道\n“就是因为你们两个总是欺负他，我才要站在他这边，要不然他天天被你们欺负。”美玖对两个哥哥说道\n“谢谢你美玖……”你双手捧住了美玖的手\n“嘛……我这两个笨蛋哥哥……以后才是需要你多照顾的，还请你多多包涵咯。”美玖笑着说道\n“美玖！你这么看哥哥……我们很伤心啊……”杰说道\n“嘁，伤心就伤心，今天的主角又不是你们，谁在乎你们。”美玖毫不留情地diss着这两个哥哥，或许这才是真实的兄妹交流\n“好了，不理他们，我们走吧。”美玖拉着你的手走进礼堂\n“美玖……”你叫了一声美玖\n“怎么了？”美玖扭头看着你\n你看着即将迈入的婚礼殿堂，回头看着两个犯蠢的大舅哥，然后紧紧握住了美玖的手\n“从今往后……我们会一直在一起的，对吧。”你说道\n“是啊，一直一直在一起，问这个怎么了？”美玖有点奇怪，歪着头问道\n“所以，我们的关系更进一步了，那……之前的承诺，也会延续到以后吧？”\n「不论发生什么，我和美玖的关系也不会动摇」\n“是啊……哈哈……以后，就请你多多关照了”美玖灿烂地笑着"
 tongyong_event.47496112.a: "最是分携时候，归来懒傍妆台"
 tongyong_event.73719949: "茶园那优花的婚礼"
 tongyong_event.73719949.t: "充电（无暗示）"
 tongyong_event.73719949.d: "“好烦好烦好烦好烦……怎么这么多要求啊！”那优花对着电脑屏幕骂道\n“怎么了？”你关心地走到那优花身边\n“甲方真是这个世界上最可恶的生物！最可恶最可恶！我写了三天的曲子，连续30个小时没睡觉！给甲方发过去以后甲方说少点纱优太的感觉……什么叫少点纱优太的感觉！纱优太本人写出来的少点纱优太的感觉吗！”那优花痛斥着甲方\n“啊……不是已经有很多人能接受你的新曲风了吗？”你问道\n“是啊……之前在亲身谈了恋爱以后，对于那种表达恋爱感情的想表达感情但又青涩的感觉能够理解了，之后好多曲子都是写的比较那种轻快的。”那优花想着前段时间自己的变化，看着你说道\n“这……可都是因为你啊，你以一己之力改变了我的曲风呢，你得负责。”那优花笑着说道\n“唔，按你的话来说，我对你的作曲工作产生了很大影响咯？”\n“当然了，你……让我体验到了恋爱的感觉，我也就能理解恋爱感情了，所以……你得为不习惯我现在曲风的听众负责。”那优花从电脑桌前起来走向了你\n“怎么负责？”你看着那优花的眼睛问道\n“当然是……让更多人知道，恋爱感情有多甜蜜啊~就跟现在一样~”那优花贴了上来，紧紧地贴着你\n“呐，我刚被甲方恶心完，你不会不满足我的吧？”那优花趁机道德绑架你\n你知道这是那优花想换换心情，而能做到这点的，只有最了解她的你。你轻轻抚摸着那优花的头，安抚着那优花被工作搞烦的心情\n“好哦~那些家伙不懂恋爱的好，还对情歌有偏见，觉得太俗气……多亏了你哦，我对音乐的理解更加深入了，也能写出更好的曲子了……当然，最大的收获就是……”\n那优花说着，停顿了一下\n“能够一直一直在你身旁，在你怀里撒娇，只要我知道我身边有你，我就能安下心来。”那优花抱着你的力度突然加大了\n“谢谢你，一直陪着我。”那优花说道\n“以后也会哦，不管你遇到什么样的烦恼，我都会在你身边，毕竟……我之前说过的”你看着怀里的那优花，忍不住想去抱紧她\n「站在那优花身边的人，我是不会让给任何人的」"
 tongyong_event.73719949.a: "当庭际，玉人浴出新妆洗"
 tongyong_event.65171977: "洛易的婚礼"
 tongyong_event.65171977.t: "Hoshizora no Memoria"
 tongyong_event.65171977.d: "夜空里，美丽的夏季大三角高悬空中，在星光下两人身影依偎在一起。洛易喜欢夜晚，喜欢夏季的夜空，喜欢牛郎织女，与在祂们身旁的天津四。七月七日是个美丽的传说，相爱的两人能跨越银河的阻碍相逢，星空下的两人也是如此，跨越种种困难最终如牛郎织女一般誓约。\n“喜欢上我这么个麻烦的人，今晚的你真是笨笨的呢。”\n走到这一步，到底花费了多长时间呢？看上去很长，却又感觉很短。在这片牛郎织女相会的银河之下，和她一起缔结一千光年的誓约。"
 tongyong_event.65171977.a: "Eternal Heart"
 kotori_event.1: "琴里苏醒"
 kotori_event.1.t: "琴里苏醒"
 kotori_event.1.d: "经过茉优多次的星幽能力试验，柚子研究所对星幽能力的了解进入了新的阶段\n我们现在对星幽能力的了解已经可以控制星幽能力暴走的星幽使了\n绫濑和茉优在隔离仓前做着准备工作，两人面色凝重，等待着实验的成果\n隔离仓中的紫发少女缓缓睁开了眼睛，绫濑和茉优激动地冲了上去\n“姐姐！”\n“琴里！”\n刚刚醒来的琴里看到两个人扑上来，还有点没反应过来\n“诶？欸欸？绫濑……茉优……？诶？绫濑？怎么感觉……你好像变大了？尤其是胸部……什么情况？怎么变得这么大啊？这是怎么搞的，难道……我是在做梦吗？”琴里一脸茫然地看着两个人，不理解发生了什么，但是，至少眼前的现实和琴里记忆里的有出入，琴里第一反应是这不是现实\n“不是梦，这不是梦！你不要睡过去！”锉刀（划掉）绫濑急切地说道\n“琴里……你终于醒了！”茉优抱住了琴里\n……\n琴里的能力是控制风，曾经因为暴走引发了剧烈的暴风，所以能够有效阻止敌方的空中支援\n苏醒后的琴里在绫濑和茉优的帮助下很快恢复了身体机能，并且也加入了柚子总参谋部"
 kotori_event.1.a: "「欢迎回来，琴里」" 
