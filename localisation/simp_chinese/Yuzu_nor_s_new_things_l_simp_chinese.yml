 aragami_sayo_event.1: "小夜掌权"
 aragami_sayo_event.1.t: "小夜的来临"
 aragami_sayo_event.1.d: "小夜在海上都市多年的成绩让我们认识到她绝对是一位不可多得政治人才，我们现在邀请她成为我们的领导人。我们可以把国家交付于她，她一定不会让我们失望。"
