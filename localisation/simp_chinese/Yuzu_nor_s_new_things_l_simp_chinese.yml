 huhu_leader_desc: "现在到来的是：日共日本能种民工种到40年的究极贪比、和珅看了羞愧得都要说自己是清官、不满蠢驴改动cas的空军司令、邻居屯粮我屯枪的究极战狂、日共苏联能在开战前把德国周围一圈全打一遍的霸权主义者、空投手谕前线微操的微操大师、写了这么一大堆buff还觉得自己弱的屑人——huhu"
 general_of_line_division: "优秀的填线部队指挥官"
 general_of_line_division_desc: "应用多数即时策略游戏跟战略游戏的经验，也从悠星发售的BA中sensei中获得了其下各位学生的光环复制品，这使得部队的肉体能力获得极大的提升，但与之同时带来了一种部队难以承受的负载，部队失去了大部分都进攻能力，只能对敌方进行挠痒痒般的伤害"
 power_of_general: "“书记”的力量"
 power_of_general_desc: "从另一个世界中的书记诺亚手中借来旧设电磁轨道炮与夜间探测设备，这可以提升我们的陆军夜战能力，也能提升部队对空中小人的反击能力从而使的我们可以大幅度减少空军所带来的压力\n千年科技 震撼人心"
 trait_for_chun: "国家征召官"
 trait_for_chun_desc: "既然都获得了填线专用的将领，没有对应的人力怎么行，我可以亲自下场在全国范围内进行大规模的征兵活动，这可以为我们带来巨量的人力修正，但同时，国内的工业生产能力定会因人力大规模的奔赴前线而带来大量的空缺停产"
