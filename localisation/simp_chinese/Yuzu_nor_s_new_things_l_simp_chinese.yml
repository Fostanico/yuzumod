 #将领描述
 makoto_desc: "朱里的同学，以成为服装设计师为目标在六麓学院中学习。\n在匠作为朱里的替身在班上和其他同学交友之前，真琴是朱里为数不多的朋友之一。\n虽然是有名公司的大小姐，但在学校的时候却不是一副正经大小姐的样子，经常喜欢讲黄段子。\n经常会自己设计一些饰品去售卖，不过通常不是为了盈利。\n十分看重友情，对待自己的朋友们十分热情。"
 minamoto_desc: "茅明作为女仆几乎无所不能，那么她具体会些什么呢？\n拷问和审问、深度调查目标、读心、作为保镖暗中掩护（在静流线中也和正宗家的保镖合作保护匠和静流的出行）、监视目标、把人的头旋转若干角度（游戏里的表现是演出画面直接旋转了）、辅佐伊角处理集团事务、长刀对战、格斗术、正规礼仪教学、舞会舞蹈、校内学科教学、枪械和武器的使用、布置展会并对人员器材进行调度、对于其他集团的详细信息掌控、打理兼元别馆等等......\n你问为什么作为一个女仆却掌握这么多技能？因为是一流的女仆。"
 miyako_desc: "白泉学園2年生。世界的に有名な企業のお嬢様かつ、清楚で可憐な美少女。性格は基本的しっかり者だがたまに抜けたところもあり男女とわず人気を集めている。\nいわゆるお金持ちのお嬢様であるが、本人の金銭感覚は超がつくほど庶民的。優等生的な自分とは違った考え方の出来る翔のことをとても信頼していて、翔に対しては時にいたずらっぽい一面を覗かせることも。祖父の経営する喫茶店で社会勉強のためアルバイトをしている。\n不思議な装飾品「アーティファクト」を手にいれたことによって異能に目覚め、持ち前のつよい正義感を発揮し事件の解決に乗り出す。"
 yuuki_noa_desc: "玖方女学院2年生。パフェが大好きで、誰よりも強い正義感を持つ少女。\n希亜が結成した組織『ヴァルハラ・ソサイエティ』のリーダーであり、翔たちもメンバーの数に勝手に含まれている。"
 sora_desc: "白泉学園1年生。社交的な性格で誰ともすぐに仲良くできる、天真爛漫な翔の妹。一人暮らしをしている兄の家に勝手に上がり込んでは、お菓子を食べたりゲームで遊んだりと自由気ままな振る舞いをしている。いつも元気に見えるが実は怖いものが苦手。\n不思議な装飾品「アーティファクト」を手に入れ、面白そうだからという理由で兄と都に協力する。"
 haruka_desc: "白泉学園３年生。気が小さくて大人しい人格と、大胆不敵な女王の様な人格、２つの面を持っている翔の先輩。学園では常に一人だが、クラスメイトに嫌われている訳ではなく、言葉数が少ない「変な子」として認識されている。\n実はかなりのオタク趣味。少女漫画から青年漫画まで幅広く網羅していて、翔が持っている漫画は全部持っている。"
 honoka_desc: "主人公的同班同学，水薙学园的新闻部所属的性格开朗的女孩子。\n和葵关系很好，经常呆在一起。\n平时总是很有干劲，但也是班内的麻烦制造机。"
 wataru_desc: "山吹葵的姐姐，目前在千岁真一郎开的咖啡厅Robin里当店长，因事缺勤的时候葵会来Robin代她的班。\n经常在身上带着零食，发给那些和家长一起来咖啡厅的孩子，久而久之就有些孩子特地来咖啡店找涉要零食吃。如果涉没有给琉璃美味棒吃，那么琉璃就不会因为对美味棒过于狂热而开发出美味棒盖浇饭，佐奈也就不会因此而吃到上吐下泻233\n和春树的班主任乌羽紫是中学以来的同学，两人也曾一起就读于水薙学园。\n十分介意别人直接或间接提到有关自己年龄的事。\n被紫曝出大学时代勾引了准教授而套出了考试题，但涉自己的说法是那个教授向自己告白然后擅自把题告诉了自己。\n在恋爱事情上很八卦，尤其是对于春树和葵的事情会好奇地问来问去。\n知道紫和她哥哥过去的事，因此有时也会比较担心紫。在紫想吸烟的时候也会去制止她。"
 nanao_desc: "假屋和奏打工的咖啡店老板，与她的外表相反，是一位沉稳气质的女性。本体是一只雌性黑猫，被称之为“魔灵”（艾尔普），通过与他人缔约完成缔约者的愿望来收集心之碎片（心の欠片），收集碎片的目的是成为人类。"
 akagi_desc: "本作出场的魔灵之一，本体是一只乌鸦，种族为渡鸦。\n说话时有着在句尾加上“喏酱（のじゃ）”的口癖，因此被柊史起了个喏酱萝莉（のじゃロリ）的外号。\n缔约过的魔女有椎叶䌷和木月千穗子，并且赤城是在和䌷有着契约的期间和千穗子缔约的。\n因为原型是一只乌鸦，所以在人形态时，如果被䌷说教而需要正坐时便会感到很痛苦。\n非常喜欢吃䌷做的鸡肉丸子。\n魔灵之间涉及领地争夺，因此在千穗子的契约期间，赤城在千穗子所在的地方和相马七绪就领地问题有些过节。\n不喜欢遵守魔灵之间的规矩，因此有时候也会做出一些让七绪有些无语的事来。\n官方中文版最初发布时译名为“赤木”，但在追加的修正补丁中将“赤木”修改为了“赤城”。"
 kotarou_desc: "主人公の幼馴染で、地元の神社の跡取り息子。\n学園でのクラスは別々だが、主人公との付き合いは長く仲が良い。\n成績は悪くないのだが、毒舌で生活態度にも多少難あり。\n幼い頃は強い霊感を持っていて、力が弱まった今もこの世ならざるものの存在を感じる事が出来る。"
 itsukishishishihimenomikoto_desc_commander: "穢れ祓いの神様。土地を治める卯花之佐久夜姫と違い、土地に散らばる穢れを集めて祓うことで、大きな災難を防いでいる。千歳春樹が切っ掛けで永い休眠から目覚めてしまう。\n性格は面倒くさがりで引きこもりがちだが、自分の仕事はしっかりこなしている。お仕置きにドキドキしてしまったりと、ちょっとMっぽい部分がある（本人はドMであると言っている）。\n家事全般は従者の蘇芳に任せている。"


