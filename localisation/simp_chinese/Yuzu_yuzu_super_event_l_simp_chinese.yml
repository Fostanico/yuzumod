l_simp_chinese:
#名言
 we_nuke_hoori_quote: "露の世や さりながらも あはれなり\n露水之世，纵然虚无，亦存哀怜\n名月を 取ってくれろと 泣く子かな\n幼子泣求：“请把明月摘下予我”\n——小林一茶《俳句三首》"
 we_nuke_washizu_quote: "白骨露於野，千里无鸡鸣。\n生民百遗一，念之断人肠。\n——曹操《蒿里行》"
 we_marry_with_kanna_quote: "愿我如星君如月，夜夜流光相皎洁。\n月暂晦，星常明。\n留明待月复，三五共盈盈。\n——范成大《车遥遥篇》"
 we_marry_with_mako_quote: "宜言饮酒，与子偕老。\n琴瑟在御，莫不静好。\n——《诗经·郑风·女曰鸡鸣》"
 we_marry_with_murasame_quote: " 在青山绿水之间，我想牵着你的手，走过这座桥，\n桥上是绿叶红花，桥下是流水人家，\n桥的这头是青丝，桥的那头是白发。\n——沈从文《致张兆和情书》"
 we_marry_with_hazuki_quote: "我欲与君相知，长命无绝衰。\n山无陵，江水为竭，冬雷震震，夏雨雪，天地合，\n乃敢与君绝！\n——汉乐府《上邪》"
 we_marry_with_daozhu_quote: "骑老奶奶过马路，骗小学生抽锐刻；\n驾驶飞机撞大楼，火烧巴黎圣母院；\n枪杀老林肯，囚禁曼德拉；\n下海唤醒哥斯拉，上天联系三体人。\n恭喜你娶到本mod最坏角色"
 we_marry_with_yoshino_quote: "昼出耘田夜绩麻，村庄儿女各当家。\n童孙未解供耕织，也傍桑阴学种瓜。\n——范成大《四时田园杂兴·其三十一》"
 we_marry_with_mibu_quote: "白日不到处，青春恰自来。\n苔花如米小，也学牡丹开。\n——袁枚《苔》"
 we_marry_with_koharu_quote: "蹴罢秋千，起来慵整纤纤手。\n露浓花瘦，薄汗轻衣透；\n见客入来，袜刬金钗溜。\n和羞走，倚门回首，却把青梅嗅。\n——李清照《点绛唇·蹴罢秋千》"
 we_marry_with_ruri_quote: "有狐绥绥，在彼淇梁。心之忧矣，之子无裳。\n有狐绥绥，在彼淇厉。心之忧矣，之子无带。\n有狐绥绥，在彼淇侧。心之忧矣，之子无服。\n——《诗经·卫风·有狐》"
 we_marry_with_tia_quote: "野有蔓草，零露漙兮。有美一人，清扬婉兮。邂逅相遇，适我愿兮。\n野有蔓草，零露瀼瀼。有美一人，婉如清扬。邂逅相遇，与子偕臧。\n——《诗经·郑风·野有蔓草》"
 we_marry_with_noa_quote: "柔情似水，佳期如梦，忍顾鹊桥归路。\n两情若是久长时，又岂在朝朝暮暮。\n——秦观《鹊桥仙·纤云弄巧》"
 we_marry_with_ayase_quote: "北方有佳人，绝世而独立。\n一顾倾人城，再顾倾人国。\n——李延年《李夫人歌》"
 we_marry_with_rena_quote: "文彩双鸳鸯，裁为合欢被。\n著以长相思，缘以结不解。\n——汉代·文人五言诗《客从远方来》"
 we_marry_with_kaguya_quote: "我住长江头，君住长江尾。\n日日思君不见君，共饮长江水。\n此水几时休，此恨何时已。\n只愿君心似我心，定不负相思意\n——李之仪《卜算子·我住长江头》"
 we_marry_with_nene_quote: "从别后，忆相逢，几回魂梦与君同。\n今宵剩把银釭照，犹恐相逢是梦中。\n——晏几道《鹧鸪天》"
 we_marry_with_meguru_quote: "蒹葭苍苍，白露为霜。\n所谓伊人，在水一方。\n溯洄从之，道阻且长。\n溯游从之，宛在水中央。\n——《诗经·秦风·蒹葭》"
 we_marry_with_tsumugi_quote: "蛾儿雪柳黄金缕，笑语盈盈暗香去。\n众里寻他千百度，蓦然回首，\n那人却在，灯火阑珊处。\n——辛弃疾《青玉案·元夕》"
 we_marry_with_natsume_quote: "常羡人间琢玉郎，天应乞与点酥娘。\n尽道清歌传皓齿，风起，雪飞炎海变清凉。\n万里归来颜愈少，微笑，笑时犹带岭梅香。\n试问岭南应不好，却道：此心安处是吾乡。\n—— 苏轼《定风波·南海归赠王定国侍人寓娘》"
 we_marry_with_suou_quote: "老妻画纸为棋局，稚子敲针作钓钩。\n但有故人供禄米，微躯此外更何求？\n——杜甫《江村》"
 we_marry_with_mayu_quote: "埋头苦干是第一，熟练生出百巧来。\n勤能补拙是良训，一分辛苦一分才。\n——华罗庚《治学》"
 we_marry_with_sana_quote: "将这份令人着急的心情传递给你的话，\n之后会有所改变吗？\n就算是这样的我，\n也一定要比谁都更喜欢着你！！！"
 we_marry_with_sayo_quote: "琼姿只合在瑶台，谁向江南处处栽？\n雪满山中高士卧，月明林下美人来。\n寒依疏影萧萧竹，春掩残香漠漠苔。\n自去何郎无好咏，东风愁寂几回开？\n——高启《梅花九首（其一）》"
 we_marry_with_tsubasa_quote: "死生契阔，与子成说。\n执子之手，与子偕老。\n——《诗经·邶风·击鼓》"
 we_marry_with_rino_quote: "早晚下三巴，预将书报家。\n相迎不道远，直至长风沙。\n——李白《长干行·其一》"
 we_marry_with_yune_quote: "垂钓绿湾春，春深杏花乱。\n潭清疑水浅，荷动知鱼散。\n日暮待情人，维舟绿杨岸。\n——储光羲《钓鱼湾》"
 we_marry_with_roka_quote: "梅子留酸软齿牙，芭蕉分绿与窗纱。\n日长睡起无情思，闲看儿童捉柳花。\n——杨万里《闲居初夏午睡起二绝句·其一》"
 we_marry_with_mei_quote: "雪里已知春信至，寒梅点缀琼枝腻。\n香脸半开娇旖旎，当庭际，玉人浴出新妆洗\n——李清照《渔家傲·雪里已知春信至》"
 we_marry_with_nozomi_quote: "弄梅骑竹嬉游日。门户初相识。\n未能羞涩但娇痴。却立风前散发衬凝脂。\n近来瞥见都无语。但觉双眉聚。\n不知何日始工愁。记取那回花下一低头。\n——王国维 《虞美人》"
 we_marry_with_wakana_quote: "莫辞更坐弹一曲，为君翻作《琵琶行》\n——白居易《琵琶行》"
 we_marry_with_suzune_quote: "清洁十分天付与，丹青一点手亲裁。\n从来不向东风媚，独守西窗待月来。\n——顾太清《鹧鸪天·咏白海棠》"
 we_marry_with_sakuyahime_quote: "双星良夜，耕慵织懒，应被群仙相妒。\n娟娟月姊满眉颦，更无奈、风姨吹雨。\n相逢草草，争如休见，重搅别离心绪。\n新欢不抵旧愁多，倒添了、新愁归去。\n——范成大 《鹊桥仙·七夕》"
 we_marry_with_maya_quote: "歌有声，妾有情。情声合，两无违。\n一语不入意，从君万曲梁尘飞。\n——李白《夜坐吟》"
 we_marry_with_shizuru_quote: "花易落，月难圆，只应花月似欢缘。\n秦筝算有心情在，试写离声入旧弦。\n——晏几道《鹧鸪天·手拈香笺忆小莲》"
 we_marry_with_sena_quote: "恼烟撩露，留我须臾住。携手藕花湖上路，一霎黄梅细雨。\n娇痴不怕人猜，和衣睡倒人怀。最是分携时候，归来懒傍妆台。\n——朱淑真《清平乐·夏日游湖》"
 we_marry_with_nanao_quote: "碧丛丛，高插天，大江翻澜神曳烟。\n楚魂寻梦风颸然，晓风飞雨生苔钱。\n瑶姬一去一千年，丁香筇竹啼老猿。\n古祠近月蟾桂寒，椒花坠红湿云间。\n——李贺《巫山高》"
 we_marry_with_honoka_quote: "Well, it's all a matter of perspective.\n仁者见仁，智者见智。\n——007《007：幽灵党》"
 we_marry_with_wataru_quote: "自是寻春去校迟，不须惆怅怨芳时。\n狂风落尽深红色，绿叶成阴子满枝。\n杜牧《叹花》"
 we_marry_with_scp_quote: "驿外断桥边，寂寞开无主。\n已是黄昏独自愁，更着风和雨。\n无意苦争春，一任群芳妒。\n零落成泥碾作尘，只有香如故。\n——陆游《卜算子·咏梅》"
 we_marry_with_napoleon_vi_quote: "“Ei ole esteitä, jotka pysäyttävät päättäväistä mieltä.”\n“没有任何障碍能阻挡决心坚定的心”"
 we_marry_with_huhu_quote: "无论你是怎样看待自己的……我的心意都不会改变\n——喵都厨如是说"
 we_marry_with_takashiro_maya_quote: "阅尽天涯离别苦，不道归来，零落花如许。\n花底相看无一语，绿窗春与天俱暮。\n待把相思灯下诉，一缕新欢，旧恨千千缕。\n最是人间留不住，朱颜辞镜花辞树。\n——王国维《蝶恋花·阅尽天涯离别苦》"
 we_marry_with_hotaru_quote: "雨打灯难灭，风吹色更明。\n若飞天上去，定作月边星。\n——李白《咏萤火》"
 we_unite_the_world_n_quote: "苦尽甘来，忍行沉着\n——全斗焕"
 we_unite_the_world_d_quote: "九州道路无豺虎，远行不劳吉日出。\n齐纨鲁缟车班班，男耕女桑不相失。\n——杜甫《忆昔二首·其二》"
 we_unite_the_world_c_quote: "只有无产阶级社会主义革命才能把人类从帝国主义和帝国主义战争造成的绝境中解放出来。不论革命有什么样的困难，可能遭到什么样的暂时失利，不论反革命掀起什么浪潮，无产阶级的最终胜利是不可避免的\n——列宁《俄共（布）纲领草案》"
 we_untie_the_world_f_quote: "战争即和平\n自由即奴役\n无知即力量\n——大洋国真理部"
 scp_come_here_quote: "“突破敌人坚固防御，必须组织强大的炮兵。炮兵不仅要摧毁敌前沿火力点，更要压制敌纵深炮兵，切断敌预备队机动。要组织好炮火准备、炮火支援、炮火护送三个阶段的衔接。步兵要学会在弹幕后面跟进，坦克要学会利用炮火成果。没有炮兵，就没有突破。”——刘伯承"
 huhu_come_here_quote: "世界上只有喵都是最棒的！喵都是神！（迫害喵都的统统达斯）"
 we_have_fukai_omo_quote: "“特立独行之人，向来英年早逝”\n——《一颗名为太阳的星星》"
 we_forward_with_irno_quote: "我们只有一条出路，那就是胜利！还有另外一条出路，死亡。 §R死亡不属于工人阶级！§!"
 we_forward_with_makoto_quote: "Слава вперёдсмотрящему,\n光荣啊！展望未来的人！\nСлава вперёд идущему,\n光荣啊！大步前进的人！"
 we_unite_with_ilno_quote: "“当然是现在，共产主义将会到来，并永远延续下去，而现在的时代终将结束，一起去见证这个时代的结束不是很好么？18年、19年、说不定20年，我们就可以站在时代的门前，像新时代问候：嘿嘿嘿，你好呀！”"
 we_unite_with_makoto_quote: "「你、你可别后悔啊，就算你到时候抱怨胸太小，本、本店也是不支持解约的啊」\n——三司绫濑"
