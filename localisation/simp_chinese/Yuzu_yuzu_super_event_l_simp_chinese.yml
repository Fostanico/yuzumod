 we_nuke_hoori_close_buttom: "萋萋夏草深，皆是武士旧梦痕"
 we_nuke_washizu_close_buttom: "沙罗双树花失色，盛者必衰如沧桑"
 we_marry_with_kanna_close_buttom: "取次花丛懒回顾，半缘修道半缘君。"
 we_marry_with_mako_close_buttom: "知子之好之，杂佩以报之"
 we_marry_with_murasame_close_buttom: "枕前发尽千般愿，要休且待青山烂"
 we_marry_with_hazuki_close_buttom: "水面上秤锤浮，直待黄河彻底枯"
 we_marry_with_daozhu_close_buttom: "先坏带动后坏"
 we_marry_with_scp_close_buttom: "到中流击水，浪遏飞舟"
 we_marry_with_yoshino_close_buttom: "Ciallo～(∠・ω< )⌒☆"
 we_marry_with_mibu_close_buttom: "劝君莫惜金缕衣，劝君惜取少年时"
 we_marry_with_koharu_close_buttom: "有美一人，清扬婉兮"
 we_marry_with_ruri_close_buttom: "沅有芷兮澧有兰，思公子兮未敢言"
 we_marry_with_tia_close_buttom: "雪沫乳花浮午盏，蓼茸蒿笋试春盘"
 we_marry_with_noa_close_buttom: "得成比目何辞死，愿作鸳鸯不羡仙"
 we_marry_with_ayase_close_buttom: "金风玉露一相逢，便胜却人间无数"
