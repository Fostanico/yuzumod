 #事件
 kkr_event.1.t: "玖玖瑠的到来"
 kkr_event.1.d: "在另一条世界线，玖玖瑠在自动人偶研究中陷入困境，久久无法取得突破。当时间渐渐接近高中毕业，不久小七也离她而去。一天晚上试验再次失败后，玖玖瑠默默关闭了monstella，望着冰冷空旷的实验室，她用移动硬盘带走了所有实验数据，当最后一次实验室AI用冰冷的声音与她道别后，玖玖瑠踏上了学校天台，怀揣着她半生的理想与她全部的存在。在五号赶到之前，与樱元学院做了最后一次告别，随后一跃而下。但是迎接她的并不是粉身碎骨的疼痛，几道刺眼的白光逼迫着她睁开眼睛。\n“快来，这个小女孩还活着！”随后几位身穿制服的男人立即将她送往了医院。医院里，玖玖瑠望着陈旧的病房，不禁问了护士一句：“现在是几几年？”护士答：“1936年，怎么了？”“1936年？我穿越了？”玖玖瑠心里不禁这样想，“昨晚我应该死了才对，这是上天给我的第二次机会？”想到这里，玖玖瑠也顾不得那么多了，在随身携带的超级ai的帮助下，她迅速跑出了医院，混入了当地科学院，并伪造身份进行科学研究，成功受到了关注。"
 kkr_event.1.a: "欢迎欢迎"
 kkr_event.2.t: "自动人偶研究项目"
 kkr_event.2.d: "在一段时间的交流后，玖玖瑠透露出她的自动人偶项目"蒙施泰拉"，希望得到支持，这会给整个国家带来巨大收益，但是开启这个额外的科研项目会额外增加我们的负担，要不要同意呢？"
 kkr_event.2.a: "让她放手去干，这是个有趣的项目"
 get_4kkr_scis: "将会获得§Y玖玖瑠科学家！§!"
 kkr_event.2.b: "我们目前没有那个闲心"
 refuse_kkr_sci: "玖玖瑠将会持续尝试说服我们,如果一直拒绝，玖玖瑠§t可能会离开！§!"
 kkr_event.3.t: "自动人偶项目准备完成"
 kkr_event.3.d: "“基础的实验室环境也准备就绪，前置科技也在来自未来的数据库下快速复刻了，现在让一切重新开始吧。”说完，玖玖瑠坐到电脑前，连接好前世被她死死抱在胸前的移动硬盘，上一次研究的细节不断浮现在脑海中。“这一次我一定要让AI真正拥有‘心灵’，成为我永远的家人。”"
 kkr_event.3.a: "开始研究"
 kkr_event.4.t: "素体准备完成"
 kkr_event.4.d: "（空）"
 kkr_event.4.a: "就这么好摸吗……"
 kkr_event.5.t: "AI模型构建成功"
 kkr_event.5.d: "(文案待填充)"
 kkr_event.5.a: "离成功更进一步了"
 kkr_event.6.t: "研究停滞"
 kkr_event.6.d: "……\n「你这个反应很恰当。刚才的那番话根本不能算是自我介绍」\n「它只是把数据库里的知识讲述出来罢了。这里面完全不包含人类的主观或是感情」\n「它并没有人之所以为人所需要的“灵魂”，以及随之而来的“心灵”」\n「关于该如何模拟出心灵，我们完全找不着门道」\n……\n「最后就是希望你出手帮忙的部分」\n「我希望AI能在你这里学习什么是性欲」\n「……你说什么？」\n「为了让AI能够进化，我希望它能进行性欲方面的学习」\n「支撑人类根本的三大欲望，即食欲、睡眠欲、性欲」\n「以往的自动人偶并没有这三种功能，也没有理由费尽心机特意去搭载这些功能。然而，既然我们要再现人性，欲望是不可或缺的」\n「你打算怎么让自动人偶学习性欲啊」\n「方法我自然也已经想过了，只要你和我做爱就行」\n……………………啊？\n「AI现在需要的不是知识，而是从实践中获取的情感。而为了将这一情感传递给蒙施泰拉，我在自己的体内植入了微型芯片」\n……\n「如果要收集玖玖瑠的情感给ＡＩ使用的话，比起功利的性欲，还是附带一些恋爱情感比较妥当」\n「没什么稀奇的，让我和你约会就好」\n……\n「……既然你这么说的话，嗯，我接受这个建议」"
 kkr_event.6.a: "这一次还是没有办法吗"
 kkr_event.7.t: "约会的尝试"
 kkr_event.7.d: "玖玖瑠主动握住了我的手。\n「怎么，因为要约会所以找我牵手吗？」\n「不是。我忽然记起，以前我摆出那副表情的时候，也有人这样牵着我的手……」\n「然后我就稍微好过了一些。不过，就牵一会儿哦」\n「别这么说嘛，一直牵着多好」\n「别蹬鼻子上脸」\n我拉着空空瑠的手，躲开了一个准备故意撞上来的男人。\n「刚刚我就在想啊，空空瑠，你是不是喷了啥啊？有一股很好闻的味道」\n「原来你注意到了啊。我看你什么都不说，还以为是没发现呢」\n「约会的时候不是应该注重打扮吗？所以我试着喷了香水。怎么样？有没有觉得呼吸粗重兴奋不已？是不是开始想上我了？」\n「就不能一步一步来吗？」\n「那你心跳加速了吗？」\n「那当然会了」\n「香味效果明显，记录完毕」\n「约会时如果觉得心跳加速或者兴奋不已记得告诉我，我要做记录」\n……\n「啊，菜送上来了」「哎？！等等，我还没做好心理准备……」\n「哇……唔，呃……好香的味道……可是为了研究我必须忍耐，呜呜……」\n「哈哈，热爱科研的你面对饭菜时意志也会动摇啊」\n「所以……但是……呜呜……」\n「你可以借此机会看看食欲得到满足之后自己对对方的关注程度究竟会降低多少」\n「有道理，你說得太好了」\n之前还一直犹犹豫豫的，一吃起来脸颊立刻就变成了仓鼠的模样。见到她这副可爱的模样，我一个忍不住就笑了起来。\n「唔……？你笑什么？」\n「没，就是觉得吃饭吃得这么香，你好可爱啊」"
 kkr_event.7.a: "有你跟我合作，我很开心"
 kkr_event.8.t: "第一次尝试"
 kkr_event.8.d: "（空）"
 kkr_event.8.a: "「为什么会逃一般的拒绝了」"
 kkr_event.9.t: "学习奇怪的知识"
 kkr_event.9.d: "（空）"
 kkr_event.9.a: "奇怪的知识增加了！"
 kkr_event.10.t: "再次尝试"
 kkr_event.10.d: "（空）"
 kkr_event.10.a: "原来这就是爱啊"
 kkr_event.11.t: "旅游"
 kkr_event.11.d: "「为什么我会研发自动人偶……或许你多少已经察觉到了，但我还是打算亲口告诉你」\n见我点头之后，空空瑠缓缓开始了诉说。\n「我曾经是一个特别黏父母的孩子……但是，我的爸爸妈妈，在某一天遭遇了事故，再也没能回来」\n「我感到非常寂寞，非常悲伤。过了一段时间后……我开始感到无比憎恨,我对丢下我不管的他们感到气愤,我甚至想过，与其给我留下这样的回忆，为什么不干脆带我一起上路呢」\n「尽管如此，我还是无比思念着他们……然而，我们却再也没有机会相见了」\n「就这样，在浑浑噩噩的日子里，我接触到了自动人偶,和人类不同，自动人偶既不会衰老，也不会死亡」\n于是我决定，为自己制造一个绝对不会再离我而去的家人」\n「……那就是你创造的自动人偶对吧」\n「没错。我不是因为爱，而是因为欲望而制造了蒙施泰拉」\n「说不定就是因为这个缘故，我的研究才一直没有起色，我希望蒙施泰拉爱我，但我自己却并不爱它」\n「希望它拥有感情，却一直只把它当做机器」\n「然而，在遇到你之后，我变得不一样了」\n「原本充满焦躁的开发变得愉快起来，同时我也开始会为蒙施泰拉的成长感到开心」\n「我现在对蒙施泰拉的爱情，或许只是我的一厢情愿」\n「所以我希望自己今后能好好重视它，让它有一天可以自豪地告诉大家……能够得到感情真是太好了」\n我搂着空空瑠，仿佛要把她娇小的身躯完全包裹住一般。\n「……嗯，说出来之后心里痛快多了。你听了会不会觉得很沉重？」\n「我愿意倾听关于你的任何事情」\n「……你知道吗，多亏了你，我才能这样提起我的父母」\n「因为你向我倾注了爱情，我才不由自主感叹能活着真是太好了」\n「说实话，我已经很确定自己对你的感情了，这或许和一般的男女之情有些不同，但我希望能够一直陪在你身边」\n「你对我如此重要……不，或许正因如此，我才害怕去思考更遥远的未来」\n「凪……我喜欢你……虽然我有我自己的解释」"
 kkr_event.11.a: "「我喜欢你，应该，十分，非常喜欢」"
 kkr_event.12.t: "仓库中的求婚"
 kkr_event.12.d: "「……我说，凪，能抱一抱我吗？」\n空空瑠略显拘谨地握住了我的手指。她这样的动作十分可爱，于是我缓缓抱住了她的娇躯。\n「……正如你昨天聽到的那樣，我的感情受到了抑制，往后我或许还会因为不明白自己的感情，而让你感到为难」\n「我是一个比其他人都要麻烦的人，即使这样，你依然想和我在一起吗？」\n「这不是废话吗」\n「嘻嘻……既然你这么说，那我就不用犹豫了」\n我将空空瑠的脑袋抱进了怀里。\n「现在我可以回答你那天提出的问题。你能再问我一次吗？」\n一阵低沉的声音传入我的耳朵。我回想起我们刚刚相遇那天的事情。横冲直撞的我说出的那番空洞的话语，并没有说进对旁人没有兴趣的空空瑠心中。但是现在她一定能全身心地接纳我。\n「——夜刀玖玖瑠，和我结婚吧」\n「……嗯，我也想和你成为家人。不论发生什么，我都想和你在一起」\n这略带沙哑的声音，代表着空空瑠竭尽了全力。\n「别哭啊」\n「你向我求婚是料想之中的事情，我不可能哭，是你的错觉」\n「（气鼓鼓）……现在应该哭的是你，你的心愿实现了」"
 kkr_event.12.a: "「我喜欢你」"
