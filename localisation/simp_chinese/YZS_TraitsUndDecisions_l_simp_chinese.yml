 start_event.1.t: "感谢游玩柚子mod"
 start_event.1.d: "自从24年8月份本mod创立至今已经一周年了，我们经过各种努力，终于才有了今天的样子。我们十分感谢那些支持咱们mod的朋友，正是有了你们的关注和支持咱们才能坚持下去。今后我们还会更加努力地更新mod,为大家带来更好的游戏体验!\n\n目前创意工坊内我放了一个可以反馈bug和建议的文档链，还请大家有什么奇思妙想都往里面加！\n- ps：多来点老柚子厨帮我们出老角色的特质和机制求求了\n\n贡献名单（排名有可能不分先后）：\n牢八、御坂真琴、伊尔诺、VAN、岛主、在原七海(老登)、huhu、o5j、统计计划管理、暮风昔云初(芳乃)、Верный、夏目不是枣子姐（LLLJ的ui等作者）、彩云赤霞、小枫(柚子音乐台作者)；特别鸣谢：OpenAI Codex（GPT-5.5，reasoning effort: high/xhigh）、ChatGPT（GPT-5.5 Thinking）、Google Gemini 3.1 Pro Preview、半山烟雨半山晴（为伊尔诺提供情绪价值）、拿破仑六世（同左）、SeaLandX（纯私货）、Alice☆(女仆团作者)、紫琳(日共柚子组件作者)；意见反馈(ID按意见反馈文档，有遗漏请补全)：缄默、LF_Eternity、星鹿(emoji)、沙子、洛易十四、椿、无星之夜以及各位群友、b友的创意和支持柚子mod发展的人。\n\n作者的话：我们mod有一些功能属于未来科技（大嘘），所以数值可能有些超模（来自未来的萝卜子：嘿嘿嘿），所以建议根据难度选择你要开的功能，获得较好的游戏体验，我们还在修改中，希望大家可以提出建议!\n\n欢迎加群讨论：967395223\n·下方左起第一个二维码是bug反馈文档，第二个为本mod聊天群！"
 start_event.1.a: "跳转至下一页"
 start_event.8.t: "柚子更新日志"
 start_event.8.d: "柚子将领包 更新日志 2026.6.14\n\n-针对千恋万花老角色特质进行了重置，使其能够跟上现在的版本\n-丛雨和芳乃顾问数值调整\n-茉子和丛雨军事顾问数值调整\n-两个柚子陆军精神数值均进行了调整\n-芳乃和丛雨的领导人数值调整\n-丛雨吃芭菲决议数值调整\n-部分文案补充\n-更换了千恋万花开场BGM与开幕图\n-部分彩蛋内容调整\n-新增为老婆报仇功能，当玩家结婚角色负伤时，会解锁新决议用来给老婆报仇\n-新增了两个角色：虎太郎和赤诚\n-管乐恋曲角色特质效果补充,新增了虾的军事顾问\n-修改了亚托莉的数值，使亚托莉获得了应有的实力\n-在柚子社军校中新增了精通度获取决议，大伙可以更加容易的刷出满级学说了\n-芳乃工业化挖资源的决议增加了少量资源\n-新增喵都的征收决议\n-新增春风的“天意”决议\n-新增了琉璃的动物朋友决议，可以获取象骑兵编制，不用只有玩印度才能去踩踩背了\n-修复了部分bug，不知道有没有新bug\n-移除了herobrine"
 start_event.8.a: "好的我知道啦"
 start_event.8.b: "跳转至上一页"
 start_event.2.t: "一位苏联工人的日记"
 start_event.2.d: "“我叫伊万，在苏联okmo上班，我的朋友彼得在煤气西制造厂的产线上组装坦克。”\n\n“有一天苏联突然来了一群日本人，他们喊着什么柚子社天下第一，在nkvd的护卫下进入了克林姆林宫。第二天斯大林同志突然宣布取消国内所有的军工组织，包括我和彼得所在的okmo和煤气西。但是我们并没有失业，反而被分配到一间民用工厂开始建设一座奇怪的工厂。”\n\n“厂长告诉我们，这是斯大林同志亲自指示加急建造的近现代化军工复合体。我虽然不懂什么是军工复合体，但是看到那些崭新的车床运进来的时候我不禁由衷地感叹道：太漂亮了。”\n\n“在连续25天的高强度建设后，一座庞然大物在莫斯科西北郊拔地而起，里面有着全新的我们见都没见过的先进机械设备，还有几个穿着奇装异服的日本女人在跟厂长协商什么。”\n\n“但我和彼得顾不了那么多了，刚一上产线就被新设备极高的效率震惊了：一门122榴只需要数分钟就可以在极少人工参与下被各类半自动机械组装起来；一辆bt7轻型坦克仅仅需要工人们摆弄几下操纵杆就能走下产线。”\n\n“我走出工厂大门，看到门口高悬的“柚子陆军制造总局”，敬佩之情油然而生：那些柚子厨可真了不起。”"
 start_event.2.a: "太伟大了柚子厨"
