Miyako_steal_fighter_equipment: "偷点战斗机"
Miyako_steal_fighter_equipment_desc: "从目标国家偷一点战斗机来供我们使用（飞机只给偷战斗机了，舔地机什么的自己设计去，当然战斗机也需要设计，只不过不用造而已）"
huhu_s_revenge: "huhu的复仇"
huhu_s_revenge_desc: "敢打伤喵都？这已经不是一般的敌军了，必须要出重拳！看我派坦克来把你们一个个全部送上天！\n别的我不管，敢打伤喵都，你们就准备上天吧，飞起来！（神鹰哥音）"
ruri_s_animal_friends: "琉璃的动物朋友"
ruri_s_animal_friends_desc: "在山里，我能听到各种各样的声音，芝士……大象？！老爷爷，我来给你踩踩背啦！\n解锁象骑兵编制"
anuo_s_revenge: "§R神罚"
anuo_s_revenge_desc: "打伤琉璃？没事，阿诺不会把你们怎么样的，只不过寻求原谅的是你们，负责宽恕你们的是上帝，而阿诺的任务就是送你们去见上帝喵"
revenge: "为老婆报仇"
revenge_desc: "现在已经管不上那么多了，敌军竟然打伤了老婆，这已经不是小事了，我们需要让敌军做！出！回！答！"
