 YzOpreative_anti_enemy_operative_desc: "我们的情报局局长在原七海已经通过各种情报锁定了敌人安插在我们国家的间谍，于是七海决定发起锄奸行动将他们一举拿下，但是这些间谍很多人是我们政府部门甚至军方的要员，这种行动下达定然会引起国内的一阵恐慌，但是毫无疑问这是值得的"
