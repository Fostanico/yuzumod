 type90_tank_chassis: "柚子YIWG-90式主战坦克底盘"
 type90_tank_chassis_short: "YIWG-90式"
 type90_tank_chassis_desc: "柚子工业兵器集团(YIWG)-90式主战坦克（Type-90 MBT）\n\n90式主战坦克是日本陆上自卫队于冷战后期研发的国产主力装甲装备，由三菱重工主导设计，柚子工业兵器集团（YIWG）作为核心子系统供应商参与联合生产。该坦克于1990年正式服役，旨在应对苏联远东装甲集群威胁，强调火力、防护与机动性的均衡性能。\n\n柚子工业兵器集团（YIWG）作为分包商，承担了90式坦克 复合装甲模块、车载电气系统 与 弹药稳定剂 的研发生产，其 高精度铸造工艺 显著提升了装甲接合部强度。此外，YGBJ为后期升级型号提供的 数字化通信中继模块，增强了坦克与陆自指挥网络的协同能力。"
 type90_tank_chassis_1: "柚子YIWG-90式主战坦克底盘"
 type90_tank_chassis_1_short: "YIWG-90式"
 type90_tank_chassis_1_desc: "柚子工业兵器集团(YIWG)-90式主战坦克（Type-90 MBT）\n\n90式主战坦克是日本陆上自卫队于冷战后期研发的国产主力装甲装备，由三菱重工主导设计，柚子工业兵器集团（YIWG）作为核心子系统供应商参与联合生产。该坦克于1990年正式服役，旨在应对苏联远东装甲集群威胁，强调火力、防护与机动性的均衡性能。\n\n柚子工业兵器集团（YIWG）作为分包商，承担了90式坦克 复合装甲模块、车载电气系统 与 弹药稳定剂 的研发生产，其 高精度铸造工艺 显著提升了装甲接合部强度。此外，YGBJ为后期升级型号提供的 数字化通信中继模块，增强了坦克与陆自指挥网络的协同能力。"
 type90_Rh_120_120mm_gun: "德国莱茵金属 120mm L44滑膛炮"
 type90_Rh_120_120mm_gun_desc: "90式采用一门与豹2相同的莱茵金属制Rh-120 120mm 44倍径滑膛炮 ，设有热套筒、炮膛排烟器以及炮身测曲器，日本并获得德国授权自行生产此炮所需的D-13尾翼稳脱壳穿甲弹（APFSDS）以及DM-12高爆穿甲弹 （HEAT-MP）。Rh-120为最著名的现代西方坦克炮，除了豹2之外亦被美国M-1A1/A2采用。"
 type90_tank_turret: "90式炮塔"
 type90_tank_turret_desc: "90式坦克方正的炮塔造型与豹2主战坦克十分相似，车体与炮塔由钢板焊接而成，炮塔前方与车身正面安装了三菱重工的制钢厂研发的新型复合装甲，其余重要部位则以间隙装甲补强，炮塔顶部也加装特殊装甲以抵抗日渐盛行的攻顶武器。"
 type90_hydropneumatic_suspension: "液气悬挂"
 type90_hydropneumatic_suspension_desc: "90式坦克采用与韩国K-1（88式）坦克相似的复合液气压/扭力杆悬吊系统，这是希望获得液气压悬挂的优异避震性与调整俯仰能力，却不希望成本过于高昂的折衷办法。90式坦克拥有六对承载轮，其中第1、2、5、6对承载轮由液压悬吊支撑，中央的第三、四对则采用扭力杆，如此能节省一些成本。90式与74式的液压悬吊系统都能进行姿态调整， 不过90式的液压承载系统并非横向交叉连结式，此外两侧设有顶支轮，因此90式仅能前后俯仰（俯仰各五度，高低升降范围-255~+170mm），而不像74式既能前后俯仰也能左右倾斜；简化系统的理由除了降低后勤负担之外，由于90式的火控系统精良、主炮火力强大，能在行进间对敌进行精确攻击，故可在缺乏地形掩护的地带（如滩岸、平原）与 苏联T-72/80等一线主战坦克正面交锋。"
 type90_composite_armor: "钢-陶夹层复合装甲"
 type90_composite_armor_desc: "90式坦克的复合装甲以两片冷轧含钛高强镀钢板包夹纤维蜂窝状陶瓷夹层而成，两片外钢板内侧并装有轻金属。日本虽未公布90式坦克复合装甲的技术细节，由于日本拥有全球最先进的陶瓷科技，故西方观察家多半给90式坦克的装甲技术极高的评价，甚至被认为优于乔巴姆复合装甲。"
 type90_Mitsubishi_10ZG32WT_engine: "三菱10ZG32WT 水冷二冲程柴油发动机"
 type90_modern_electronic_equipment: "现代电子设备"
 type90_machine_guns: "74式7.62mm同轴机枪 + M2HB车顶机枪"
 type90_fire_control_system: "先进火控系统"
 type90_auto_loader: "尾仓自动装弹机"
 type90_Mitsubishi_10ZG32WT_engine_desc: "动力方面，90式采用一具三菱10ZG32WT V型10汽缸二行程涡轮增压柴油引擎搭配三菱MT-1500自动变速箱，采用电子式燃油控制系统与燃油喷射供油系统 ，双转子增压机提供增压， 在转速2400转/分时可输出1500马力最大功率，不过这个功率只能持续输出15分钟，而10ZG32WT发动机的最大持续功率为1100马力 （未增压状态的最大功率）。相较于74式坦克的10ZF Model 21 WT发动机，10ZG32WT的排气量与前者相当，但是输出功率则为前者的两倍。MT-5000自动变速箱附有液压变矩器和静液转向机构，共有4个前进档和2个倒档，并具备原地回转能力（双边履带同时反转）。"
 type90_modern_electronic_equipment_desc: "现代电子设备"
 type90_machine_guns_desc: "90式配备一挺M-2HB 12.7mm口径车长高射机枪以及一挺74式7.62mm口径同轴机枪，两者备弹数目分别为600发与3500发 。12.7mm高射机枪设置于车长舱盖与炮手舱盖之间，原始目的是为了让车长与炮手都能操作；然而实际经验却显示这种设计将严重妨碍机枪对左右两侧的射击，这在城镇战中影响至为明显，整体而言并非高明的设计。90式原型车的炮塔两侧各有四具纵列的烟幕弹发射器，不过早期的量产车型仍使用与74式坦克相同的73式三联装烟幕弹发射器，后期型则改为与原型车相同的形式。"
 type90_fire_control_system_desc: "火控观测方面，拜日本电子科技先进之赐，90式坦克在这方面拥有先进的水平。90式的火控/观测系统包括 一具由日本著名光学厂商Nikon研发的炮手瞄准仪，整合有红外线热影像仪、钕-钇石榴石（Nd-YAG）激光测距仪与稳定系统，以及一具富士公司（Fuji）生产的独立稳定式车长日间全周界瞄准仪，整个系统核心为一具数位弹道计算机 。炮塔与主炮的伺服/稳定装置与前述观瞄装置连动，使主炮能追随瞄准仪的视界进行瞄准；此外，炮手还有一具与主炮同轴的备用管状瞄准镜。\n弹道计算机是90式坦克火控系统的核心，能依据自动由传感器输入或由人工输入的各项信息如横风、气压、目标距离、目标未来位置、视差修正量、 炮耳倾斜（相较于水平面）、炮膛磨损、发射弹种等等，计算出火炮瞄准线、前置角等射击参数，并控制瞄准仪的瞄准线自动锁定，遂获得优秀的第一发命中率；此外，由于炮塔、炮身、观测器都有稳定装置，使得90式具备一流的行进间射击能力。炮手热影像仪具有两个荧幕，一个位于炮手席，另一个 则设置于车长席，使车长能分享热影像仪取得的影像。 \n90式在昼间具有猎歼（Hunter-Killer）能力，车长能先以独立瞄准仪进行搜索，搜获目标后便按下炮塔自动定向钮，将炮塔转向新的目标，让炮手以热影像仪、激光测距仪精确锁定并开火，同时刻车长继续搜索下一个目标，故多目标接战能力十分出色；此外，即便炮手正在追瞄某个目标，如果车长发现一个优先程度更高的目标，还是能以自动定向功能自动将炮塔转向至新的目标。90式坦克的车长拥有一套特殊的头盔瞄准系统，车长戴上头盔并启动连结界面后，瞄准仪便与炮塔和炮身的服务器连动，使主炮的指向与车长视线一致。"
 type90_auto_loader_desc: "90式坦克的自动装填系统由三菱重工研发，与勒克莱尔的系统类似，都是炮塔尾舱平推式，采用弹带输送弹药，优于俄国坦克的旋转式自动装填系统。90式坦克共可搭载40发主炮弹药，其中约25发储存于炮塔尾部的自动装填系统中，另15发则位于驾驶座右侧的弹舱内，此种配置也与勒克莱尔坦克类似。自动装填系统由炮手的计算机控制弹种选择，炮弹依照种类摆放在特定弹位；装填时系统依照炮手选择的弹种，将该弹种的弹位转到提取位置并填入炮膛。采用自动装填系统,使得车上乘员减至3人，并且拥有11发/分的高射速。自动装填一向是俄系坦克的专利， 同时期的西方坦克除了90式之外，仅有法国勒克莱尔坦克采用自动装填。不过考虑到120mm炮弹的尺寸与重量对体型矮小的黄种人而言负担过大，90式采用自动装填系统可谓务实而明智之举。"

