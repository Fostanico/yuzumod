sad_army_must_have_victory: "哀兵必胜"
victory_army_must_be_proud: "胜兵必骄"
proud_army_must_be_defeat: "骄兵必败"
sky_mind_revise: "天意修正"
sky_mind_revise_desc: "天意爷检测到我们的当前的战局正在违背历史走向，天意爷正在对历史进行修正，让局势回归历史"
sky_mind_revise_kr: "天意修正（KR工团特供）"
sky_mind_revise_kr_desc: "天意爷检测到我们的当前的战局正在违背历史走向，天意爷将进行修正（该决议检测依靠检测RUS这个tag，如果在原版看到了，疑似原版的北美专员辖区也是这个tag……逆天蠢驴）"
new_three_national_road_tp: "新三国国道"
new_three_national_road_tp_desc: "新三国道能起到传送门的作用，我们可以使用新三国道进行大规模传送来进行军事调动（本决议CD30天）"
star_night_action: "星夜行动"
star_night_action_desc: "众所周知，星夜突袭能够增加突袭的行军速度，所以我们可以更多使用星夜突袭，来达成高机动的战术（本决议CD30天）"
two_man_conspire: "二人密谋"
two_man_conspire_desc: "众所周知，二人密谋一定是会触发窃听的，我们可以主动让我们成为密谋者，再邀请其他国家进行密谋，这样就制造了二人密谋环境，能够刷新窃听角色，我们只要保证窃听角色是我们的人就能巧妙利用二人密谋环境窃取他国情报"
waerhalajieshe_s_new_member: "瓦尔哈拉结社的新成员"
waerhalajieshe_s_new_member_desc: "在结那也觉醒了圣遗物以后，结那能够帮助苏菲一起寻找圣遗物，加入瓦尔哈拉结社"
trait_for_yuna: "剑术大师"
regression_star: "回归煌星"
