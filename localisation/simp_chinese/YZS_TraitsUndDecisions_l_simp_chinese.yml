Haruka_sky_mind_decision_desc: "春风学姐的能力是伊甸，能够让想要的事情发生，那么这在无形之中是不是也与我们的天意爷拥有了沟通，我们可以让春风了解天意爷的想法，“天意所至，你想不赢都难”——诸葛奶龙"
sky_mind_advent: "天意降临"
