 # 启动界面 GUI #
 open_start_ui_tt: "点击启动柚子将领包启动UI"
 YZ_start_ui_update_button_text: "更新与碎碎念"
 YZ_start_ui_guide_button_text: "游玩指南"
 YZ_start_ui_credits_button_text: "制作人员与鸣谢"
 YZ_start_ui_close_button_text: "关闭启动界面"
 YZ_start_ui_content_text: "[YZ_start_ui_content]"
 YZ_start_ui_update_content: "§Y柚子将领包 更新日志 2026.7.4§!\n\n1、针对DR老角色特质进行了重置，使其能够跟上现在的版本\n2、新增陆军精神吸血鬼部队\n3、新增美羽顾问（早战特化顾问哦）\n4、所有吸血鬼都获得了新的技能\n5、部分彩蛋内容调整\n6、已将把自己塞进通用柚子海军将领的屑群主踢出海军将领一键招募中\n7、增加了as:9nine的新女主如月结那彩蛋将领、军事顾问\n8、新增了DR的大房妃依里将领\n§R9、现在柚子的制造商兼容千禧黎明mod的装备§!\n10、更换了DR的开场BGM和开幕图\n11、修复了部分bug，不知道有没有新bug\n12、移除了herobrine\n\n§Y碎碎念§!\n自从24年8月份本mod创立至今已经度过了将近两年的时光了，我们经过各种努力，终于才有了今天的样子。我们十分感谢那些支持咱们mod的朋友，正是有了你们的关注和支持咱们才能坚持下去。今后我们还会更加努力地更新mod,为大家带来更好的游戏体验!\n\n目前创意工坊内我放了一个可以反馈bug和建议的文档链，还请大家有什么奇思妙想都往里面加！\n- ps：多来点老柚子厨帮我们出老角色的特质和机制求求了\n\n作者的话：我们mod有一些功能属于未来科技（以及友商作品角色），所以数值可能有些超模（来自另一款gal的某位学姐：嘿嘿嘿），所以建议根据难度选择你要开的功能，获得较好的游戏体验，我们还在修改中，希望大家可以提出建议!\n\n欢迎加群讨论：967395223\n下方为本mod聊天群二维码！\n\n\n\n\n\n\n\n\n\n£start_ui_qun_code\n\n\n\n\n\n\n\n\n\n\n欢迎大家进群反馈游戏中遇到的任何问题或者就单纯来唠唠嗑喵"
 YZ_start_ui_guide_content: "§Y游玩指南§!\n\n柚子将领包是挂载式多功能将领包。你可以只把它当作将领扩展，也可以启用完整系统，体验领导人、将领、顾问、军工组织、研究所、经济、宣传、军校、好感度和角色专属事件。\n\n§Y开局选择§!\n青春版更接近单纯将领包，适合想轻量游玩的玩家。完整版开启大多数机制和剧情内容，强度更高，内容也最多。联机削弱版砍掉部分膨胀功能，更适合联机或高难度环境。\n\n§Y主要内容§!\n可替换领导人包括芳乃、宁宁、丛雨、羽月、美羽、小夜、恭平和柚子集体领导人等。模组还提供大量陆军将领、海军将领、政治顾问、总司令、部长和军工组织。柚子军工组织加成较强，显示建立相关决议通常需要对应的三军经验。\n\n§Y角色专属玩法§!\n许多角色内容被集成在将领成长决议和角色事件中。芳乃、绫濑、乃爱等角色拥有事件线。千恋万花、魔女的夜宴、RIDDLE JOKER、星光咖啡馆、天使纷扰、天色幻想岛、天神乱漫、管乐恋曲等作品都有对应角色机制、任务或决议。部分角色需要完成专属内容后才能解锁结婚相关决议。\n\n§Y资源与系统§!\n柚子币是很多系统的核心资源，会用于七二一研究所、军改、工业化、商店兑换等功能。核心圈用于管理领导人、角色加成、商店、工业化和部分专属决议。柚子文化局主要面向附属国转化与整合，可以通过相关资源推进附属国特化和整合进程。\n\n§Y七二一研究所§!\n招募宁宁并成立研究所后，可以建设研发设施、获取突破点、获得研究加成，并强化星幽使相关角色。茉优、羽月、美咕噜、宁宁等角色会关联科学家或研究功能。研究所也包含起爆器、亚托莉相关装备、特殊项目和带额外加成的装甲模板。\n\n§Y工业化与军校§!\n芳乃计划偏向民用工业，美咕噜计划偏向军工扩张。两个工业化都需要柚子币，若同时推进可能会缺钱。自动化工业升级已经实装，只要资源充足，选择初始决议后就能自动推进。\n\n柚子军校可以为将领添加指定特质，推进分阶段军改，并解锁近卫军等内容。军改最后可以偏向步兵或装甲部队，完成后会给予部队强力修正。\n\n§Y彩蛋与宣传部§!\n模组包含八六、和泉妃爱、亚托莉、9nine四位女主和NOeSIS的几位女主等彩蛋角色。八六和亚托莉主要与七二一研究所相关，妃爱与天使纷扰角色内容相关，9nine女主需要招募所有夏和小配音的角色以启动雪色雪花雪之痕，然后启动瓦尔哈拉结社，NOeSIS女主需要先招募来获取。\n\n宣传部可以通过海报、歌舞团和巡演等方式提供增益。柚子厨机制已经重置，可以通过宣传部增加国家柚子厨数量，并围绕柚子厨装备、近卫军、军改和情报机构展开更多操作。\n\n§Y操作面板与兼容提醒§!\n组建核心圈后，可以点击上方挂着的七海打开操作面板，在面板里开关各项决议组。大型改版模组兼容性有限，旧世蓝调、TNO 等环境建议优先尝试青春版。TFR 大部分功能可用，但七二一研究所可能因为研究设施设置不同而不可用。§0本mod与千禧黎明兼容性较好，但是领导人只有三位可用（且均为创作者彩蛋）§!完整版强度较高，如果想要更平稳的体验，可以选择青春版或联机削弱版。"
 YZ_start_ui_credits_content: "§Y制作人员与鸣谢§!\n\n§Y贡献名单（排名有可能不分先后）：§!\n牢八、御坂真琴、伊尔诺、VAN、岛主、在原七海(老登)、huhu、o5j、暮风昔云初(芳乃)、Верный、统计计划管理、夏目不是枣子姐（LLLJ的ui等作者）、彩云赤霞、小枫(柚子音乐台作者)；\n\n§Y特别鸣谢：§!\nOpenAI Codex（GPT-5.5，GPT-5.6sol，reasoning effort: medium/high/xhigh）、ChatGPT（GPT-5.5 Thinking/GPT-5.6 Thinking）、Google Gemini 3.1 Pro Preview、半山烟雨半山晴（为伊尔诺提供情绪价值）、拿破仑六世（同左）、SeaLandX（纯私货）、Alice☆(女仆团作者)、紫琳(日共柚子组件作者)；\n\n§Y意见反馈(ID按意见反馈文档，有遗漏请补全)：§!\n缄默、LF_Eternity、星鹿(emoji)、沙子、洛易十四、椿、无星之夜以及各位群友、b友的创意和支持柚子mod发展的人。"
