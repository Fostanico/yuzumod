 YzOpreative_nanami_1: "意识形态共产主义宣传"
 YzOpreative_nanami_1_desc: "七海在跳蚤市场淘到了两本书，一本叫《资本论》，一本叫《共产党宣言》。也许，这就是那条未曾设想的道路!七海一发不可收拾，成立了一堆马列主义研究小组。让赤旗在插遍我们的国家吧!"
 YzOpreative_nanami_2: "意识形态民主主义宣传"
 YzOpreative_nanami_2_desc: "七海被老爹派到了美丽国转了一圈。回来以后，七海觉得空气中应该多一点自由的气息。然后大街上的报纸开始大力宣传德先生，每次的版面大多被民主自由的气息占去了。那文章谁写的呢？当然是七海半写半抄的啦；抄的是谁的呢，好像岛主被抓去当苦力了..."
 YzOpreative_nanami_3: "意识形态法西斯宣传？"
 YzOpreative_nanami_3_desc: "七海不知道从哪里淘来一堆各式各样的演讲稿，没事就抱着看看。然后命运让她看到了啤酒馆的那个男人。布豪!七海也要奋斗啦!生活不如意？拼搏百天，做不到就二战!"
 YzOpreative_nanami_4: "意识形态中立思想宣传？"
 YzOpreative_nanami_4_desc: "ew，这都是哪儿来的糟老头子，凭啥要我在原七海给他们做宣传啊…………"
