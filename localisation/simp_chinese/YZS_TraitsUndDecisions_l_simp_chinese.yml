 start_event.23.t: "柚子将mod基础引导指栏1"
 start_event.23.d: "Ciallo 欢迎来到柚子模组！\n本模组为挂载式的多功能将领包，提供领导人、将领、顾问、MIO（军工组织）以及一系列的独特决议与个人机制！\n如果你只希望它作为单纯的将领包，你可以在决议栏选择“将领包青春版”（完整版包括所有内容）\n☆可替换领导人：芳乃、零奶、恭平、宁宁、丛雨、羽月、美羽、小夜、柚子集体领导人（类似女仆议会）\n☆将领已大部分实装！海军将领包括：佐奈、宁宁、栞那、七海、羽月、茉子\n目前除了exe的其他作品角色已全（但是许多依旧为白板将，如果有意愿的朋友可以加入我们给我们提供自己喜欢角色的设计方案）\n☆目前拥有顾问&其他内阁：\n 顾问：宁宁、美咕噜、丛雨、芳乃、七海、零奶、恭平、莉音、爱莉等\n部长：百里风实花、户隐憧子、羽月（通过决议解锁）\n总司令：绫濑、夏目、丛雨、巡、凉音、茉子等\n☆柚子MIO：比较轮椅的加成，可能会降低游戏水平；显示建立军工决议需要有15点对应的经验\n陆军-柚子步兵武器制造局&柚子装甲生产设计中心\n海军：柚子近海饺子局&柚子远洋汤圆局\n 空军：柚子空军制造总局\n☆独特的机制&额外内容！\n本模组加入了许多额外内容：角色专属（事件链、任务链等）；新的点数系统—柚子币（金圆券）；核心圈；七二一研究所；柚子文化局；工业化决议；柚子军校；好感度（结婚）"
 start_event.23.a: "下一页"
 start_event.24.t: "柚子将mod基础引导指栏2"
 start_event.24.d: "*角色专属内容：这些内容大部分被集成在“将领成长决议”里；拥有独特事件链、任务链的角色在完成后才能解锁结婚决议\n -事件链：芳乃、绫濑、乃爱\n -独特内容：\n天使纷扰：天音，来海-任务链；辉耶-彩蛋决议“有一个可爱的女孩子找上了你”（彩里正史/if/be线）可额外招募三国彩里\n星光咖啡馆：“做个松饼”决议，可招募汐山凉音；汐山凉音-做甜点决议，提供有限时间的加成\nRIDDLE JOKER:七海-解锁七海情报局&星幽战地医院（如果你想让七海同时担任总司令和政治顾问，请先任命总司令再任命顾问）；茉优-721研究所&“开展对星幽术的研究”决议，重复多次后解锁伊势琴里\n千恋万花：丛雨-给小丛雨吃芭菲，解锁顾问；芳乃-芳乃的穗织振兴计划\n魔女的夜宴：魔宴塔罗牌，每15天可重新抽取，获得永久性的修正；宁宁-721研究所；美咕噜（巡）-美咕噜的装备制造业升级计划；宁宁和紬拥有独特的将领技能\n天色幻想岛：真咲-真咲的连锁饭店，让你快速敲出补给站；爱莉：任务链，解锁独特的水晶支援连\nDRACU-RIOT!：吸血鬼战术小队、莉音-“战胜命运”决议，可升级将领，获得顾问\n天神乱漫：佐奈-决议“给佐奈过生日”，如果你每年都记得给佐奈过生日，你会得到非常强力的佐奈\n夏空彼方：茅羽耶-独特决议（还原原作？）\n管乐恋曲：海老原水濑-独特将领技能"
 start_event.24.a: "点决议的下册浏览其他内容"
 start_event.25.t: "柚子将mod基础引导指栏3"
 start_event.25.d: "*柚子币  花一点政治点就能大量印发，这就是金圆券（划掉）\n柚子系统的核心，721研究院、柚子军改、两个工业化等内容都需要消耗柚子币\n在决议栏“柚子核心圈”，可以通过“柚子经济部”花费政治点获取柚子币；同样在“柚子核心圈”的“柚子商店”按钮，你可以利用柚子币兑换政治点、指挥点、三军经验以及一些有趣的小玩意\n#债券系统试点中！tips：即使你还不上债，你也不会受到任何惩罚（目前版本）\n*柚子核心圈\n可以花费120pp重组柚子核心圈，选择特定的角色（最多三个）进入核心圈，获得特定的增益\n其他的功能决议也被集成在这里，包括任命领导人、组建羽月海军部、七海的专属决议、芳乃&美咕噜工业化\n*柚子文化局\n针对附属国的决议组，可以花费“柚金金”（并非欧金金）（在柚子核心圈-柚子商店购买）将附属国转化为特化附属国形式，甚至获得该国全部核心；“柚子网盘超级会员”（灵感来自对网盘会员的怨念）可以加快转化附属国及整合进程\n*七二一研究所\n招募宁宁后在“柚子核心圈”栏设立721研究所，出现“721研究所”后选择正式成立研究所，任命茉优为研究组组长后解锁全部功能。\n 研究所的功能包括建设研发设施、获取突破点、获得加成卡、提高研究速度等。\n “开展对星幽术的研究”及“给星幽术研究拨款”，能提高科研速度，加强星幽使角色（七海、羽月、茉优、绫濑、琴里），“给星幽术研究拨款”重复多次后招募伊势琴里\n 琴里可以建设空军部，给空军提供增益\n 独特的特殊项目：起爆器（支援连装备、坦克配件） 什么？这不是**，这是按下按钮就能把对面炸上天的起爆器！\n本mod在招募茉优、羽月、美咕噜、宁宁后会生成相应的科学家\n免费赠送的装甲模版：在研究对应科技后可以选择决议生成有额外加成的装甲模版。不是最好的，但大部分情况够用\n *两个工业化————芳乃的穗织振兴计划及美咕噜的装备制造业升级计划\n国家工业腾飞的核心，无论是小国还是大国都离不开它！喜欢我柚子币换工厂吗？\n芳乃计划将专注于民用工业拓张；美咕噜计划则专精军工拓展，如果你同时开启两个计划，你的柚子币可能会不足。\n自动化工业升级已经实装，你只需要保证柚子币充足，选择初始决议后就会自动将工业化进行下去。妈妈再也不用担心我忘记点完工业化决议了\n 完成工业化后会获得较强的工业加成，换到原版来说，就是经济奇迹！\n*柚子军校 -刷将、军改、近卫军\n刷将：可以花费经验和柚子币让将领获得选定特质，再也不用担心没仗打\n军改：分五个阶段，每个阶段都需要招募对应的角色才能开启。军改的最后可以选择偏向步兵亦或是装甲部队。完成军改后，你的部队将获得强大的修正\n近卫军：可以招募柚子厨近卫军，虽然数量有限（\n☆本模组还包含彩蛋角色，她们包括：八六、和泉妃爱、亚托莉、伊尔诺；\n八六事件链在建立721研究所时触发、妃爱在招募小云雀来海（天使纷扰）后解锁的“进行桌边谈话”决议中招募 (感谢妃爱在天使纷扰的倾情演出，hiyohiyo~☆)，妃爱可以通过将领技能替换立绘；亚托莉在721研究所处解锁；伊尔诺（因为花巨资抽收藏集而被做进mod的制作者）在“柚子商店”的千恋万花收藏集中抽取（小抽怡情，大抽伤钱包喵）\n亚托莉在721研究所中解锁，拥有独特的编制和支援连；研究更先进的科技后可以开发更加便宜的改进型号。假如你想要挑战高难度mod，在产能充足的情况下请务必考虑装备亚托莉支援连！"
 start_event.25.a: "下一页"
 start_event.26.t: "柚子将mod基础引导指栏4"
 start_event.26.d: "- 新增柚子宣传部，可以通过挂海报，建立柚子歌舞团以及巡演等增加各种buff，柚子歌舞团巡演一次可以随机给8个地区添加地区临时修正。原先的绫濑演唱会决议拆分为核心圈里面的“组建宣传部”和宣传部中的“举行绫濑演唱会”，前者可以获得顾问。\n- 柚子厨机制重置，现在可以通过宣传部的决议增加国家柚子厨的数量，同时柚子厨各种相关决议需要新增的“柚子社各作游戏”装备，该装备可以在宣传部获取后生产。柚子厨现在按比例计算可用于组建柚子近卫军的人力，柚子厨随着国家人口的增加而增加。\n- 现在每阶段军改决议可以随机增加一位国家非柚子将领“柚子厨”特质，某些军改决议可以解锁特定的强力宣传部宣传决议。\n- 情报机构新增了“国外柚子厨渗透”，每点一次决议可以增加“柚子厨渗透等级”，等级越高原来的破坏行动收益越大！同时情报机构新增了选择国家的决议，分别可以选择主要国家，边境国家，非主要国家，可以一次性选多个国家进行间谍操作，点击“取消选择”一键清空选择决议。取消原来情报机构所有决议需要在战时才能点击的限制。\n新增了一个操作面板，你可以在组建核心圈后点击上方挂着的七海打开面板，你可以在面板里开关各项决议组，原先各类开关决议已移除。\n备注：\n本模组对千禧黎明、TNO等模组兼容性有限，建议开启青春版游玩；TFR大部分功能可用、0721研究所由于TFR未设置研究设施不可用（闪退警告！）\n本模组完整版强度已经在膨胀的路上一路狂奔了（乐），为了较好的游戏体验，你可以选择日共重制、IAR EXAI、各种EXAI等模组来一点小小的天堂之战。或者你可以只用青春版————只要有老婆们就足够了。\n本mod可以在github上下载最新版，github地址:https://github.com/Fostanico/yuzumod 以后可能会记录历次发布的版本\n☆我们也相应取得柚子电台作者同意，将柚子电台整合进我们的mod，因为我们mod可能比较轮椅，所以如果你想听柚子社bgm又不想坐轮椅可以单开他们的mod，地址为https://steamcommunity.com/sharedfiles/filedetails/?id=3143387438&searchtext=%E6%9F%9A%E5%AD%90\n☆来自群友的柚子社与日共小组件，我们的模组受到它很大的启发（设计到代码），不建议同时开启https://steamcommunity.com/sharedfiles/filedetails/?id=3334303111&searchtext=%E6%9F%9A%E5%AD%90%E7%A4%BE\n☆有意见或者bug反馈请在下方链接留言或者欢迎加入QQ讨论，群号967395223 文档https://docs.qq.com/doc/DZVpkdWRBQ2hITFV2 "
 start_event.26.a: "哦我已经迫不及待玩柚子mod力！"
 start_event.27.t: "联机削弱版柚子"
 start_event.27.d: "如果你是如日共希望，iar炼狱等mod的牢玩家，觉得用青春版太坐牢，而完整版又把对面一脚踹死，那么你可以试试这个——联机版的削弱柚子\n 削弱版柚子无法使用工业化，大部分的剧情和机制将以及强度将（芳乃与乃爱除外），亚托莉，柚子近卫军，柚子经济部文化部与替换柚子领导人，起爆器等功能，但是大部分顾问，721研究所大部分功能以及七海的情报局依然可以使用，比完整版更适合联机——van 2025。5.24\n 注：本模式没有文化局，柚金金没有任何用处请不要购买。收藏册也抽不了，所有与收藏册有关的内容在完整版才可以抽出！ "
 start_event.27.a: "明白！"
