yuzu_independence: "独立的柚子之国"
yuzu_independence_desc: "柚子之国已经通过穗织、鹫逗、御一夜的少女们起义获得了最初的领土，但与此同时，我们与日本政府的关系已经降至冰点，不过这也是暂时的，很快……很快……我们就不会再受到日本政府的态度影响了……"
yuzu_infiltrate_japan: "渗透日本领土"
yuzu_infiltrate_japan_desc: "日本长久以来的军国主义荼毒了我们的人民，我们需要以柚子社游戏凝聚人民，对抗日本军国主义"
yuzu_liberate_sea_city: "解放海上都市"
yuzu_liberate_sea_city_desc: "邪恶的日本政府因为害怕吸血鬼的力量而将他们囚禁在孤岛上，我们应该充分利用吸血鬼们的力量，为我们反抗日本军国主义做出准备"
yuzu_use_demon_power: "利用魔王力量"
yuzu_use_demon_power_desc: "辉耶和乃爱对魔王之力都很了解，我们可以适当利用魔王的力量来增强我们的实力"
yuzu_unite_astral: "团结星幽使"
yuzu_unite_astral_desc: "鹫逗有大量的星幽使，他们具有超能力，星幽使对我们来说是很强的助力"
yuzu_borrow_divine_power: "借用神力"
yuzu_borrow_divine_power_desc: "我们的将领中有很多很多神明，卯之花、乃爱、佐奈、栞那、琉璃……她们能够凝聚很多的神力来帮助我们获得神明的支持，以真正的神明之力来根除那个假借神明之名进行暴政的天皇的统治，让他们知道，神明到底站在谁那一边"
yuzu_cross_tsushima: "跨过对马海峡"
yuzu_cross_tsushima_desc: "中国人民与日本人民拥有共同的敌人，那就是日本军国主义，朝鲜和中国东北地区的人民仍然在遭受军国主义与法西斯的压迫，我们应当把饱受压迫的朝鲜人民和中国人民也解放出来"
yuzu_stand_in_world: "柚子之国，屹立于世"
yuzu_stand_in_world_desc: "我们已经解决了军国主义，并且消灭了全亚洲的法西斯余孽，接下来我们该对国内进行一系列稳固措施"
yuzu_overthrow_japan: "推翻日本军国主义"
yuzu_overthrow_japan_desc: "我们已经做好了对日本军国主义的最后一战，我们将鼓舞全国人民，宣布全国总起义，将日本人民从军国主义中救出来"
yuzu_national_congress: "全柚代表大会"
yuzu_national_congress_desc: "在消灭了军国主义后，我们需要决定我们的国体并制定方向，我们应当召集所有柚子少女们进行投票"
Yuzu_land_reform: "土地改革"
Yuzu_land_reform_desc: "日本人民遭受了常年的封建压迫，明治维新只是给底层农民换了一批剥削者而已，我们要解放生产力，推动农业发展，就必须要拿地主阶级开刀"
Yuzu_agriclutural_collectivization: "农业集体化"
Yuzu_agriclutural_collectivization_desc: "农民们获得土地以后，很多农民还没有生产资料，我们应当建立集体化农庄，使用公共的生产资料进行生产，可以解决我们农村地区生产资料缺失的问题，提高农村生产力"
Yuzu_land_contract: "土地承包制"
Yuzu_land_contract_desc: "农民们获得了土地，我们应当激发农民的生产积极性，我们采用土地承包的方式，让农民最大程度获得利益，农民会自发产出更多的粮食"
Yuzu_water_conservancy: "扩大水利工程"
Yuzu_water_conservancy_desc: "国家农业的发展不止要看农民，还要看客观地理因素，我们通过水利工程建设可以有效地改善农业生产环境，提高农业产出"
Yuzu_split_financial_conglomerates: "拆分财阀"
Yuzu_split_financial_conglomerates_desc: "三井、三菱、住友、安田……日本的财阀荼毒了日本的发展，财阀们垄断了工业，日本经济长期处于不健康的状态，为了发展工业，我们必须拆分财阀，制订反垄断法"
Yuzu_encourage_enterprises: "鼓励中小企业"
Yuzu_encourage_enterprises_desc: "财阀们被勒令退出市场后，中小企业如雨后春笋般长出，我们应当引导一下中小企业的发展，从而利于全国的经济长期稳定发展"
Yuzu_strengthen_industry_unions: "加强行业工会"
Yuzu_strengthen_industry_unions_desc: "许多企业在我们的政策下得到了快速的发展，我们不能只注重企业主，还要注重工人权益，我们将成立各行业工会来保障工人权益"
Yuzu_restore_production_order: "恢复生产秩序"
Yuzu_restore_production_order_desc: "国内战争的动荡使国内经济濒临崩溃，我们需要迅速恢复生产，稳固国内经济"
Yuzu_eliminate_remnants: "清除国内军国余孽"
Yuzu_eliminate_remnants_desc: "那些发动了这场战争的罪犯们仍然关押在监狱中，我们需要让他们为他们所犯下的暴行负责！让人民之声来审判他们！"
Yuzu_unity: "团结人民"
Yuzu_unity_desc: "当法西斯和军国主义者都被清理了之后，我们应该终结动荡的国内环境，为了稳定国内，我们可以稍微放松一点清算的标准，真正的敌人只有军国主义者和法西斯，而被迫服从于他们的部分温和派是可以改造并团结的"
Yuzu_secend_congress: "第二次全柚大会"
Yuzu_secend_congress_desc: "战后的一系列政策帮助我们稳定了国内环境，柚子国现在已经踏上了平稳发展的道路，为此，我们有必要再召开一次会议，决定国家未来的走向\n§R最好不要在选择领导人后用决议更换领导人，领导人线是根据现有领导人特质基础上更改特质的，决议更换领导人的后果包括但不限于：卡国策、buff消失、甚至触发bug崩游戏\n并且，领导人线中的领导人特质和决议领导人特质不同！！！不要尝试换掉以后再换回来，同一个角色在国策代码和决议代码上是两个人！"
Yuzu_ayase: "三司绫濑"
Yuzu_ayase_desc: "锉刀（划掉）绫濑拥有丰富的领导经验，我们应当让绫濑来领导国家"
Yuzu_noa: "白雪乃爱"
Yuzu_noa_desc: "乃爱或许不是很靠谱的领导人，但是她能够使我们的空军大幅发展，为了空军发展……或许我们可以信任一下乃爱？"
Yuzu_miu: "矢来美羽"
Yuzu_miu_desc: "美羽拥有丰富的管理经验，在美羽的治理下我们能够获得长久稳定的发展"
Yuzu_sana: "千岁佐奈"
Yuzu_sana_desc: "佐奈或许本人并没有什么领导经验，但佐奈的运气一定可以起到作用"
Yuzu_ling: "丛雨"
Yuzu_ling_desc: "虽然某绿毛刀灵可能看起来不靠谱，但至少她是真正拥有神明支持的，让丛雨来担任领导人或许可以让神明更加支持我们"
Yuzu_luli: "龙胆琉璃"
Yuzu_luli_desc: "琉璃很显然并不会治国，但是作为一个吉祥物……手底下的人可以更好发挥不是么？"
Yuzu_tallest_congress: "柚子最高委员会"
Yuzu_tallest_congress_desc: "个人的领导可能终究会有疏忽的地方，但领导团体就会降低这种可能，我们应当由柚子社全体女主组成最高委员会共同领导"
yuzu_zaozi: "四季夏目"
yuzu_zaozi_desc: "枣子姐拥有开咖啡馆的经验，让枣子姐领导我们或许能够带来新的发展局面"
yuzu_nene: "绫地宁宁"
yuzu_nene_desc: "作为随时随地都有可能0721的……（宁宁黑脸）啊不是，作为拥有丰富隐藏自身经验的宁宁，她一定可以保护好我们的情报"
yuzu_eco: "经济重建"
yuzu_eco_desc: "明治维新以来，日本的经济发展就严重不平衡，我们要打破这种不平衡的经济发展模式，构建我们新的、健康的经济发展模式"
yuzu_civil_industry: "发展民用工业"
yuzu_civil_industry_desc: "我们要发展民用工业，为国家建设做准备"
yuzu_technology: "扩大科研投入"
yuzu_technology_desc: "我们需要扩大对科研的投入，增强柚子国的科研实力"
yuzu_army_industry: "发展军用工业"
yuzu_army_industry_desc: "我们要发展军用工业，为将来的战争做准备"
yuzu_fast_road: "高速公路"
yuzu_fast_road_desc: "旧日本国内的公路建设严重畸形，为了全国的经济发展，我们必须将进行全国性的高速公路建设"
yuzu_electric_company: "扩大国家电力公司"
yuzu_electric_company_desc: "旧日本的电力网络使得我国很多地区都没有稳定的电力供应，这种情况严重限制了我国全国性的工业发展，我们将扩大对国家电力公司的投资，使全国电力供应更加稳定"
yuzu_rural_electrification: "农村电气化"
yuzu_rural_electrification_desc: "供电稳定以后，我们应该将电力也带进农村，我们应该让我国的每一个角落都有灯光照亮"
yuzu_reconstrct: "国家重建计划"
yuzu_reconstrct_desc: "国家已经回到正轨，经济建设蓬勃发展，我们应该制订一系列计划，来规划国家的发展"
yuzu_anti_bobo: "大规模城市化"
yuzu_anti_bobo_desc: "全国性的通电以及公路建设后，我们的建设计划也应该跟上，扩大全国的城市化建设"
yuzu_literacy_campaign: "扫盲运动"
yuzu_literacy_campaign_desc: "在城市化以后，我国的人民知识能力不足就体现出来了，我们在农村设立夜校，在城市设立许多成人大学、技术学校，解决我国的劳工知识能力不足问题"
