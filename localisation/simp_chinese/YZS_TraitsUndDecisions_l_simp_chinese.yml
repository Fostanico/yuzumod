 Megulu_industry_4_desc: "§W引进更多的新式机床来提升我们的生产效率。§!"
 Megulu_industry_5: "§Y改进制造工艺§!"
 Megulu_industry_5_desc: "§W在新式机械的基础上尽可能高效率地完成工业指标，同时保障质量。§! "
 Megulu_industry_6: "§Y产业工人技能培训§!"
 Megulu_industry_6_desc: "§W工人乃工业基石，提升工人的专业能力能够使制造业迸发出更炫目的火花，最大化利用当前的物质条件。 "
 Megulu_industry_7: "§Y未雨绸缪§!"
 Megulu_industry_7_desc: "§W为了应对未来可能的战争，我们必须做好准备!§! "
 Megulu_industry_8: "§Y动员建设企业§!"
 Megulu_industry_8_desc: "§W动员目前的建设部门来集中精力发展重工业。§!"
 Megulu_industry_9: "§Y新型大型工程机械§!"
 Megulu_industry_9_desc: "§W新型大型工程机械将大大提高我们的建设效率和速度，我们的工业发展将如虎添翼! §!"
 Megulu_industry_10: "§Y高标准建设§!"
 Megulu_industry_10_desc: "§W提高建设标准，提升建筑物安全标准，使我们的工厂在遭受轰炸后能以最快速度复工，把敌人打来的炮弹扔回去! §!"
 Megulu_industry_12: "§Y优先保障军用物资§!"
 Megulu_industry_12_desc: "§W大战在即，应军事优先。§! "
 Megulu_industry_13: "§Y钢材乃工业之骨§!"
 Megulu_industry_13_desc: "§W更多的钢材!!!\n将在任意五个地区增加30钢。§! "
 Megulu_industry_14: "§Y炮兵乃陆军之魂§!"
 Megulu_industry_14_desc: "§W利用更多的铬制造更多更好的火炮，让敌人在火炮轰鸣中颤抖吧，恐惧吧，溃退吧。\n将在任意五个地区增加15铬。§! "
 Megulu_industry_15: "§Y干穿对面坦克§!"
 Megulu_industry_15_desc: "§W利用钨提升炮弹穿甲能力，减少地方装甲威胁。\n将在任意五个地区增加15钨。§! "
 Megulu_industry_16: "§Y合成石油实验§!"
 Megulu_industry_16_desc: "§W面对未来可能出现的石油短缺情况，我们应该提前做好准备。 §!"
 Megulu_industry_17: "§Y石油就是生命§!"
 Megulu_industry_17_desc: "§W将在任意三个地区增加两个§Y合成炼油厂§!§!"
 Megulu_industry_18: "§Y秣马厉兵，御敌于国门之外!§!"
 Megulu_industry_18_desc: "§W进攻就是最好的防守，我们必须占据战争的主动权，乘人之危，给予敌人迎头痛击!\n\n与§Y"深挖洞 广积粮 高筑墙 缓称王"§!决议§R互斥§!§!"
 Megulu_industry_19: "§Y深挖洞 广积粮 高筑墙 缓称王§!"
