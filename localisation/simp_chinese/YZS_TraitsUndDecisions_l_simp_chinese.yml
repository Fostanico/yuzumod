military_reform_info_decision: "柚子新军事改革介绍"
military_reform_info_decision_desc: "该决议将介绍一下新的军事改革的机制，可以点开看看新改动，又或者自己摸索，都是可以的\n（如果嫌我笔画太多可以不点的T_T）"
military_reform_event.1.d: "针对原版非常多非常多的平衡性问题（如装甲车、火箭炮等装备无人问津），而P社近几天又向我们充分展现了他无能的平衡能力，所以，出于此种原因，我（们？）尝试对原版的大多数装备进行再平衡，那么平衡方法是什么呢？是让大伙都非常逆天，那就达到了逆天的平衡（反正也是给大伙PVE爽爽的，数值确实比较高，但是呢，确实需要代价，而且启动也比较慢），总共分八条分支：步兵分支、炮兵分支、骑兵分支、轻装甲分支、火力支援分支、机械化分支、闪电战分支、空地一体化分支。\n新军改根据旧有军改进行，旧有军改最后的分支，继承荣耀和拥抱未来，将决定你的后续军改分支：§G继承荣耀线（丛雨线）将获得步兵分支、炮兵分支、骑兵分支；§!§O拥抱未来线（美咕噜线）将获得机械化分支、闪电战分支、空地一体化分支；§!§B火力支援分支和轻装甲分支为通用分支。§!\n§R注意：在一条分支点到底之前，无法选用其他分支，每个分支分五个阶段，每个阶段需要花费一个月进行。§!\n接下来简单介绍一下八条分支的属性都是什么：\n步兵分支：在该条分支中，不仅给了步兵很多加成，还给了炮兵-1宽，然后对于步兵呢，最重要的一点是，在完成最后一阶段步兵改革后，可以解锁6速步兵\n炮兵分支：在该条分支中，重点强化了火箭炮这个没什么人管的玩意，然后还大幅增强了火炮、反坦克炮、防空炮，在这一分支中，可以获得炮兵-2宽的加成，也就是说，配合步兵分支，就会有0宽火炮（P社莫名其妙给火炮那么高宽度，谁家火炮上前线啊），当然，为了跟上步兵的速度，火炮也被强化到了6速\n骑兵分支：在该条分支中，骑兵获得了很多很多加成，那当然有人就要问了，骑兵这么废物给他做一条分支干嘛呢？哎，上上次更新不是新增了一个琉璃的动物朋友的决议吗，我们任意国家都可以玩大象ccb啦，也就是说，可以用大象配合骑兵分支的加成，这样就能达到非常逆天的ccb加成啦"
military_reform_event.2.d: "轻装甲分支：在该条分支中，大幅强化了没人用的轻装三兄弟：轻坦、摩托化、装甲车，在轻装改革三阶段完成后，解锁装甲车改良，这仨兄弟在加强后完全可以自己担一支部队，轻坦负责突破、摩托化负责防御、装甲车负责输出，这仨组合也能形成数值相当不错的部队（12速打底，取决于轻坦的速度），并且，在这条线最后一阶段中，民族精神会给非常强力的补给buff，哪怕不玩这仨，补给buff也是非常香的\n火力支援分支：在该条分支中，强化了三军的火力支援方面的加成，当然，大伙最需要关注的应该是自火和坦歼和在这条线里获得了加成，虽然其他的都是蚊子腿，但是自火和坦歼的加成（-0.5宽）可是实实在在的\n机械化分支：在该条分支中，减了机械化的生产花费，加了很多机械化与装甲相关的加成，由于这玩意本来就强，所以没什么必要多加强（指：机械化-0.5宽）\n闪电战分支：在该条分支中，降低了装甲的生产花费（坦歼和自火也能吃到），然后给装甲补强加了很多buff，不知道在下版本坦歼自火削弱后，装甲在吃了补强的情况下能不能碰瓷坦歼和自火大人（当然这俩在火力支援学说吃到加成了，让坦克碰瓷这俩可能还是有点困难），给了很多装甲攻击装甲防御（我寻思这不还是给自火和坦歼大人喝汤吗）\n空地一体化分支：在该条分支中，降低了飞机的生产花费，然后获得了非常骇人的空军buff，非常非常骇人\n那整体来说呢，几条分支的大概情况就是这样了，美咕噜线这边给了非常多的减价和加成，大伙玩小国也能大量造坦克飞机机械化，丛雨线那边给步炮也给了很逆天的加成，两边强度基本差不多，只是爽的方向不一样，大伙想玩什么就玩什么\n那么最后，祝大伙游玩愉快\n\n\n（小声BB两句，该内容存在彩蛋，大伙们可以自行探索，彩蛋内容和我绝对没有关系喵，没有任何关系喵！）"
