Miyako_steal_civilian_factory: "偷两个民工"
Miyako_steal_civilian_factory_desc: "民工什么的……放在敌人那里敌人也不会用，不如就交给我们来用吧"
Miyako_steal_military_factory_desc: "军工？AI拿着军工也不会造好东西，你不会用我用"
Miyako_steal_dockyard_desc: "就是你这船坞造出来打我运输船的船的？拿来吧你！"
