 YZ_MIO_1_get: "组建柚子步兵武器制造局"
 YZ_MIO_1_get_desc: "虽然战争变化日新月异，但是步兵和火炮依然占有一席之地。因此，强大的火力和皮实的步枪是致胜的关键。万幸，这些姑娘可以帮助我们建立这样的制造商。\n\n将解锁柚子军工组织"
 YZ_MIO_3_get: "组建柚子海军制造屏卫舰总局"
 YZ_MIO_3_get_desc: "为了防止水下小人的无耻偷袭和我们去偷袭敌人，我们不能忽视这些小型舰艇。\n\n将解锁柚子海军屏卫舰组织"
 YZ_MIO_5_get: "组建柚子海军主力舰制造总局"
 YZ_MIO_5_get_desc: "只有拥有一支强大的海军和先进的海军制造商，才能让我们有与那些海权大国争霸的底气。\n\n将解锁柚子海军主力舰组织"
 YZ_MIO_7_get: "组建柚子空军制造总局"
 YZ_MIO_7_get_desc: "我们必须用先进的空军守护我们的蓝天，让我们在战争中无所不知无所不能!\n\n将解锁柚子空军组织"
 YZ_MIO_9_get: "组建柚子装甲生产设计中心"
 YZ_MIO_9_get_desc: "各种迹象表明，未来的战争是依靠装甲力量的运动战而非堑壕战，而钢铁洪流将会撕碎敌人的防线，成为我军突破的利剑。\n\n将解锁柚子坦克组织"
 coms_studying: "请朝武小姐来教学巫女是怎么练成的。"
