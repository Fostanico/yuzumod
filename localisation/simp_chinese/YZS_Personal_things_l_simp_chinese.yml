 #魔宴
 ningning_corps_desc: "将领介绍：绫地宁宁是高中二年级生，和男主、海道秀明、假屋和奏等人是同班同学，因为外表可爱、性格温柔、善于待人接物而在就读的姬松学园拥有很高的人气。\n宁宁实际上是一名魔女，为了实现自己的愿望而在收集着心之碎片。也许是因为这个秘密的存在，宁宁在学院中并没有知心的好友。在收集心之碎片时，宁宁会换上魔女装。魔女装露出度非常高，非常工口，这也让宁宁很羞耻。签订契约成为魔女的代价是会突然无法控制地发情，发情后不自慰的话就恢复不过来，宁宁本人对此感到非常困扰和羞耻。\n宁宁是超自然研究部的部长，但是为了秘密不被发现而谢绝了其它学生的所有入部申请，导致社团一度面临了废部危机。故事中柊史入部之前，超自然研究部长时间只有宁宁一个人。虽然是超自然研究部，但是平时的部活动和超自然关系不大，仅仅是为上门的同学使用塔罗牌等占卜、和同学谈心及提建议协助解决问题等，宁宁也借此寻找收集心之碎片的机会。"
 Meguru_corps_desc: "将领介绍：因幡爱瑠看起来外表打扮华丽，给人以轻浮的印象，但实际上设法给人以这种印象的原因完全是因为她这是第一次踏入姬松学园，想要以这种似乎追赶着潮流的形象融入集体，但似乎效果并不好。同时她经常使用自创的“ciallo”作为打招呼的方式，称是意大利语的ciao与英语hello的组合体。\n虽然爱瑠性格开朗率真，但是开学之后立刻因为重病请了一周的假而无法轻松融入集体（同时内心一直有一个解不开的心结），为了克服这种无法融入集体的状况而向超自然研究会求助。\n实际上爱瑠是喜欢独自一人玩游戏的宅女，喜欢独自一人也可以享受的游戏，比如《怪物猎人》和少女游戏以及《DRACU-RIOT!》（OP结尾处彩蛋）。\n爱瑠对如宁宁这样亲近的人就想不顾一切地蹭上去，也非常热衷于尝试将䌷打扮得有女孩子的味道一点。同时她也是那种带有小恶魔属性的女孩子。不过也会做出噗呀呀的表情的时候，直冒傻气。"
 chou_corps_desc: "将领介绍：椎叶䌷是在高二第二学期这个奇怪的时间段转入男主班级的转校生。但与其可爱的脸和“并非鸡胸的胸怀”不匹配的是一身男高中生制服。男装并非其爱好，而是类似于宁宁的发情，是其作为魔女而付出的代价。如果穿着的女式的服装到达一定点数就会造成强烈的呕吐影响身体。从这方面来看，其实椎叶本身是可以穿女装的，然而代价就是不能穿点数消耗极高的女式内衣。\n童年时期为了摆脱自己家族遗传的体弱的“诅咒”而被家人要求穿男装很长一段时间，也因此椎叶对女装的追求已经到了一种近乎狂热的状态。为人温柔，性格软糯。在日常生活和社团活动中会尽力避免与他人的冲突。发生冲突之后也会用躲避和逃跑糊弄过去。非常重视朋友，即使是在赤城被宁宁、相马七绪等人误认为是再次掏空其他人的心之穴的罪魁祸首的时候一改自己软糯的性格而站出来尝试为赤城辩解。虽然大家并不信就是了"
 Toko_corps_desc: "将领介绍：户隐憧子作为学院的学生会长，人望也很高，外表和丰满的身体导致她成为学院的高人气者。如果说绫地宁宁是2年生中的偶像级人物，那她就是3年级偶像的存在。\n一直展露着笑颜，对谁都很温柔，理想型的前辈的她被大多数学生所崇拜着，实际上也喜欢欺负人。身为学生会长手腕自是一流，也深受教师们的信赖。"
 wakana_corps_desc: "将领介绍：仮屋和奏是保科柊史的同班同学，也是其寥寥可数的异性友人之一。金色短发，个子娇小可爱的女孩子。待人处事时不在意对方的性别，性格活泼的少女。\n在相马七绪的咖啡馆Schwarz Katze打工，充满活力的女孩。关心亲近的人，带有轻微的毒舌属性。尽管如此也有非常容易害羞的一面，不擅长在众人面前表现自己。在父亲的影响下近来迷恋吉他，但因不擅长表现自己而拒绝对别人演奏。"
 #千恋万花
 Murasame_corps_desc: "将领介绍：丛雨酱是神刀“丛雨丸”的管理者。丛雨作为献祭品成为“丛雨丸”的管理者，守护着“穗织”这片土地，认拔出刀的男主为主人，而男主对丛雨的称呼是丛雨酱、小雨。在穗织本地人的一片“丛雨大人”中格格不入\n存在有数百年了，像幽灵一样的姿态，但否认自己是幽灵，且普通人无法看到或触碰到丛雨。具有朝武家族血脉的人（芳乃及茉子）可以看到丛雨，蕾娜因为长期触碰碎片也可见。性格有小孩子的一面，也有大人的一面。不过基本上都是小孩子的一面居多，平时是一个很有元气开朗的女孩子。\n虽然她已经存在了上百年，但其实很胆小，非常怕幽灵鬼怪，和男主一同去与朝武芳乃和常陆茉子会合时曾唱歌壮胆。没有身体，无法进食和洗澡，但是能感受灵力的存在，所以对供奉给神的酒、有灵力的温泉有舒服的感受。\n说话风格类似前作《魔女的夜宴》里的赤城，有着浓厚的古人腔调。在角色歌专辑封面里，丛雨身旁的花是红色的石蒜花（曼珠沙华），花语是“无尽的爱情”，可能也是在暗示丛雨的刀魂身份。"
 Mako_corps_desc: "将领介绍：“常陆茉子家族世世代代侍奉于朝武家。（住在城镇最西端，自认为来往两家之间是很好的运动）是为了培育成巫女姬的护卫而被养育长大的少女。\n虽然在工作上很认真，但是性格相反的没那么稳重。喜欢开玩笑、恶作剧，十分调皮。有时也有害羞的一面，被当作一个女孩子而被夸奖时，会不知道如何是好。虽是忍者，但从小就恐高。曾为了将雏鸟放回鸟窝而轻而易举地爬到树上，却害怕得下不来。\n在角色歌专辑封面里，茉子身旁的花是红色的山茶花，花语是“理想的爱情”。”"
 yoshino_corps_desc: "将领介绍：朝武芳乃穗织建实神社的巫女姬，因为男主把神刀折断，应父亲的要求，要与男主缔结婚约而感到不满。非常擅长奉纳的舞蹈，其舞蹈中也蕴含着祛除土地诅咒和污秽的力量。特别喜欢甜食，爱好甜食的程度到了连鸡蛋烧都要放糖的程度。喜欢田心屋的点心。\n性格略微稳重，稍微带有点冷酷的味道，但是原先的性格并不是这么冷淡的，有着孩子气的一面。表面想努力想装作出冷静沉稳的样子，但是常常有些小破绽，意外的容易被看出。(芳乃排除法：芳乃否定的就是真实的)芳乃的感情其实很丰富，喜怒哀乐很分明，常常就像个有精神的小孩子一样。\n在角色歌专辑封面里，芳乃身旁的花是粉色的樱花（一说是桃花），花语是“爱情与希望”。"
 Lena_corps_desc: "将领介绍：蕾娜·列支敦瑙尔是国外来的女留学生（由对话的“moi”和蕾娜自我介绍的“极光之国”，“拉普兰”[1]，以及送的salmiakki等可以确定是芬兰人）。\n个性开朗正直，而且温柔，一直很有精神。性格直率。遇到挫折也不会因此垂头丧气。总是说「越遇到挫折越要努力加油！」，十分坚强。没有什么特别的黑暗面性格，从小就是个纯粹的孩子，一直这样成长到大。\n在角色歌专辑封面里，蕾娜身旁的花是黄色的茼蒿花，花语是“丰富、多才多艺”"
 Roka_corps_desc: "将领介绍：马庭芦花与男主、鞍马小春、鞍马廉太郎三人是儿时的玩伴。已经毕业，正负责经营自家开的和式甜品屋，是甜点店的主人。因为年纪比其他人稍微年长，常常用姐姐的视线以及口吻来讲话（以及被取笑），但并没有恋爱经验。"
 koharu_corps_desc: "将领介绍：鞍马小春在穗织小镇中唯一的学校上高一，但经常往将臣的班级跑。在芦花姐家的甜点店“田心屋”打工，是男主的表妹。性格温柔，体贴和人，家务也很好，算是一位全能的妹妹。但对自己的亲哥哥廉太郎相当冷淡，原因似乎是因为廉太郎经常为发情勾搭妹子而干出一些蠢事。对男主尤其热情，称呼为“お兄ちゃん”，多次表示想让男主当自己的亲哥哥。"
 #RJ
 Nanami_corps_desc: "将领介绍：在原七海是男主的妹妹。没有血缘关系。怕生，面对首次见面的人说话会结巴，熟络起来就会变得十分亲近，而且略有中二病。\n七海作为秘密组织成员，所属为情报局特勤班，代号Levy9。熟练编程以及黑客技术，主要负责信息援助和后勤工作。据本人所说，使用星幽能力之前念咒语会提高专注力（虽然并没有什么用），拥有的星幽能力是治愈，其原理是强化伤者的自愈能力使得被伤者的伤口快速恢复。\n在角色歌专辑封面中，七海手持的是“红桃K”，而红桃在四种花式中代表的是“爱情”。在过场图的“红桃鬼牌”款式中，牌上手持的是魔女飞行扫帚。"
 Ayase_corps_desc: "将领介绍：三司绫濑是橘花学院学生会会长。经常出演学校宣传片，也常常接受采访、上电视宣传，十分出名。被认为是最有名的星幽使。\n对外宣称是E罩杯。（到底多大玩过都懂）星幽能力是操纵区域内引力与斥力。（但大家应该注意到本mod中721研究所里提升星幽能力的名单里并没有她）\n性格傲娇。对外粉饰了自己的性格，以一副完美女生的姿态应对他人。不擅长早起。对于猫有着难以想像的痴迷，仅仅是在屏幕上见到猫，就会进入变态模式当独自在宿舍的时候会放飞自我，会在宿舍变成一个喜欢玩RPG类游戏的宅女。\n在角色歌专辑封面里，绫濑手持“黑桃Ace”，而黑桃在四种花色中代表的是“权势”。在过场图的“黑桃鬼牌”款式中，牌上手持的是带有黑猫形状的权杖。"
 hazuki_corps_desc: "将领介绍：二条院羽月是橘花学院的宿舍管理员。做事十分认真，责任感很强，性格耿直严肃，非常规矩。也因此被人评价有点吓人、有点拘谨。由于宿舍长的身份，再加上性格使然，她经常会监督同学们的日常作风。但是大家不仅不反感，反而还很仰仗她。\n其星幽能力为水的精制、水流操作，据本人所说，拿着伞会让自己的集中力更高，能力很强大，但本人苦恼于难以精确操控能力。家里是警察世家，受父亲影响，很喜欢看历史剧。甚至会一个人偷偷地进行单人全剧角色扮演，沉浸于演绎中。性格和思想很大一部分也是来自于这些历史剧和时代剧的内容。非常喜欢黑鲷之介，认为是忠义的象征，家里有一屋子的黑鲷之介周边收藏。\n在个人线ED中，出现了收纳雨伞、情书信纸、星幽能水椅、情书信封等意象，以及滚动画面中出现的水滴、伞花、星幽能水力湍流等意象。"
 Mayu_corps_desc: "将领介绍：式部茉优作为学院中的科学家（某种意义上），为男主的学姐，学习成绩很好，但因为某些原因刻意不拿学分不毕业留级了2次。学校默许了式部茉优的这一行为，并且让其负责AIMS信息录入工作。\n其星幽能力为固定空气中的粒子，类似凭空制造屏障。可以制作出各种形状，如空心家具外壳、楼梯等。可以隔空固定，不需要直接接触，被物体遮挡也能发动能力。\n表面上看起来是个大姐姐般成熟的女性，实际上也有会像小孩子一样撒娇的一面。拥有自己的私人实验室。平时通常在自己的私人实验室内进行对各种能力的研究实验。不过作为学院中的学姐，酒量极差，一罐啤酒就能喝醉。\n在角色歌专辑封面里，茉优手持“方块Q”，而方块在四种花式中代表的是“财富”。在过场图的“方块鬼牌”款式中，牌上手持的是死神镰刀。"
 chisaki_corps_desc: "将领介绍：壬生千咲是橘花学院的学生，在原七海的同班同学。同时也是在原七海的闺蜜。社交达人，拥有能闪瞎人眼的社交光芒。\n独生子，无能力的普通人，但正义感充沛。时尚达人。很喜欢给人参谋时装搭配，觉得把身边的女孩子打扮得美美的很有成就感。时尚达人。很喜欢给人参谋时装搭配，觉得把身边的女孩子打扮得美美的很有成就感。进入橘花学院的原因，是因为发现自己对星幽使不了解，所以想要多交一些星幽使朋友\n个人线的过场图使用了与在原七海相同的红桃的花色。在过场图的“红桃鬼牌”款式中，牌上手持的是画着爱心的旗帜与喇叭。"
 gongping_corps_desc: "将领介绍：事先声明，周防恭平是男生，但外貌看上去像个女孩子。无能力者。经常被壬生千咲当成女生来比较胸部大小什么的，食量很大，一顿能够吃下两到三份大份饭，而且饿得超级快。但是他身上一直肩负着理事长的任务，一直在执行一些秘密的任务。"
 kotori_corps_desc: "将领介绍：伊势琴里为橘花学院理事长伊势笃纪的女儿，初中时认识了式部茉优，两人从此成为好友。星幽联结值超高，达到247，是有史以来的最高值。因为被人为引发星幽能力暴走而被拘束在沉睡仓中。但在我们的努力下，如今她的问题已经被解决可为我们效力。"
 #咖啡馆
 kanna_corps_desc: "将领介绍：明月栞那是活过百年以上的死神女，和猫妖御帝一起行动。对21世纪高科技下的产物没任何知识，不擅长使用智能设备，偶尔会说出泡沫经济时代的知识。主要工作为引导灵魂（蝴蝶），处理还在人世间游荡的衰弱灵魂。虽然活了很久，但并没有长者的威严。交谈中有时会顺势捉弄人，并发出“尼嘻嘻”的笑声。但有些时候，她也会表现出阅历丰富、饱经沧桑的一面\n努力练习过做蛋包饭，做出来的蛋包饭被男主给予“温柔的味道”的评价，并且煮出来的咖啡常也受到很高的评价。很容易联想到H的事情，会一个人陷入过激的H妄想。虽然并没有经验。"
 zaozi_corps_desc: "将领介绍：四季夏目是大学里的校花。在学校里拥有很高的人气，多次拒绝别人的表白，被称为“无情的发卡姬”，不擅长摆出开朗的笑容，不喜欢苦味的食物。例如咖啡、青椒。\n喜欢去安静的正统酒吧小酌，爱喝较甜的低度数鸡尾酒。醉了之后性格会稍微变得外向，喜欢开玩笑撩人。事后回想起来会感到羞耻。夏目穿女仆装是个人爱好，并且将经营好星光咖啡馆作为自己最重要的事情，表示在有必要的时候选择退学。因为日文名ナツメ曾被机翻翻译为大枣，所以我们可以亲切地叫她枣子姐。"
 Nozomi_corps_desc: "将领介绍：墨染希是男主的青梅竹马，性格活泼乖巧。在家中的赤磐神社做巫女兼职，对巫女cosplay的说法感到羞耻。不愿意继承神社。\n她拥有灵感能力，能感应到蝴蝶并有凉飕飕的感觉。原本糟糕的认为苦味的咖啡和甜味的甜甜圈一起吃就可以抵消热量，面对食物的诱惑，她只能缴械投降。在男主的邀请下在星光咖啡馆兼职。"
 Hiuchidani_corps_desc: "将领介绍：火打谷爱衣是四季夏目的学妹和墨染希曾经的同学，是性格开朗，表里如一的元气少女。有时候会表现得像个孩子，喜欢布偶之类的可爱事物。有时候也会显得有些娇气，比如经常把家务活推给父母，在星光咖啡馆兼职\n曾经是游泳社社员。游泳晒黑的皮肤迟迟没有复原，这让她稍微有些苦恼。定期考试成绩总是低空飞行，需要做考前恶补。她不习惯恋爱有关的话题，一听到就会脸红甚至亢奋起来。爱衣平时戴隐形眼镜，家中模式会戴上红框眼镜。"
 suzune_corps_desc: "将领介绍：汐山凉音是职业级西点师，做出来的甜点都有非常高的评价。她对制作甜点非常有爱，制作上不做任何妥协，不管成本、价格多高。对待烘焙，她有着自己的坚持，决不轻易妥协，这似乎也导致她经常与他人出现意见上的分歧。\n在工作时会非常认真，但在家中非常慵懒，理想的男友类型是可以帮她承担一切家务，在自己的出租屋里也总是把家务攒着，怕麻烦不想收拾。"
 #Dr.
 Miu_corps_desc: "将领介绍：矢来美羽为月长学院学生，特区事务管理局（阴阳局）风纪班所属的吸血鬼少女，在负责维护治安的组织里工作。责任感很强，属于会好好教导他人的类型。偶尔会说些难为情的话来捉弄人，只是由于她本人就很容易害羞，而且为人单纯，结果反倒成了满脸通红的言语攻击，这样的个性难免让人汗颜。\n虽然周围的人都认为她是个S，但本人却主张自己是个M。害羞的时候会红着脸一字一顿地说出“うーるーさーい”（吵死了）。其能力是生成念力场，可以阻挡子弹等飞速运动的物体，也可直接作用于目标并将其弹飞。"
 azusa_corps_desc: "将领介绍：布良梓和美羽同属于风纪班的人类女孩，月长学院第二宿舍的舍长，主张自己有必要负起住宿生们的监护人的责任。由于幼儿体型常被周遭的人当作小孩子，本人则十分讨厌被人当成小孩子。情绪兴奋或慌张时，会念不清楚单字的发音。对自己的萝莉体型有少许自卑，所以一直强调自己是大人。由于对吸血鬼没有偏见和种族歧视和差别待遇，因而受到许多吸血鬼的欢迎。\n每当话题变成H的话题时，都会很认真的出面制止。动摇的时候说话会带有“喵”的口癖，有时还伴随着心底话的自爆。作为风纪班的成员，梓的射击技术在风纪班中也是No.1，在工作现场是很重要的角色。"
 Rio_corps_desc: "将领介绍：稻丛莉音是在“阿雷克桑”工作的吸血鬼少女，性格温和、纯朴、带着能治愈人的氛围，然而也有一旦决定就不会改变强硬的一面。在宿舍里，负责各种家事，可说是支撑宿舍生活基础的人物。虽然拥有一般常识，但是对性方面的知识却严重缺乏，与其说是纯洁不如说是无知。因此每次谈论到有关H的事情时，本人总是会歪著头去询问其他人。\n在吸血鬼当中是属于后天觉醒型，相对其他先天的吸血鬼来说比较稀有。莉音对自己的能力——怪力，有些许的抵触，使用的话会感到不好意思。因为曾经学习过合气道，加上自身的怪力，战斗力即使和风纪班的吸血鬼们相比也毫不逊色。"
 elina_corps_desc: "将领介绍：艾莉娜·欧莱乌娜·欧文是在欢乐街的赌场工作的俄罗斯留学生，是个吸血鬼，月长学院第二宿舍的住宿生。有时候会使用俄语说话，喜欢把头发弄成单/双马尾，弱点是耳朵和电磁干扰。个性鲜明容易和人打成一片，在平常的对话中常会联想到有关H的话题，也因此经常让周遭的人愣住。而艾莉娜对于工口的事情很有兴趣这点也没有要隐瞒的打算，艾莉娜则声称是基于学术上的观点才对这种事很有兴趣。\n自称是个抖M，而实际上也喜欢被各种各样的Play。恋爱少女状态的艾莉娜会因为太过兴奋无法静下心来睡觉而不停地滚床。其拥有电磁系能力，并且在她身上有不可告人的秘密。"
 Nicola_corps_desc: "将领介绍：尼古拉·凯菲尤丝是从欧洲来的吸血鬼，是个中二病患者，平时以ボク自称。设定控，喜欢在自己身上或者周围添加各种各样的设定，但其实她的中二程度并不太强。为了更接近自己想像中的吸血鬼的模样，在平时都会穿上附有披风的改造制服、并戴上有色隐形眼镜。用着旁人难以理解的词语说话，不过周围的人也都已经见怪不怪了。和艾莉娜同在赌场工作，通过自身的努力作为赌场的荷官出道。大部分人一开始都以为她是男生"
 sayo_corps_desc: "将领介绍：荒神小夜外表看起来是个萝莉，性格也有很像小孩子的一面，但实际上是个年龄超过200年(其实超过400年)以上的吸血鬼。和其他吸血鬼相比，也是个特别的存在，因其提倡吸血鬼和人类共存的想法，并建立了海上都市，住在都市里的吸血鬼也都很感谢小夜所作的贡献并尊敬她。\n身为海上都市的市长，时常和人类政府的官员讨论海上都市的发展，但其立场则保持中立，即使面临不利于吸血鬼们的选择时，也是以能让海上都市继续存在为第一优先。其能力为超回复力"
 #天使
 noa_corps_desc: "将领介绍：白雪乃爱是天使少女。为了守护身为魔王转世的男主，降临到他身边。相貌虽显得幼小，言行举止却十分成熟。遇事沉着冷静但某些内容除外，对天使的工作十分上心，对待身边的人也很诚挚。\n乃爱一直都过着天使的生活，几乎从未接触过人类文明。对漫画，动画，美食等等都充满好奇，并逐渐乐在其中。由于是圣洁的天使，对下流之事非常抵触。"
 Amane_corps_desc: "将领介绍：谷风天音是男主的亲妹妹。雌小鬼，动辄挖苦自己的哥哥。\n她对线下社交缺少兴趣，并且是偏竞技的游戏行家。除了竞技类游戏，自己之前在电脑上玩工口游戏，并说是为了降pvp队友带来的血压。自己私藏的漫画除了包括对JK来说很常见的少女漫画，居然还包括男性向的“刘备”，以至于拿来作为天使的生理学启蒙教材。因此她作为是个起床困难户也不难理解了。\n天音前世为异世界的魔族。"
 WeiZi_corps_desc: "将领介绍：薇姿是谷风天音的前世形态。"
 Kurumi_corps_desc: "将领介绍：小云雀来海是瑞花学院2-C班学生。课上认真听讲记笔记，考试不用突击复习的优等生，悟性极强。辣妹，染发、美甲、外套系腰。精通宅文化。不过她十分怕辣。曾经被众人都不觉得辣的拉面辣到飙泪\n来海前世就是魔王阿里翁麾下名为斯雷的女性魔族 "
 Kaguya_corps_desc: "将领介绍：星河辉耶是自异世界追寻魔王的魔力而来到日本的魔族女子，是异世界中斯内乌王国的第二王女，作为魔族的特征是头上的兽耳。来到日本后和自己的贴身侍从高楯欧丽叶一起生活在车站前的一个摩天大楼的高级公寓内。身为侍从的欧丽叶时常希望辉耶即使是在不同的世界也要保持王女的形象，而辉耶本人认为并没有这个必要。\n辉耶喜欢吃汉堡包，身上带着能够发动认知阻碍的面具，能够让自己以原本着装外出时不受注意。兽耳很敏感，最怕被人摸。并且极其善于整活。"
 Fumika_corps_desc: "将领介绍：百里风实花还是高中生时，就立志成为教师。目前在瑞花学院里是最年轻的教职工，教授现代国语课，李空所在2年级C班的班主任。平时很注意保持师生应有的距离，但唯独男主是个例外，就连一些私事也会去找他帮忙。在私生活之中，性格会比较粘人。\n风实花前世是“与魔王相关的人士”ファリ的转世。ファリ是魔王某种意义上的仆人。"
 Orie_corps_desc: "将领介绍：高楯欧丽叶和星河辉耶一样，是来自异世界的少女，并且是辉耶的侍从。性格非常一板一眼。由于不懂变通，有时候会稍显笨拙。不太会用电器，对她来说那都是“异世界的道具"
 Sairi_corps_desc: "将领介绍：三国彩里是谷风天音的同学，两人特别聊得来。 喜欢玩游戏，经常跟天音一起联机，被天音评价说打游戏时很认真。被异世界的研究所控制过。"
 #幻想岛
 shirley_corps_desc: "将领介绍：夏莉·沃利克是一直生活在浮空岛的土著人类，并不是精灵（其实是男主受到安慰后误认为傻莉莉是来拯救自己的妖精，汉化后导致了误会）。家里人是浮空岛的议会代表，因此被一般称为公主大人。性格开朗直率，成绩优秀，为人认真，生活态度也没问题。擅长画画，曾在竞赛中获得表彰。\n 妄想十分严重，经常陷入桃色的妄想无法自拔，妄想严重到一定程度的时候，会喷鼻血。"
 amagiri_corps_desc: "将领介绍：天雾夕音是从日本来到莱泽鲁格留学的学生，举止有礼的大和抚子系少女。因为父亲的身体原因，从小就跟随着母亲做家务，因此对家务十分精通。十分希望能够服务他人，有着强烈的希望做他人的佣人的想法。\n夕音做的菜十分受好评，有时被透夸奖之后会十分害羞。有时会露出十分恐怖而意味深长的笑容，其强气的性格似乎随母亲。夕音的体温较常人偏低，并具有一定病娇属性。"
 Masaki_corps_desc: "将领介绍：真咲·加亚尔有着红色短发的少女，长着兽耳和兽尾(类似犬类的耳朵和尾巴)，耳朵和尾巴的毛色和头发一样也是红色。巨乳。混血兽人。父亲的名字叫做欧文·加亚尔，纯种兽人，是酒馆“牙与爪的兽亭”的老板。和父亲一起经营着这家酒馆，做着服务生的工作，也被当作酒馆的看板娘。母亲是日本人，在真咲小时候就搬出去住了。\n 真咲性格天真活泼，元气满满。不过早上会懒床，刚起床时也会迷迷糊糊的。喜欢吃好吃的东西，尤其喜欢甜甜圈。作为兽人，嗅觉和听觉比普通人灵敏得多。说话时有加上“哇呼”的习惯 "
 Konoka_corps_desc: "将领介绍：火宫木乃香是在露营期间突然什么都没穿就出现在湖边的神秘少女，在醒来之后只记得自己的名字是火宫木乃香。因为被认定是彷徨人，因此在雷纳德和议会的讨论决策之下，木乃香成为了莱泽鲁格的居民，并交由店主欧文·加亚尔作为她的监护人（形式上的）。说话语速慢，并且有着在句尾加上自我感受的习惯，如“木乃香这样说着”、“木乃香如此想着”。不擅长收拾房间，因此在透发现之前自己的房间里十分杂乱。有时会故意直白地说出一些很羞耻的事。做的便当要么卖相极其恐怖但是味道很棒，要么卖相精美但是味道一般。因为没有出现在莱泽鲁格之前的记忆，所以对于当下并没有什么非常执着或有感情的东西，也对各种情感所带来的感觉感到新奇。"
 Tia_corps_desc: "将领介绍：缇娅·霍芬威尔芬是莱泽鲁格本岛的古老精灵家族霍芬威尔芬之女，不过精灵一族的审美对缇娅的评价是“不算是美女”。平时为人正直，教书认真，但也有冒失的一面，一旦遇到了大脑处理不过来的信息就会十分紧张并且忙手忙脚的，经常觉得自己做了错事，之后疯狂道歉。在学校时会带着一副平光眼镜，虽然试图表现出可靠大姐姐的气质，但是完全失败了。"
 Airi_corps_desc: "将领介绍：白鹿爱莉是头上有着纤细呆毛的女生。是男主母亲的妹妹的女儿，所以是男主的表妹，是这一批来岛上留学的留学生之一。有着“的说”“那个的说”的口癖，几乎每句都有，后来逐渐表现出了自爆系傲娇的特性。\n爱莉其实是非常率真可爱的孩子，但因为很容易紧张，导致难以传达自己的心情。有着小孩子的一面，本人也很想改善这一点"
 #nw
 akari_corps_desc: "将领介绍：兼元灯里是兼元集团的大小姐。责任感很强，一般都会显得比较端庄，但是对别人的赞美很敏感，极度会因为别人的夸赞而手足无措。\n 灯里实际上是个傲娇，而且很不擅长早起。"
 Shizuru_corps_desc: "将领介绍：正宗静流是正宗家的大小姐，六麓学院的二年级生。十分看重正宗家的评价，因此对于自身举止和礼仪都有着很高的要求标准。小的时候学习过长刀，并且有着能够教人的水平。\n对于将棋里的战术名称很感兴趣，认为名字听起来越厉害的战术在对局里就越厉害。不过对于自己是平胸这件事十分在意。"
 Sena_corps_desc: "将领介绍：月山濑奈是兼元家的两位女仆之一，是灯里的贴身女仆，同时也就读于六麓学院侍从科，并在校内的咖啡馆实习。料理水平高超，哪怕是第一次做也能做的很好。匠对她的料理感受是“普通的好吃”。灯里和茅明评价濑奈的料理是“哪怕用很普通的材料也能做出不错的味道，但反过来说就算用再高级的料理也只能做出那样的味道了。”\n在作为女仆拥有优秀的家庭技能之外，还会开车开锁甚至拆弹。不过怕黑，曾经被宅内突发的停电吓哭。"
 Hinata_corps_desc: "将领介绍：国广日向是开朗、直率的(原)后辈。原本是名门望族出身，但是因为家庭的原因只是在一般家庭中养大的，超庶民派的女孩子。曾经吃了豪华料理结果拉肚子好几天，身体很不适应贵族的生活。\n部分立绘中后脑勺的短发没有被扎起，形成了脑后呆毛。日向属于不擅长学习的类型，很快就会燃尽。虽然已经变身为大小姐，但是一直把“超便宜”的东西刻在脑海中"
 Maya_corps_desc: "将领介绍：长光麻夜家风尚武，自小也接受侠义教育，所以是十分有正义感的女孩子。有着一身好功夫，能踹飞劫匪的程度。学习成绩第一。因为非常帅气，所以受到了各式各样女生的喜爱。她原本是在平民的学校上学，但是一段时间后才转来了六麓学院。不过他不擅长与人交往的类型，和别人说话的时候就会很紧张。和绫濑一样，很喜欢猫猫狗狗，被亲近了会很开心。"
 #天神
 sana_corps_desc: "将领介绍：千岁佐奈是男主的妹妹，家事万能并且喜欢料理。负责一家人的饮食，保管男主的零用钱。生日为6月8日，是佐奈来到千岁家的日子，由于真实生日无人知晓，大家就以此作为其生日。\n佐奈个性温和乖巧，做事细心并且总是为人着想，不过却是个吐槽达人。佐奈对鬼故事没有什么抗性，但是，她却有一个不为人知的身份。(提示：在完整版游戏每年到§t6月8日§!可以给佐奈过生日。)"
 sakuyahime_corps_desc: "将领介绍：卯花之佐久夜姫的本职工作是守护真日羽市的土地，治理土地，其治理土地的能力非常独到，保证这里的风调雨顺，是为守护真日羽市而存在的女神。。据说已经活了很久很久了，不过依然很单纯。因为华丽的外表以及高傲的气质，被同学们称为“公主”。\n在现世中，非常爱管闲事，因此总是招来一些麻烦，同时她很喜欢试探和调戏别人，并很享受别人窘迫的反应，其实是个很专情的女孩子，对于很在意的人受到女孩子亲近会吃醋。"
 Ruri_corps_desc: "将领介绍：龙胆琉璃是主角神卯花之佐久夜姬的随从，本体是一个可爱的小狐仙。喜欢猫，会为了救猫不顾自身安危冲到泥头车前，本身也是个傲娇"
 Aoi_corps_desc: "将领介绍：山吹葵是男主的青梅竹马。不拘小节，性格直爽，仪表端庄，对任何人都平等对待，在男女中都很有人气。但是，对于恋爱相当的钝感，这让周围人都感到很惊讶。并且她非常重视约定。"
 Mahiro_corps_desc: "将领介绍：常盘真寻是水薙学园的学生会长，待人温柔，在学院内很有人气。文学系少女，喜欢在图书馆读书，对于自己喜欢的作品也会反复阅读。经常自己单独处理事务，很少去拜托周围的人，似乎很怕给他人添麻烦。在临近引退时联合学生会成员以及不同线中前去学生会帮忙的人改变了水薙学园文化祭以往只能发表成果的状况，将文化祭变成了像其他学院一样能够开店营业、表演才艺的样子。"
 Yukari_corps_desc: "将领介绍：乌羽紫是水薙学园的教师之一，在故事开始的新学期担任了男主的班主任。在水薙学园里算是十分年轻的老师，因此跟学生关系不错。曾今因为穿着被老竹训过。有时会上天台用吸烟来放松。在教师之外也有十分抖S的一面。"
 #管乐
 Tae_corps_desc: "将领介绍：中之岛妙是男主的青梅竹马。小的时候非常怕生，因此那时在搬家到现在住的地方之后也不怎么说话。非常擅长烹饪，做的菜也很好吃，但是拥有着其他人远不能及的扛辣能力。一开始吹的是小号后来该吹长号。性格十分单纯，有时候会相信一些玩笑话，而自己有时候也会在完全没有意识到的情况下说出一些很恐怖的话"
 Noriko_corps_desc: "将领介绍：今宫纪子隶属于赤城山学院管乐队。兴趣是阅读恋爱小说。十分不擅长做料理，总是把菜做糊，甚至到了让人以为是乌贼墨料理的地步。高度近视，不戴眼镜的时候甚至会导致她连眼前的东西是不是人都分辨不出来。从前身体较弱，但是后面为了改善身体状况便开始练习起了管乐，并且一直持续到现在。"
 Sumi_corps_desc: "将领介绍：御影须美是圆山学院的一年级学生，起初加入了圆山学院管乐队，后来在退部之后受到邀请而加入赤城山学院管乐队。作为鼓手的节奏感很好，自己一直以来的性格使得她在班上经常遭受霸凌，一直以来遭受的霸凌让她十分自卑，以至于经常做一些不必要的自责。参加试胆活动的时候虽然说自己被吓到了，但是令人感到不解的是脸上没有任何的表情波动。"
 Yuki_corps_desc: "将领介绍：云雀丘由贵圆山学院的学生，在圆山学院管乐队担当乐队指挥。在音乐方面很有造诣，精通小提琴和钢琴等乐器，同时作为指挥也能听出合奏练习中细微的不足。而且是教科书式傲娇。一直期待能够带领圆山管乐队和赤城山管乐队一决高下，也因此十分厌恶那些让比赛产生不公平的行径。"
 minase_corps_desc: "将领介绍：海老原水濑是圆山学院的一年级生，隶属于赤城山学院管乐队。圆山学院的一年级生，隶属于赤城山学院管乐队。她的姓氏“海老原”里的海老（えび）和日文中的虾（エビ）读音相同，并且海老也是虾类的一种，因此水濑被男主起了个虾仔的外号。"
 #夏空
 Chihaya_corps_desc: "将领介绍：上坂茅羽耶是男主在咖啡店里偶遇的少女。性格明朗，看上去无忧无虑的样子，脸上总是挂着微笑。不擅长厨艺。至今为止没有做过菜。因为身体不好，所以受父母关照，在近期随家搬到了岛上。岛上空气很清新，身体状况得到了恢复。梦想是成为医生或者护士。"
 sasara_corps_desc: "将领介绍：七条沙沙罗是男主在祭典上遇见的少女。塔弦神社神主七条克己的女儿。喜欢吃甜的东西。天真、不谙世事，有时候会连自己也不知道自己在想什么。完全的常识外，没有很多基本的待人处事常识。但却能说出很多歪门邪道的冷知识并以此接梗、吐槽。也没有做家务的经验。心智也很不成熟，完全是一张白纸，很孩子气。很多年没见过自己的母亲。之前一直听父亲的话，留在医院不出门。"
 Yuiko_corps_desc: "将领介绍：三好由比子是男主的表妹，双叶的姐姐。虽然看上去显小，但实际上与主人公同岁。似乎像被父母宠坏了一样，非常任性，争强好胜不服输。个子较矮，还没双叶高，经常被双叶拿来嘲讽，对此非常不服气。孩子王，十分精通于各种玩耍，庙会小游戏之王，投飞镖捞金鱼打气枪都很强，据说是三好美帆教的。厨艺不错，而且仅仅练习几天就能达到接近持平妈妈美帆的水准。头脑也很聪明，但是学习上却不愿意用功。男主检查的时候发现寒假作业一点也没动"
