###乃爱事件链
 noa_event.1.t: "天使降临？"
 noa_event.1.d: "......在我放弃的那一刻，突然有光降临了。不同于红莲之火的，像阳光一样的光，可以看到白色的羽毛。就像雪舞一样，纯白的羽毛飘落下来。在我抬头的地方————有一个天使。"
 noa_event.1.a: "真正的天使？"
 noa_event.1.b: "一定是做梦"
 noa_event.2.t: "薯片可乐!"
 noa_event.2.d: "天使一边吃着薯片，一边喝着可乐，优雅地沉浸在漫画中。而且还会用筷子，很可能是天音教的。看起来真的很享受，昨天还有一种神圣的感觉，真的有点像“天使”...突然变得很世俗。"
 noa_event.2.a: "真是贪吃的天使"

 noa_event.4.t: "为乃爱买衣服"
 noa_event.4.d: "为了帮助异世界远道而来的各位融入生活，我们决定前往商场购买常服。"
 noa_event.4.a: "看看乃爱"
 noa_event.4.b: "休息一会"
 noa_event.101.t: "风实花？"
 noa_event.101.d: "居然在这里遇到了风实花，常服给人带来的感觉跟平日里课堂上完全不一样，非常可爱。"
 noa_event.101.a: "老师你好香"
 noa_event.5.t: "cancanneednewnew"
 noa_event.5.d: "“但是，不得不说..我是天使，我对人类的生活并不熟悉。”\n“说实话，我从来没有见过真正的东西。”\n“所以...我想看看。”\n“诶？”\n“真正的东西，我想看看!”\n“什么？!”\n“啧，不要误会!这只是作为天使的使命，也不是不道德的想法!绝对不是!”\n“......”\n“你怎么不说话啊!”"
 noa_event.5.a: "同意"
 noa_event.5.b: "爱哥不要啦!"
 noa_event.8.t: "海边!"
 noa_event.8.d: "......\n“不用想那么多，反而我觉得自己给你添麻烦了，对不起乃爱了”\n“没有那回事。我也很开心。不仅仅是来海边，还能学到很多不知道的东西。”\n“对我来说...是第一次，像这样玩耍...吃美食。”\n“认识你，和你一起经历各种事情，都很开心。”\n“这样啊，那就好。”\n“嗯嗯。”\n乃爱露出的笑容，比平时更像孩子，来海边真是太好了。"
 noa_event.8.a: "真好"
 noa_event.9.t: "有些疑惑的事情"
 noa_event.9.d: "我们在树荫下擦汗，打开刚买的冰激凌。\n我拉开了环，剪掉了顶端。\n“嗯——哦，很意外的很容易剪下来了。”\n确认了我的动作后，乃爱也剪掉了顶端，把嘴唇贴在了顶端。\n“嗯？嗯？比想象中更难吃啊，这个”\n“要揉着、挤着吃。顺便说一下，我也会咀嚼”\n“揉着...这样就可以了吗？手有点冷...嗯...嗯!”\n“出来了!又脆又爽口!”\n乃爱眼睛发亮，高兴地报告了这个消息\n······\n“正如乃爱所说的，有些事情我很在意。”\n“今天早上说的梦的故事，就像我说的那样。只是...没有告诉乃爱”\n“在梦中看到的战乙女和乃爱的脸很像。”\n“不是亲子或姐妹，只能认为是同一个人，非常相似。”\n“嗯。”\n“这不仅仅是巧合吧？”\n““没想到最后还能笑出来，真是惊讶啊。””\n“魔王最后说的应该是这样的话。”\n······\n“我啊，是通过魔法技术制造出来的。”\n“——不。是我的前世，战乙女。”"
 noa_event.9.a: "乃爱......"
 noa_event.11.t: "约会"
 noa_event.11.d: "“看啊，乃爱把它朝向这边。”\n乃爱手中的烟火照亮了夜晚的海岸。\n乃爱开心地看着那闪耀的光芒。\n“这就是烟火吗？”\n“烟火真漂亮啊，就算只是看着也...嗯，很开心。”\n“乃爱才更漂亮呢。”\n“哈哈...就算是喜欢的人说的话，也不会太高兴吧。”\n“为什么!？”\n“因为听起来只是在开玩笑。”\n“不会心跳吗？”\n“就算是我，也不会因为这句话而心跳。反而觉得很有趣。”\n“原来如此”\n”谢谢。今天的约会很开心，包括这个烟火。”\n“我也很高兴。”\n“这样转动更漂亮哦。”\n“我也要来，看这里看这里~”\n“哦!好棒啊，那个动作，我也要试试。”\n“希望这样的时光能够一直持续下去。”"
 noa_event.11.a: "“所以，让我们继续下去，一起创造更多的快乐时光，我们两个人一起。”"
 noa_event.12.t: "有些奇怪的乃爱"
 noa_event.12.d: "“打扰了。”\n“来了呢...呵呵。”\n看到乃爱不同于平时的微笑，我不由得心跳加速。\n“关于一起睡的事情...”\n“今晚一个人会很寂寞，所以，可以吗？”\n“当然可以，不用确认。”\n“感觉很奇妙啊，乃爱会这样撒娇。”\n“那么...不行吗？”\n“当然可以。”\n“太好了。”\n微笑的乃爱走近了。\n一步一步地靠近我。\n靠近极限的乃爱，紧紧地抱住了我的身体。\n“要做吗？”"
 noa_event.12.a: "乃爱，你有些奇怪啊"
 noa_event.12.b: "让我们酣畅淋漓地大干一场吧!\n我们§R不建议任何人点这个§!"
 noa_event.10001.t: "不对劲!!!"
 noa_event.10001.d: "...\n“孩子，你和我的孩子”\n“魔王的孩子”\n“————!？”\n刚刚还兴奋不已的感情，瞬间冷却了\n这种氛围，好像在哪里...\n三国桑!？\n等等!这是说，现在的乃爱难道是——？\n我立刻想要从乃爱哪里逃走\n但是，我的身体无法灵活的移动\n看着我这样，乃爱咯咯地笑了。\n“好的，我们再来一次吧”\n“嘻嘻嘻”"
 noa_event.10001.a: "§RBAD END§!"
 noa_event.13.t: "恍然大悟"
 noa_event.13.d: "我抱紧了她小小的身体\n像往常一样...不，比王航更紧更紧地抱住她。\n“欸？力气太大了，有点疼...呢。”\n“冷静点，我不会逃跑的。”\n即使乃爱感到疼痛，我也不会放松手臂的力量。\n“疼...啊!”\n我闭上眼睛，将意识集中在自己的内心。\n在深邃、广阔、无尽的黑暗中，一点点红莲之光闪耀着\n拜托了!清洁给我力量!让乃爱恢复原状!\n“这是什么？!到底是什么？!”\n“请恢复原样，乃爱...”\n“恢复原状，是什么意思——”\n不等乃爱回答，我内心的某个东西炸裂了\n眼前变得白茫茫的，奇怪的耳鸣震动着我的大脑\n“欸？啊...我...为什么会...？这样的事情...？”\n“为什么...!竟然想要让魔王寄宿在自己的身体里...!!”\n“乃爱，你恢复了吗？!”\n“我想我恢复了，束缚我的命令已经被魔力吹走了...应该是这样的。”\n“脑海中的声音，暂时消失了...”\n......\n“操纵我的人是...创造我的人”\n“那、那不可能吧——”\n“我认为是创造出战乙女的人们。”"
 noa_event.13.a: "可恶，差点又被骗了"
 noa_event.14.t: "报仇雪恨"
 noa_event.14.d: "......\n“是啊，我或许可以称呼你们为父母。因为有了你们的研究，我才得以诞生。”\n“在残酷的实验中，被迫成长身体，被洗脑成为魔族的敌人，造成了许多伤害，成为了道具。”\n“最后，甚至在死后也要继续被当做道具使用。”\n“因为你们的研究，我对魔族怀有愤怒，但是...”\n“现在，我对你们比对魔族更加愤怒，这很正常吧？”\n“我会...用我自己的手，把你们带到这个死者的世界。”\n“所以，接下来要做的只是发泄，只是发泄一下郁闷而已。所以，请放弃吧。”\n“如果要恨，就恨那些创造了我和参与非人道研究的人的愚蠢吧。”\n“啊啊啊啊啊啊啊啊!!”\n随着尖叫声，闪电划过，空气破裂，大地震动，剧烈的闪电轰鸣\n收到这一击，不可能还活着。\n只是“如果受到这一击的话”而已"
 noa_event.14.a: "战斗，爽!!!"
 noa_event.15.t: "新生活"
 noa_event.15.d: "“很高兴”\n乃爱一边开心地说着，一边转了个身回头看着。\n就像那个声音一样，乃爱露出了满脸的笑容。\n“真的，很高兴”\n“能够遇见你，能够喜欢上一个人，能够得到幸福。”\n“所以，谢谢”\n“我现在非常幸福，不会放弃第一次得到的幸福”\n“所以，希望你也...绝对不要离开我”\n“喜欢你...非常喜欢。全部都喜欢”\n“...很奇妙呢”\n“虽然已经被说了很多次喜欢，但是完全没有听腻，每次被说到...都会心跳加速”\n“有点...越是和你在一起，就越觉得自己喜欢上你了呢”\n“今后也请多多关照”"
 noa_event.15.a: "请多关照!"
 noa_event.102.t: "事后"
 noa_event.102.d: "哇啊啊？!我...我做了不可思议的事情啊!"
 noa_event.102.a: "天使羞羞"
 noa_event.103.t: "冰激凌"
 noa_event.103.d: "乃爱似乎很喜欢吃冰激凌，要不要给她买一份呢?"
 noa_event.103.a: "好耶"
 noa_event.103.b: "我们付不起那个钱"

