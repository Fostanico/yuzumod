 # 作用：显示当前SD序号并把留言文本交给scripted localisation分流；要点：用户可直接填写下方每个角色、每张SD对应的留言键。署名：伊尔诺+2026-06-09+assisted by Codex
 character_sd_tooltip: "§Y切换SD与留言§!\n点击后显示下一张SD\n当前SD：[?number_of_sd|0]/[?number_of_sd_max|0]"
 character_sd_message_text: "[YZ_married_sd_message]"
 YZ_married_sd_message_default: "【请填写：默认婚后留言】"
 YZ_married_sd_message_43_1: "「但、但是，如果你非要这么说的话，我也可以嫁给你哦？反正，像哥哥你这样的废柴，也就只有我会要吧」"
 YZ_married_sd_message_43_2: "「呀，呀啊啊！怎，怎么了？」"
 YZ_married_sd_message_43_3: "「重要的妹妹吗。呼呼呼呼……」\n「但是……难道，是仅仅把我当妹妹来看？　那样还真是，非常的不妙啊……」"
 YZ_married_sd_message_43_4: "「啊，并，并没有什么别的意思哦！只是作为妹妹，对于要成为哥哥的女朋友的人，果然还是要了解一下的啊」"
 YZ_married_sd_message_43_5: "「才不是呢！哥哥......一像哥哥这样的人，妹妹肯定是殿堂级的！妹妹就是正义！」"
 YZ_married_sd_message_43_6: "「只是个妹控而已！妹控不是变态，妹控是正义！」"
 YZ_married_sd_message_43_7: "「嘻，呵呵呵......哥、哥哥送的礼物。胸针的礼物......」"
 # 作用：介绍约会、赠礼、战时支援和日常互动四个功能模块；要点：概括各模块成本、收益与冷却规则。署名：伊尔诺+2026-06-08+assisted by Codex
 date_bac_tooltip: "§9约会§!\n支付§Y150§!政治点与£GFX_yz_money §Y600§!柚子币，选择五种约会场景之一。\n约会会大幅提高心情、信赖与羁绊；所有约会共享约§Y90天§!冷却，冷却按周结算，一次只能选择一个喵。\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
 # 作用：展示约会图片、降低后的成本、差异化收益与共享冷却；要点：五个按钮均消耗150政治点和600柚子币。署名：伊尔诺+2026-06-09+assisted by Codex
 date_buttom_left_one_tooltip: "§9海滩§!\n\n\n\n\n\n£date_beach\n\n\n\n\n\n\n海风与浪声相伴，和她度过轻松的一天。\n\n消耗£GFX_pol_power §Y150§!政治点数\n花费£GFX_yz_money 600柚子币\n心情：§G+24§!  信赖：§G+15§!  羁绊：§G+18§!\n约会冷却：[?yuzu_married_date_cooldown|0]/90天（每周结算）\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
 date_buttom_left_two_tooltip: "§9商圈§!\n\n\n\n\n\n£date_shopping\n\n\n\n\n\n\n在热闹的街区闲逛，也许会发现彼此喜欢的新事物。\n\n消耗£GFX_pol_power §Y150§!政治点数\n花费£GFX_yz_money 600柚子币\n心情：§G+18§!  信赖：§G+22§!  羁绊：§G+16§!\n约会冷却：[?yuzu_married_date_cooldown|0]/90天（每周结算）\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
 date_buttom_middle_tooltip: "§9学院祭§!\n\n\n\n\n\n£date_school_party\n\n\n\n\n\n\n一同穿行于热闹的学院祭，留下只属于两人的回忆。\n\n消耗£GFX_pol_power §Y150§!政治点数\n花费£GFX_yz_money 600柚子币\n心情：§G+16§!  信赖：§G+24§!  羁绊：§G+20§!\n约会冷却：[?yuzu_married_date_cooldown|0]/90天（每周结算）\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
 date_buttom_right_one_tooltip: "§9咖啡馆§!\n\n\n\n\n\n£date_cafe\n\n\n\n\n\n\n找个安静的位置坐下，在咖啡香中慢慢聊天。\n\n消耗£GFX_pol_power §Y150§!政治点数\n花费£GFX_yz_money 600柚子币\n心情：§G+20§!  信赖：§G+18§!  羁绊：§G+23§!\n约会冷却：[?yuzu_married_date_cooldown|0]/90天（每周结算）\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
 date_buttom_right_two_tooltip: "§9远行§!\n\n\n\n\n\n£date_jounery\n\n\n\n\n\n\n暂时离开熟悉的日常，与她一起去看看更远的风景。\n\n消耗£GFX_pol_power §Y150§!政治点数\n花费£GFX_yz_money 600柚子币\n心情：§G+23§!  信赖：§G+21§!  羁绊：§G+25§!\n约会冷却：[?yuzu_married_date_cooldown|0]/90天（每周结算）\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
 gift_bac_tooltip: "§C赠礼§!\n使用柚子币购买饰品、化妆品或玩偶送给她，以提高心情、信赖与羁绊。\n三种礼物价格与收益不同，并各自拥有约§Y90天§!、按周结算的独立冷却。\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
