 gift_buttom_left_tooltip: "§C赠送饰品§!\n花费£GFX_yz_money 500柚子币\n心情：§G+5§!\n信赖：§G+3§!\n羁绊：§G+3§!\n冷却进度：[?married_gift_accessory_cooldown|0]/90天（每周结算）\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
 gift_buttom_middle_tooltip: "§C赠送化妆品§!\n花费£GFX_yz_money 1000柚子币\n心情：§G+9§!\n信赖：§G+4§!\n羁绊：§G+5§!\n冷却进度：[?married_gift_cosmetics_cooldown|0]/90天（每周结算）\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
 gift_buttom_right_tooltip: "§C赠送玩偶§!\n花费£GFX_yz_money 750柚子币\n心情：§G+5§!\n信赖：§G+5§!\n羁绊：§G+5§!\n冷却进度：[?married_gift_doll_cooldown|0]/90天（每周结算）\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
 help_bac_tooltip: "§1战时支援§!\n消耗战时支援以及少量心情、信赖和羁绊，获得协助计划、后勤援助或协调生产的限时国家加成。\n同一种支援在效果结束前不能重复启用。\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
 # 作用：说明三种支援小幅提高后的消耗与约三倍的限时效果；要点：持续时间保持不变。署名：伊尔诺+2026-06-09+assisted by Codex
 help_buttom_left_tooltip: "§1协助计划§!\n消耗：战时支援§Y18§!、心情§R4§!、信赖§R3§!、羁绊§R3§!\n为§Y婚后生活§!附加约§Y45§!天的效果：\n政治点数获取：§G+18%§!\n稳定度：§G+4.5%§!\n计划速度：§G+18%§!\n当前剩余时间：[?yuzu_married_assistance_days|0]天（每周结算）\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
 help_buttom_middle_tooltip: "§1后勤援助§!\n消耗：战时支援§Y23§!、心情§R3§!、信赖§R5§!、羁绊§R4§!\n为§Y婚后生活§!附加约§Y30§!天的效果：\n补给消耗：§G-18%§!\n损耗：§G-12%§!\n陆军速度：§G+12%§!\n当前剩余时间：[?yuzu_married_logistics_days|0]天（每周结算）\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
 help_buttom_right_tooltip: "§1协调生产§!\n消耗：战时支援§Y28§!、心情§R5§!、信赖§R4§!、羁绊§R6§!\n为§Y婚后生活§!附加约§Y45§!天的效果：\n工厂产出：§G+12%§!\n生产效率增长：§G+18%§!\n建造速度：§G+12%§!\n当前剩余时间：[?yuzu_married_production_days|0]天（每周结算）\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
 help_icon_tooltip: "§Y战时支援§!\n「黑色的翅膀，是我幸福的证明，是我与你之间牵绊的证明』\n——白雪乃爱\n\n代表她在战争与国家事务中能够提供的额外协助。（codex剩余额度）\n\n战时支援本身不直接提供常驻修正，而是用于启动三种限时支援效果。\n每周恢复§G3§!点，最高100点。"
 help_value_tooltip: "战时支援：[?value_of_help|0]/100"
 interact_bac_tooltip: "§7日常互动§!\n花费政治点进行亲亲、一起学习或一起玩耍，以改变心情、信赖和羁绊。\n一起学习会消耗少量心情，但提供限时科研、政治点与工厂产出加成；三种互动各自拥有约§Y90天§!、按周结算的独立冷却。\n\n§Y计时说明：§!为了节约计算资源，婚后系统采用每周计数，因此实际起效或冷却的天数可能与界面显示值不完全一致。很抱歉这可能会带来一些效果时长上的问题。"
