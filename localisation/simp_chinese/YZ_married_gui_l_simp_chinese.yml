 YZ_date_event.47001125: "过去的续篇（2）"
 YZ_date_event.47001125.t: "过去的续篇（2）"
 YZ_date_event.47001125.d: "夜晚的后夜祭依旧热闹。夜空下，大家围着篝火，热闹地讨论着各种内容。\n\n葵无奈地看着一直黏在一起的我们：“你们两个已经完全不避人了呢。”“因为现在是合法的！”佐奈理直气壮地回答。“哎哎，有人把大家当电灯泡呢…；卯花则微笑着望着热闹的人群，仿佛对这场与去年几乎一模一样的学园祭的原因毫不知情。“根据我的调查，后夜祭期间一起看烟花的情侣——”“啊！”“成功率高达——”“多少？”“百分之——”“朋花你先把数据来源说出来。”“comical market 77上登场的漫画！”\n……还是一如既往的热闹呢。\n\n篝火燃烧着，欢笑声在夜空下回荡。\n佐奈轻轻靠在我的肩头。“去年的时候，我还以为再也看不到这样的景色了。”她望着操场上的大家，露出了满足的笑容。“不过现在，大家都在，哥哥也在。这样的话——去年没能享受的学园祭，今年就全部补上了呢。”\n“佐奈，还有什么想做的事情吗？”她没有立刻回答，只是轻轻握住了我的手。篝火燃烧着，烟花照亮夜空。而她脸上的笑容，比任何时候都更加满足。"
 YZ_date_event.47001125.a: "——明明只是想一直陪伴在最喜欢的你身边而已。"
