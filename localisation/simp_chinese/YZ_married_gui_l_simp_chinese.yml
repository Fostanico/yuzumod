 YZ_date_shopping_event_name_wife_43: "与你一起（With You!!）"
 YZ_date_shopping_title_wife_43: "与你一起（With You!!）"
 YZ_date_shopping_desc_wife_43: "一整个上午，我都处于被佐奈牵着到处跑的状态。她那头及肩的金发在人群中轻快地穿梭，头上两个俏皮的冲天鬏也跟着步调不停晃动。\n她总能被那些充满情侣氛围的专区吸引驻足。一会儿拿起可爱的家居摆件左看右看，一会儿又盯着某处的新品海报，脸上泛起好看的红晕，随后发出了那种让人熟悉的娇憨笑声。“咕嘿嘿嘿……”  “又在脑补什么奇怪的画面了？”我无奈地伸手揉了揉她飘逸而柔软的一头金发。“才没有！我只是在履行作为恋人的正当权利！”她理直气壮地反驳，抱着我手臂的力道又收紧了几分。明明脸蛋都红透了，这点小狡辩要想骗过我，还早了八百年呢。\n​到了下午，总算轮到我来掌控约会的节奏。“接下来，该听我的了。”“诶——时间不够用了呢......”“佐奈小姐，接下来我会让你满意的！”\n先去大家推荐的咖啡馆坐坐，把妹妹的疲倦冲散掉。再去商店街逛逛，这个配饰，戴着好看，买了。这件裙子，嗯...一般，下次要更多调查才是......沉浸在打扮妹妹的心思里，不知不觉，太阳西斜。傍晚时分，我们默契一同走向商圈地标的摩天轮。\n​轿厢缓缓升空，将城市的喧嚣与疲惫隔绝在外。夕阳的余晖透过玻璃倾洒进来，将她小巧的脸庞染上了一层温柔的橘红。  \n​“尼桑，能像这样一直陪着我，真的好开心。”\n​佐奈轻轻靠在我的肩头，仰起可爱的小脸看向我。完全是小女儿啊...不不不，现在要说点浪漫的东西才行——\n“尼桑宽厚的肩膀和夕阳一样温暖呢...呼哇...”“以后还会一起这样看无数次的。”我握紧她柔软的小手，在渐渐暗下的天色里，在轿厢停下前，任由妹妹沉浸在幸福的梦乡。她的小嘴还在微微颤动，凑上去一听——"
