 start_event.201.t: "柚子歌舞团·战时生活志"
 start_event.201.d: "[YuzuSongUndDanceTroupe_event_text]"
 start_event.201.a: "[YuzuSongUndDanceTroupe_event_option_text]"
 YuzuSongUndDanceTroupe_event_text_1: "NO.1 黎明领唱者\n\n每天清晨，三司绫濑会带着柚子歌舞团员登上工厂屋顶。她将铁皮烟囱当作天然扩音器，用清亮的嗓音唤醒沉睡的街道。主妇们听着她的《晨雾小调》生火煮粥，学生们跟着旋律背诵课文。当防空警报响起时，她会轻轻哼起无歌词的旋律，手指在生锈栏杆上敲出节拍，仿佛连呼啸的轰炸机都成了和声的一部分。\n\n“音乐不需要战胜什么，只需要让人记得明天该为什么而醒。”她常这么说，把捡到的弹壳钻出小孔，做成风铃分给街角的面包店。"
 YuzuSongUndDanceTroupe_event_text_2: "NO.2 吉他与星空教室\n\n防空洞深处的备用电源室，总飘着断断续续的吉他声。假屋和奏用医用纱布缠住琴弦，教孩子们用罐头盖当拨片。她为夜班工人改编的《星轨安眠曲》温柔得不可思议——金属弦在昏暗油灯下泛着暖光，连防空壕渗水的滴答声都成了天然节拍器。\n\n有次空袭延长，她连续弹了七小时，直到指尖渗血都没停下。第二天人们发现，她悄悄把吉他箱改造成书柜，塞满用旧地图粘成的乐理笔记。"
 YuzuSongUndDanceTroupe_event_text_3: "NO.3 长号与缝纫班\n\n社区活动站的缝纫机旁永远立着她的长号。中之岛妙发明了“编织节拍法”：每缝十针吹一个长音，把补丁图案变成可视化的五线谱。主妇们跟着《毛线圆舞曲》的节奏织手套，不知不觉间连针脚都变得整齐如琴键。\n\n她最受欢迎的课程是“幽灵退散刺绣”——其实只是教大家在手帕上绣音符图案。“音乐能驱散所有可怕的东西哦！”她认真说道，耳朵却悄悄红透。有次闪电划过窗棂，她吓得把长号塞进毛线筐，结果吹出了史上最颤抖的《雨中即景》。"
 YuzuSongUndDanceTroupe_event_text_4: "NO.4 小号与屋顶邮局\n\n医院天台的晾衣架间，总跳跃着活泼的小号声。海老原水濑用病历单折成纸飞机，载着伤员们的家书飞向远方。她为每封信件创作专属旋律：给新生儿的祝福是轻快的《云雀之歌》，给阵亡战友的悼念是低沉的《雾钟挽歌》。\n\n护士长没收她的零食后，她赌气吹了整晚《空腹进行曲》，结果引来全院患者跟着哼唱。第二天早餐时，大家默默把配给果酱抹在她的乐谱背面——虽然画满了“禁止称呼虾子”的抗议涂鸦。"
 YuzuSongUndDanceTroupe_event_text_5: "NO.5 单簧管与借阅站\n\n图书馆废墟里立着她的“纪律堡垒”。今宫纪子用弹壳排列出图书分类法，要求每本战前小说必须登记在用血库表格改装的借阅册上。她为《战争与和平》标注的阅读配乐是《降E调沉思曲》，还给《小妇人》配上严格的三拍子翻页节奏。\n\n有人撞见她深夜蜷在书架间，用铅笔头在墙缝默写《月光奏鸣曲》。那些音符藏在《步兵操典》的书脊后，像一串串温柔的秘密。"
 YuzuSongUndDanceTroupe_event_text_6: "NO.6 月光音乐会\n\n被炸毁的教堂残骸成了她精心策划的舞台。云雀丘由贵用碎彩色玻璃拼成星空投影，要求每位听众必须携带自制乐器——汤勺与铁罐、梳子与玻璃纸。她创作的《瓦砾协奏曲》需要精确配合风声，连飞过废墟的夜枭都被标注成特邀演奏家。\n\n谢幕时总会慌乱：“才、才不是为你们准备的！只是刚好有月光而已！”她揪着烧焦的丝绒幕布，脸颊比未爆弹的警示漆还红。"
 YuzuSongUndDanceTroupe_event_text_7: "NO.7 蒲公英合唱团\n\n孤儿院的旧钢琴旁，御影须美教孩子们用弹壳做音叉。她把扫帚柄削成指挥棒，带他们在野花丛中寻找天然和弦：蒲公英绒毛飘散的沙沙声是女高音，甲虫振翅的嗡嗡声是低音伴奏。\n\n有士兵送来缴获的敌军手风琴，她默默拆下琴键改成识字板。当第一个孩子用《欢乐颂》的旋律读出“和平”这个词时，她低头擦拭镜片，说那是雨水打湿了眼眶。"
 YuzuSongUndDanceTroupe_event_text_8: "NO.8 神乐与铁皮神社\n\n被炸毁的建实神社旧址上，朝武芳乃用降落伞布系成注连绳。她把德军钢盔倒扣成临时神龛，里面供奉着用弹壳雕刻的微型丛雨丸。每周五清晨，她会在断墙后跳简化版神乐舞——生锈的罐头盖当神乐铃，绷带染成绯袴的颜色，连轰炸机掠过云层的轰鸣都成了太鼓的替代音。\n\n防空洞最深处有个用弹药箱拼成的“临时神社”，挂着芳乃手绘的二十四节气表。每逢节日，她会教孩子们用子弹壳折白鸽，用引信管插成烛台。有士兵把爱人照片塞进她做的铁皮御守里，战后发现照片背面多了句小字：“愿所有等待都值得晨光”。\n\n当三司绫濑的晨歌唱到第三节时，总能看见芳乃在工厂烟囱的阴影里默默起舞。她们从未交谈，但某天绫濑的乐谱夹里多了一片柚子叶，而神社废墟的碎石堆上，摆着用铜丝拗成的迷你话筒。"
 YuzuSongUndDanceTroupe_event_text_9: "晨雾未散时，三司绫濑已站在工厂冷却塔上试音。她将探照灯反射板当作反声罩，哼唱的副歌顺着蒸汽管道流进厨房——假屋和奏正在那里用刺刀削吉他琴桥，把压缩饼干袋改造成隔音棉。中之岛妙的长号声从缝纫班飘来，混着主妇们用纽扣串成的风铃响，惊醒了蜷在图书馆残柱后的今宫纪子，她慌忙把写满音符的绷带藏进《步兵操典》。\n\n云雀丘由贵指挥孩子们把碎瓷片贴成马赛克幕墙，御影须美趁机偷走半罐油漆，教孤儿们在防空洞画五线谱。海老原水濑的小号突然从医院天台窜起，二十三个窗口同时飞出病历纸鸽，每只翅膀都沾着朝武芳乃用柚子皮汁画的御守纹。\n\n暮色降临时，所有人聚集在铁路桥废墟。三司绫濑敲响用铁轨改装的音叉，月光便顺着假屋和奏的吉他弦淌进废弃车厢。当芳乃摇动用信号弹壳串成的神乐铃，八百只罐头烛台同时亮起——那是今宫纪子按音阶排列的，每个火焰高度都精确到毫米。"
 YuzuSongUndDanceTroupe_event_option_text_1: "弹壳孕晨歌，铁喉酿星霜"
 YuzuSongUndDanceTroupe_event_option_text_2: "断弦枕星光，余温孵长夜"
 YuzuSongUndDanceTroupe_event_option_text_3: "针脚镇幽灵，毛线缚月潮"
 YuzuSongUndDanceTroupe_event_option_text_4: "纸鸢驮暮色，休止饲鸽群"
 YuzuSongUndDanceTroupe_event_option_text_5: "弹壳囚月光，血库豢潮声"
 YuzuSongUndDanceTroupe_event_option_text_6: "碎玻璃心跳，焚绸缚月轨"
 YuzuSongUndDanceTroupe_event_option_text_7: "蒲公英识字，琴键种春雷"
 YuzuSongUndDanceTroupe_event_option_text_8: "琴弦缝补时光，神乐摇醒黎明"
 YuzuSongUndDanceTroupe_event_option_text_9: "钢盔弱音镇焦土，神乐残铃绣春江"
