###结婚事件
 get_married:0 "我们结婚啦"
 tongyong_event.1.t:0 "好感度系统"
 tongyong_event.1.d:0 "你会拥有一个全局好感度系统，当好感满级时会解锁与将领的结婚决议，结婚后该将领会获得全方面的加强。同时不同好感度也会获得不同的国家修正（民族精神），同时柚子厨数量也会影响修正效果。计划中的个人事件链也会提供额外的修正。" 
 tongyong_event.1.a:0 "好耶"
 tongyong_event.2.t:0 "准备婚礼"
 tongyong_event.2.d:0 "我们的婚礼筹备，如同一场美丽的梦。从挑选戒指的那一刻起，这份幸福就紧紧地握在了手中。钻石的闪耀，如同我们的爱情，璀璨而永恒。\n\n策划婚礼的过程中，我们用心倾听彼此的想法。他想要一个温馨的仪式，我渴望一场浪漫的盛宴。于是，我们将两者完美融合，打造出属于我们的独特婚礼\n\n购买婚礼用品的日子充满了乐趣。我们挑选着精美的餐具、柔软的抱枕，为我们的新家增添一份温馨。每一个物品都承载着我们对未来生活的期待。\n\n在这个忙碌而美好的筹备过程中，我们更加珍惜彼此。这场婚礼，将是我们人生中最难忘的时刻。我们准备好了，迎接幸福的到来。" 
 tongyong_event.2.a:0 "好耶"
 tongyong_event.3.t:0 "与宁宁的婚礼"
 tongyong_event.3.d:0 "今天是一个特别的日子，在你边上的宁宁穿着洁白的婚纱，脸上挂着微笑：“宁宁准备好了吗？”“走吧。”你牵着宁宁的手走到了台前。\n\n台下是柚子总参部与近卫炮兵团的成员，宁宁的参谋憋着笑向宁宁送去了礼物，宁宁打开之后涨红了脸——一副全新的起爆器，你赶紧合上礼物并把盒子送到后场。\n\n婚礼仪式开始，你再次向宁宁表达了自己的爱意，台下的人们也表达了自己的祝贺，你注意到宁宁快要哭出来了，但是转眼间她露出了开心的笑容“谢谢大家!”\n\n三门祝贺的礼炮分别放了7，2，1炮，在隆隆的礼炮声中，宁宁笑着靠在你身上：“今后多多关照啦”“那以后你能给我表演0721嘛。”\n\n听到这句话，宁宁嘟着嘴" 
 tongyong_event.3.a:0 "「结婚第一天就想着这些，坏死了」"
 tongyong_event.4.t:0 "与乃爱的婚礼"
 tongyong_event.4.d:0 "还有十几分钟就要进场了，乃爱怎么还没出来?\n\n一把推开门，乃爱还坐在试衣镜前吃着薯片看少女漫画。“喂，要进场了，别看啦。”\n\n“别急嘛别急嘛，”乃爱躲着你伸过来的手，“下一页男主就要跟女主表白了啦，看完就走看完就走嘛~”\n\n谁家新娘子会在婚礼前看少女漫看入迷的呀!？真是的，使个坏~\n\n在乃爱翻开下一页的同时，你搂过她轻盈的身子，凑近她毫无防备的耳根:“乃爱，我爱你，做我一辈子的女主角好不好？”\n\n结果是乃爱走红毯都差点绊两下，脸一直通红到婚礼的最后。\n\n真笨，明明自己才是女主，这都想不明白嘛。\n\n呐，没办法，谁叫她是我的天使呢~" 
 tongyong_event.4.a:0 "这双黑色的羽翼，是我作出选择的证明"
 tongyong_event.5.t:0 "与美咕噜的婚礼"
 tongyong_event.5.d:0 "今天是个特别的日子，曾经哪个俏皮可爱的丫头，今天穿着洁白的婚纱来到你的面前。你握紧她的小手向她表达者自己的心意，而一颗魔法的心之水晶也出现在了爱瑠的手上，爱瑠含着泪说，这是她这辈子收到过最好的礼物。\n\n因幡爱瑠装甲兵团的战士们，他们开着坦克列队驶过，并热情的向他们的领袖表示自己的祝贺，而柚子参谋部的其他成员，正在用相机记录这一美好时刻。\n\n目前，整个国家都洋溢在喜气洋洋的婚礼气氛中。" 
 tongyong_event.5.a:0 "「我们的魔法是为了爱而存在」"
 tongyong_event.6.t:0 "与绫的婚礼"
 tongyong_event.6.d:0 "礼台幕后，即便已经重新变回了人类穿上了婚纱，但是丛雨依旧含着泪问你:”我过去的错，真的可以被原谅了吗？”她将头埋入你的胸口哭泣，你抚慰着她”大家还在外面呢，哭花了就不好看喽”丛雨抹去了眼泪，破涕为笑，拉着你走到了台上。\n\n在台上她像以前一样开朗，并大大咧咧接受了你的誓言，你亲手将戒指带在了她的手指上，台下的人爆发出一阵阵欢呼。\n\n婚礼结束后，众人散去，只剩下你和丛雨”从不死之身重新变回人，绫酱后悔吗？”\n\n”不，吾辈相信，吾辈这五百年的守望，就是为了和主人相遇呢”" 
 tongyong_event.6.a:0 "「谢谢你跨越500年的时空与我相遇」"
 tongyong_event.7.t:0 "与䌷的婚礼"
 tongyong_event.7.d:0 "门吱呀作响，那边是你心心念念的身影。虽然已经见过不少次，但心跳仍在洁白的身影里漏了一拍。“没穿过几套女装就穿上婚纱了呢。”\n\n椎叶笑的幸福又羞涩。想起她那个让人哭笑不得的魔女契约，忍不住笑意地摸摸她的头。她笑的很灿烂，稍稍整理头纱：“呐，等下你得抱着我进场。”\n\n“好，”很轻盈，娇小的身躯正好贴合在臂弯里，像羽毛一样附在胸前，“为什么提这个要求呢？” “你变成那个熊样的时候，我可没少抱你，现在你得抱回来。”歪着头想了想，“这是我俩的不平等条约，你至少得抱我抱到婚礼结束，不许拒绝!”\n\n虽然是刚签下的，但是我要擅自修改一下，补偿内容现在是，我的怀抱这一生只属于最最可爱、最最温柔、最最让我心动的椎叶小姐，这一次是定稿。" 
 tongyong_event.7.a:0 "「我的公主，今后我会一直守护你」"
 tongyong_event.8.t:0 "与茉子的婚礼"
 tongyong_event.8.d:0 "门那边的低语声窸窣了很久，茉子才被芳乃推搡着，忸忸怩怩地提着裙摆出来。“嘿，茉子，看着我。”轻轻捧起茉子的脸，“今天你是主角哦。”\n\n和平时见到的茉子完全不一样，换上婚纱的她多了几分圣洁、几分可爱。周身上下隐约传来薰衣草香，双脚有些局促的磨蹭着高跟鞋，完全没法把她和以前那个天天泡在家务里的下流忍者联系起来。\n\n“嗯，”茉子细细的应了一声，“我好紧张，我...我不习惯被那么多人当作焦点。”安慰的话到了嘴边又咽下肚，说的越多她越没法下定决心踏出第一步。平时都是她使坏，不如今天就换我来当一次坏人吧，她好像恐高来着？“我有个办法帮你迅速解决紧张。”有点压不住嘴角了。“呀!”茉子惊呼一声，双脚倏地离地。揽着肩上的一袭白裙，你跑上了红毯。\n\n不要紧张，茉子小姐，紧张可不太好。不止今天，以后你要做我一生的主角呢。" 
 tongyong_event.8.a:0 "「从今往后，你就是我生命的女主角」"
 tongyong_event.9.t:0 "与芳乃的婚礼"
 tongyong_event.9.d:0 "今日万里无云，对我来说，这一天不止可以给人带来放松，并且……\n\n“准备好了嘛？打起精神来呀？既然收下了我的（）那就不要忘了昨天答应我的…”\n\n芳乃她早已换上白纱，她的眼神中夹带着一丝害羞，语气中也带着一丝羞涩。\n\n“嗯，我没有忘哦”在我们交换戒指的那一刻，我不禁想起我们相遇的时候，虽然有一些距离感，也有吵架，但我们也互相了解，互相开玩笑，…比如因为蛋卷加不加糖而吵过一次，不过现在看来…更像是打情骂俏？\n\n芳乃攥紧了我的手，眼神中充满着爱意…温柔的对我说：“今后…也要拜托你了啦…”无论遇到什么困难，我们都会迎刃而解，而在场的所有人，都将成为我们的见证者" 
 tongyong_event.9.a:0 "「无论发生什么，我们会一直走下去，直到永远」"
 tongyong_event.10.t:0 "与绫濑的婚礼"
 tongyong_event.10.d:0 "今天是不怎么完美的完美女孩第七百二十一次抱怨自己不完美。“别盯着我看!再看那里头给你拧下来!”绫濑双手捂着胸前，整张脸黑的不得了。\n\n你很不解，“没那玩意儿很要紧么？”实话说，观感上一点区别都没有。但是绫濑对于任何一点不完美都很在意，非常在意。“很要紧!”绫濑收起咬牙切齿，叹了口气，“我想让大家看到你有个完美的妻子嘛...”“到现在还是那么傻。”\n\n绫濑刚抬头，就被一把拉进你的怀里，“你在我心里一直是最优秀的参谋兼最完美的女孩，绫濑，以前是，现在是，以后也永远都是。这是我们的婚礼，不用在意别人的想法的。”就知道哄我开心。”\n\n绫濑说着把脸完全埋进了面前温暖的怀抱。不过啊，有你在的每一天都很完美呢。还好一直有你，以后我的生活也少不了你，完美女孩心想。今天是不怎么完美的完美女孩最后一次抱怨自己不完美。" 
 tongyong_event.10.a:0 "「今后或许有争吵与裂痕，但是我们之间的爱会治愈一切」"
 tongyong_event.11.t:0 "与七海的婚礼"
 tongyong_event.11.d:0 "婚礼开始了，但是新娘七海却躲在幕后不敢现身，在柚子参谋部其他成员和你的共同鼓励下，你挽着七海的手慢慢走上了台。在你对七海说出你的誓言之后，七海一时语塞，红着脸说：‘看来我只能照顾哥哥一辈子了呢......”\n\n在台下很多人都是曾经被七海星幽能力治愈过的人，他们中有战士，有工人，有农民，有年幼的孩子甚至还有敌国的士兵，在他们的心中，七海是他们的英雄，而今天，他们为自己英雄的大喜之日而欢呼。目前整个国家都洋溢在喜气洋洋的婚礼气氛中。\n\n入夜，你结束了一天的工作，回到家。七海看到之后，一把跑过来抱住你，轻声说到 " 
 tongyong_event.11.a:0 "「欢迎回家，欧尼酱!」"
 tongyong_event.12.t:0 "与栞那的婚礼"
 tongyong_event.12.d:0 "换上新婚纱的栞那噔噔的跑下楼，闯进下午温柔的阳光里，“喂喂，这套怎么样，比刚才的好看吧？”言毕轻巧地转起了圈，让洁白的衣裙轻盈的绽放。公爵从窗台上的日光浴里抬起半拉眼皮，“你这〇荡〇色死神妹难得这么认真一回，跑上跑下你也不嫌累。”一个下午你和公爵都在 “别乱说，很早我就开始认真了，”栞那把笑眼望向你，“你说呢，亲爱的？” 伸个懒腰，你的双眼留在公爵身上：“我倒是很想做一只猫。” \n\n“为什么？”栞那假装生气，“难道还没开始就嫌婚后生活乏味了吗？” 视线回到栞那身上，“猫有九条命嘛，这样我就可以和我的死神小姐相遇九次了。” \n\n栞那的裙摆在你的怀中绽开，“我只要这一次，有这一次这一生就够了。” 死神也会笑，死神也会哭。生命的旅人啊，别害怕死神。 有时死神小姐很温柔的，真的。" 
 tongyong_event.12.a:0 "「死神，也是人呐」"
 tongyong_event.13.t:0 "“你个笨蛋，还不快起来！”"
 tongyong_event.13.d:0 "尽管离自己预订的日程表上还差一段时间，在卯之花的迎头痛击之下也不得不尽早地做准备了。\n面前的妹妹好像第一次见：像是薄薄一层桃花敷在颊上，不是胭脂，是藏不住的颜色从皮肤底下透出来，与眉梢的喜气融成一体。唇上点着新开的口脂，石榴似的红，微微抿着。看到我的到来，又倏地垂下去，像遭不住自己眼里那太过丰盈的喜悦似的，却又不小心地泄露了小姑娘的羞怯。\n“不要害羞嘛，今天的小佐奈可是最漂亮的！”“你也是，难道是只要眼睁睁地看着这么可爱的妻子却不作为吗？”在大家的鼓励（威胁）之下，算是勉勉强强地牵住了佐奈的小手。先是感到微微的悸颤——她这才抬起眼，有着和我一样的不安，但却多了一份别的东西，像是要把这瞬间的触碰变成承诺。佐奈的眼眶忽然有些温热，慌慌忙忙又低下头去，可却没有抽回手来。\n真的，实现了呢。我就说嘛，哥哥就是个没人要的单身狗，反正也不会有想和哥哥这样的废柴结婚的人那样的话作为千岁家的长子会很头疼的吧所以啦作为妹妹我是没有办法的明明只是哥哥而已还请不要得意忘……\n这是第几次了呢？算了，身为哥哥总算是要让着妹妹一点嘛。\n“你小子，以后可要好好地照顾好佐奈，我最亲最爱的孙女可就拜托给你了！”没有回复，只是轻轻托起佐奈的脸颊，做着和以前做了无数次的一样的事情，轻轻点了下去。虽然有些迟疑，但佐奈也很快地回复了我的感情。\n“以后的日子里也请多加关照了，哥……”\n“哦不对，亲——爱——的！”" 
 tongyong_event.13.a:0 "恋爱纷纷乱漫☆ 让两人的爱飘落下来"
 tongyong_event.14.t:0 "与枣子姐的婚礼"
 tongyong_event.14.d:0 "大红灯笼，八抬喜轿，喧天锣鼓。远处的喜轿带着鞭炮声停在眼前，小希妈把盖着红盖头的新娘子搀下地，有一瞬，隔着薄红纱，四目相对。啪嗒，轻盈的脚步声落在你的身前,\n\n“这身旗袍合适么?”夏目完全是一副中式传统的打扮，布鞋在地上忸怩的画着小小的圈。“当然好看啦，要不下次换这一身来咖啡馆上班?我们的客流还能往上涨涨。”夏目狠狠瞪你一眼，旋即又慌乱地挪开了视线。“不是和你拜堂我才不会穿这件羞死人的衣服出来。”你坏笑着揭开盖头，让夏目无处可逃,\n\n“走啦，快进去。爸妈在里面等着了。”“呀!别拉着我走那么快!”夫妻对拜的时候，夏目轻轻叫住了你。“我喜欢你。”她有点不好意思的抬头,“一直都很喜欢。所以不许变心。”眼神变得好凶狠，好机会，逗她玩一下~“现在还只是喜欢嘛？这么多年了还只是没滋没味的喜欢啊，真伤心。”\n\n夏目愣了一下，表情在凶狠和难堪之间来回变，最后像是下了决心，死死看着你，扑了过来。\n\n耳边掠过轻风:“我爱你。”\n\n爱意如山，不求千百年稳在，长相厮守一生足矣。\n\n“夏目，我也爱你。”" 
 tongyong_event.14.a:0 "「执子之手,与子偕老」"
 tongyong_event.15.t:0 "与恭平的婚礼"
 tongyong_event.15.d:0 "在礼炮跟鲜花的序幕拉开后，恭平与你站上婚礼现场在战火的洗礼下已经更加巩固了这段感情。\n\n虽然有争吵但是也有甜蜜的瞬间，从相识的那一刻命运的齿轮转动，爱的光泽带给了你们，让你们成为幸福的新郎新娘，握着穿着白纱的恭平的手，时间一切要静止了，因为知道生命要多一个可以守护的人了。\n\n在走完婚礼仪式后，手牵手走出礼堂，太阳的阳光是如此灿烂，看着恭平微醺的脸陷入沉醉的状态中，“以后多多关照”你们两个互相回应" 
 tongyong_event.15.a:0 "「不再孤单」"
 tongyong_event.16.t:0 "与茅羽耶的婚礼"
 tongyong_event.16.d:0 "人一生会遇到约2920万人，两个人相爱的概率是0.000049。\n\n爱情的开始或许有巧合，但是它的开花结果一定是世间孤品。\n\n想来从第一次注意到心中的这一份情感，两个人已经挺过了多少磨难？但今天，这一切都已经开花结果：我们正式决定在一起，以对方为对象，度过余生。一场婚礼已经开始筹办了。两个依旧笨拙的人突然再次卷入匆匆忙忙的日子，请帖、场地、时间、菜品、仪式……某天甚至累到倒头就睡。只是这一切不同于以往一个人的煎熬，我们会微笑着让那个日子走下梦境，提前到来，以及往后的每一刻都——" 
 tongyong_event.16.a:0 "「不再孤单」"
 tongyong_event.17.t:0 "与羽月的婚礼"
 tongyong_event.17.d:0 "与羽月的婚礼如期而至，只是，羽月穿上婚纱，与你并肩走到台上\n\n“羽月，今后你愿意”...没等你说完，羽月就迫不及待的点头，并用一段古文表达了自己的爱意，台下爆发了一阵欢呼\n\n婚礼仪式结束后，大家正在宴席之中，此时羽月接到了一通电话，立刻去更衣室换上军服跑了出去，你赶紧跟了上去\n\n“怎么，这种日子，不愿意多陪我一会吗？”羽月面露难色“我有自己的使命，我的责任就是守卫大家的幸福”\n\n你抓着她的手，“以后，你的责任也是我的责任，这是我们共同的使命”\n\n夕阳照在二人的身上，格外唯美" 
 tongyong_event.17.a:0 "「让我们去守护更多人的幸福吧」"
 tongyong_event.18.t:0 "请把他交给我吧！"
 tongyong_event.18.d:0 "风实花紧紧拉着你的手，你从未见过这么可爱的风实花，你摸了摸风实花的头\n“真是的……我又不是小孩，不用你这么安慰。”风实花虽然不服气，但是确实还是很紧张\n“见家长而已，你以前又不是没见过，紧张什么？”你笑着问道\n“那怎么能一样……以前是班主任……是姐姐……现在不一样啊……”风实花脸红了，后面的话想说又说不出口\n“现在是什么？”你故意问道\n“坏蛋，这还需要问吗……”风实花有点不满你这个时候欺负她，但又说了出来：“是未婚妻！行了吧！坏蛋！”风实花说完以后立马嘟起了嘴，甚至想甩开你的手\n“风实花姐你半天不进来，真墨迹……我帮你一把”天音不知道从哪里冒出来推着风实花强行进了家门\n“诶诶诶！小天音，慢点！”风实花被天音推进了家门，有点尴尬地看着坐在沙发上的由月。“呃……那个……阿姨好……”风实花一瞬间闪过一个念头，到底是该喊阿姨还是妈妈，但是害羞让风实花只能叫出阿姨\n“啊呀？还在叫阿姨呢？”天音一脸坏笑地看着风实花。你也从门外走了进来，看着这有点尴尬的气氛，你试图插两句话。“阿拉阿拉，难得风实花酱来一次呢，怎么了？天音叫你来玩的吗？”由月看着风实花说道\n“妈妈~风实花姐今天可不是我叫来的哦，是哥哥叫来的。”天音还在拱火，你回头瞪了一眼天音，天音一副事不关己的表情溜回了房间\n“妈，我要说一件很重要的事。”你看风实花这样子开口大概是很难的了，所以你决定代替风实花说\n风实花拉了拉你的手，你回过头去看风实花，风实花的表情一副坚毅的样子，她要亲口说出\n“那个……阿姨，我和您儿子已经决定结婚了……所以……请把他交给我吧！”风实花坚定地说道\n虽然是带未婚妻回家，但是为什么风实花是这样说的呢，你有点奇怪，但没有现场问出来\n“真的吗？是风实花吗？我之前就听天音说这小子谈恋爱的事了，没想到是风实花酱啊，那我也放心了。”由月笑了出来\n“风实花酱快坐下，儿媳来了那我得好好准备一下晚饭了，顺便给孩子他爸也说一声这好消息。”由月说着就往厨房走\n“阿姨我也来帮帮忙吧……”风实花连忙说道。“哪有让第一次来自家的儿媳干活的？天音！出来干活！”\n“你刚刚为什么说要把我交给你？你是女孩子诶。”你见没人了，小声问风实花\n“那肯定啊！我是大人诶，我肯定要对你负责任的啊。”风实花很理所当然地说道\n“是吗？可是你平时一点都不像大人诶。”你笑着说道\n风实花也趁没人往你怀里钻了钻，嘟着嘴说道：“只有在你面前才不像大人，坏蛋。”\n“你最近好像在人前也有点黏人啊。”你轻轻摸着风实花的头说道\n“那肯定嘛，好不容易你毕业了，我也不用瞒着了，见到你就想黏着你……谁管那有人没人的”风实花嘀咕着\n你突然觉得风实花比平时更加可爱了，风实花突然又抬头说道：“所以，作为大人，我要好好照顾你这个小家伙啊。”你刚想说什么，风实花就站起来向厨房那边走去了，“妈妈，我也来帮忙了！”风实花对由月说道\n你独自坐在沙发上，看着风实花离去的背影笑了出来。风实花向着你们的关系迈出了新的一步，你也知道不能止步不前，至少，要跟上风实花的步伐。" 
 tongyong_event.18.a:0 "「大人也有需要依赖别人的时候，以后就由我来照顾你」"
 tongyong_event.19.t:0 "与墨染希的婚礼"
 tongyong_event.19.d:0 "唰啦一声，我的被子不见了。困意死死压住我的眼皮，半睁的眼里世界无比昏暗，好像有个穿着围裙的身影在床边当门神，一只手拎着刚刚还在我身上的被子，另一只手里的锅铲闪着寒光，一身主妇装扮穿出了主公的感觉。\n\n哦哦，小希啊，我再睡五分钟好么……\n\n“哥，你再不起来上班要迟到啦!不许在床上蜷成一团试图睡回笼觉喂!起来啦你……”\n\n最后迫于锅铲的淫威，在对脑袋的再生能力做出正确评估之后，我选择起床保命。\n\n小希，全名墨染希，是我的青梅竹马，曾经担任我的女朋友一职，一个月前调任我的妻子，现在正在饭桌前絮叨这些天的柴米油盐，那温柔的语气和刚才的锅铲门神判若两人。嘛，她的每一面我都很喜欢就是了。\n\n旭日正好，阳光四溢，不大的屋里满溢着温暖，桌上摆着的合照染上今日份的阳光，相片里的小希笑得无忧无虑的甜。因为她知道未来再平淡再平常的日子，都是我们间独一无二的回忆。\n\n伸手揉揉小希的脑袋，她脸红的飞快。陪伴，像一份迷迭香，是一种飘忽几十年的浪漫，也是我对她每时每刻从不停止的告白。" 
 tongyong_event.19.a:0 "「爱你，小希，晚上见」"
 tongyong_event.21.t:0 "与和奏的婚礼"
 tongyong_event.21.d:0 "在墙角有一把吉他，落着轻轻的一层灰。这把吉他我和她都很熟悉，某种意义上来说，它是我们缘分的钥匙。这几天大家都在忙，没空打理它，这天早上才被和奏拿出来放在墙角。\n\n我看了看和奏整理头纱的背影：“等下穿婚纱弹这个没问题的吧？”\n\n和奏没回头，死盯着镜子里的自己，生怕漏过婚纱上任何一处不对劲：“你还是别操心我的吉他了，先看看你那个贝斯弹得咋样。不要总问我，要善于自行解决问题。”\n\n我来到和奏身后帮她整理婚纱：“那要不要再来一次演到一半当场表白？”\n\n和奏抛下衣着问题，回头开始捶捶捶，本就可爱的脸庞上多了一抹娇俏的红晕:“半年的brave man没当够是吧你？!别再给我整这种对心脏不好的桥段啦!”\n\n拜托，明明你在笑个不停，再说等下我俩要演奏的曲子就叫《非你不可》，等下婚礼上就只能委屈一下您的小心脏啦～" 
 tongyong_event.21.a:0 "「以后的日子也会惊喜不断的，我的和奏女王」"
 tongyong_event.22.t:0 "与憧子的婚礼"
 tongyong_event.22.d:0 "“怎么样？”憧子身着洁白的婚纱，站在一身正装的你面前，憧子的脸上充满了幸福，仰着头看着你的脸问道\n“很美，很适合你。”你握住了憧子的双手\n“你就只会说这句话呢”憧子好像有点嫌弃你不会说别的话\n“可是，婚纱又不是没试穿过……到现在再问又是干什么……”你真的很想吐槽，难道现在说不好看还有换的余地？\n“因为……想让你看见最好的我啊。”\n憧子突然说出的话打断了你的思绪，你的目光不由得回到了憧子的脸上，你被憧子的话正中了心窝\n“这是和你一辈子最重要的一天……我怎么能不把最好的自己展现给你看呢？”憧子笑得很漂亮，你忍不住想去把这样的憧子占为己有，你紧紧地抱住了憧子\n“阿拉……真是的……明明马上要结婚了……还这么向姐姐撒娇吗~”憧子在你怀里笑了笑，但也回应了你的拥抱，憧子的双手环在你腰上，也抱住了你\n你们的拥抱持续了一段时间，不知道过了多久，突然礼堂的门打开了\n“真是的……婚礼都要开始了，新郎新娘呢？”美咕噜从礼堂跑出来张望着，然后就看到了你和憧子抱在一起\n“哎呀，都这个时候了还亲热呢！快进婚礼现场啊”䌷妈跟着美咕噜出来看到这一幕，䌷妈和美咕噜好不容易把你们拆开，推着你们进了婚礼现场\n“接下来有请新郎新娘。”\n司仪的声音传来，美咕噜和䌷妈也躲了下去，接下来的主角都将是你们二人\n你和憧子对视了一眼，你们手挽手走向了礼台\n“新郎，你愿意守护憧子女士一生吗？”\n你单膝跪地，捧着憧子的右手，憧子右手无名指上的戒指显得额外闪耀\n「我想永远跟你在一起，晚上一起入睡，早上一起起床，每时每刻都待在一起。我想让你成为我生活中理所当然的一部分，我也想让我成为你生活中理所当然的一部分，我不想再让你孤独下去了。所以，我们结婚吧。」\n憧子脸上泛起微红，很自然地回复\n「好的，我愿意」"
 tongyong_event.22.a:0 "「跟最爱的人一直生活在一起，永远永远不分离，而现在，就是这个曾经期盼的未来到来的时刻」"
 tongyong_event.23.t:0 "与真咲的婚礼"
 tongyong_event.23.d:0 "牙与爪的兽亭今天试着拓展了一下新业务。\n\n奥尔的狼尾巴翘得天高，一手端着一打椅子在店里四处布置。来帮工的人们对着效果图比比划划，同时还要接受奥尔先生的复读式炫耀：“我女儿要结婚啦!”\n\n白纱要这么挂，桌子要布置成这样，桌布的样式也要讲究。宁宁专心整理着大瓷瓶里的满天星，一条哼着小曲儿的狼尾巴从后面接近：“啧啧，我家真咲要结婚啦!”狼尾巴一颤一颤的飘远了。\n\n门口的迎宾组还在给客人登记，忽然从人群后面传来骚动，骚动的中心是一条狼尾巴。绫濑从纸笔堆里抬起头来，一张大大的狼脸杵在面前：“啧啧，我家真咲要结婚啦!”绫濑摆出了最阳光的职业假笑。然后看着狼尾巴在一片恭喜中飘远。艾丽娜看了看绫濑的胸前：“三司同学，是不是比较丰满的女生更容易找到如意郎君啊。”绫濑差一点失去了表情管理。\n\n厨房里在收拾着锅碗瓢盆，你和真咲趴在柜台上守着咕嘟冒气的菜。真咲好像睡着了，两只毛茸茸的耳朵随着呼吸微微起伏着。一只有形的大手抓住了你的肩膀：“我·家·女·儿·真咲要结婚了!”有形的大手拍了拍你的肩，走远了。\n\n一座岛，一家店，一间屋，一辈子。以后也会有千万个这样的日子吧，每一天醒来是她，睡前也是她，陪伴，平凡却幸福。“有你陪着真好。”毛茸茸的耳朵抖了抖：“哇呼？趁我睡着偷偷表白嘛？”真咲点了点你的胸膛，“下次不让这样了哦，不许把对我的爱藏起来。”\n\n牙与爪的兽亭从今天起开始承办婚礼了。" 
 tongyong_event.23.a:0 "「傻傻的很可爱」"
 tongyong_event.24.t:0 "与美羽的婚礼"
 tongyong_event.24.d:0 "诶，你听我说啊。\n\n从前在深山老林里面，有一只蝙蝠，这蝙蝠吸收天地灵气，修炼成了精。这蝙蝠精不伤生不吃人，单好一口醋泡野菜。山脚几个村子的猎人只要供上好醋一瓶，那肯定满载而归。\n\n后来这蝙蝠精得道，修成正果，上天做了个神仙。这神仙宝座还没捂热乎呢，因为偷吃玉帝的贡醋，蝙蝠精被罚下凡转世。这转世出来的人啊，落得个吸血鬼体质，还特喜欢吃醋。要不是我今天在这里胡诌，别人还以为她是醋坛子精转世呢。\n\n美羽，你看我这个故事编的咋样？\n\n美羽说今天优先结完婚，晚上再拿针线包缝上我这张烂嘴。" 
 tongyong_event.24.a:0 "「虽然她笑得比谁都开心就是了」"
 tongyong_event.25.t:0 "与茉优的婚礼"
 tongyong_event.25.d:0 "今天的太阳正好，是个适合婚礼的好日子。\n\n大人物没有私事，尽管婚礼的意义不再简单的是宣告幸福，但是在长枪短炮的缝隙间，你们享受着片刻的宁静。这一刻，你们无需再为礼堂之外的枪林弹雨而操劳。\n\n从相识的那一刻起，命运的齿轮便开始悄然转动。我们一起走过无数个日日夜夜，有欢笑，有泪水，有争吵，更有深深的爱意。\n\n所有人都发自心底的认可你们做出的贡献，这场结合在军营民房间点燃了前所未有的热情，你们成为了当之无愧的精神领袖。\n\n站在婚礼的舞台上，看着她身披白纱向我走来，那一瞬间，仿佛时间都静止了。我知道，从此我的生命中有了一个要携手一生的人。\n\n今天的太阳正好，走出礼堂的你微微眯眼，一切都沐浴在阳光下，一切都是光明的。她紧攥着你的手，“明天也会一样的”，微微偏头，一笑倾城。" 
 tongyong_event.25.a:0 "「爱してる」"
 tongyong_event.26.t:0 "与天音的“婚礼”"
 tongyong_event.26.d:0 "湿润海风，慵懒潮声。不大的小船上铺满阳光，船的这头你西装革履，船的那头她一袭白纱。一叶轻舟，在大海的中央漫无目的的流浪。\n天音又是那副招牌坏笑：“杂鱼老哥~你胖死啦~你看这船都往你那边倒了。是不是想到要和世界上最可爱的妹妹结婚就忘记要锻炼啦？~”“我没有!”“那你快点往这边走，船平了我叫住你。”\n你知道船不会因为几十斤就翻倒，你知道这是天音的小小恶作剧，而天音知道她的杂鱼老哥肯定会上钩的。\n已经走到天音面前了，你苦笑：“再走就要跳进海里了。”\n“那我就再把你这个杂鱼钓上船。”小小的天音飞身搂住你的脖子，纤弱的身躯散发着和阳光不一样的香气。紧紧抱住，她和大海一样温暖，不愿松手。\n炙热海风，欢快潮声。不大的小船上载满爱恋。" 
 tongyong_event.26.a:0 "“欧尼酱，我最喜欢你了!”"
 tongyong_event.27.t:0 "与凉音的婚礼"
 tongyong_event.27.d:0 "晶莹剔透，香气四溢，沁人心脾，使得幸福与喜庆的气息充满了整个端庄的礼堂\n这就是凉音姐亲手制作的蛋糕，精致得如艺术品般，安详地躺在展览桌上，沉眠于琉璃罩中，在灯光下熠熠生辉，一眼看去，只知其可远观而不可亵玩焉\n不论众人当时如何劝说她，她也坚持要用自己的双手，亲自打造这份世间独一无二的蛋糕，不论要耗费多大的精力与成本。毕竟，这可是凉音姐，勤劳的凉音姐，认真的凉音姐，对蛋糕极其严格、精益求精的凉音姐——尤其是...对这般意义重大的蛋糕。眼前之人...我于她心中的地位是多么珍重，无需再多言语，答案早已昭然天下\n定是如此想着，她才会不禁自满地微笑着，就如她常年与糕点打交道的双手那样，此刻她的笑容也染上了奶油与水果的香甜般，是那么甜蜜温暖，仿佛能使世间的一切烦恼如奶油般化开，随着内心的暖流，流淌着远去，永不复返\n我回味着这股甜蜜温暖的滋味，殊不知托着一枚闪亮的戒指的双手已在半空中滞留了许久\n“啊~真是磨叽。拿来吧你！”\n凉音姐不耐烦地抱怨着，一把抓住我的手，一阵柔软温暖的触感在手上扩散开，流入身体深处，充盈着五脏六腑\n她先是为自己的无名指套上了戒指，又麻溜地将她手中的另一个戒指戴在我的手上，就保持着最后的姿势，不满地看着我的脸，像是在等待什么回应\n这一幕着实可爱，我还怎能忍得住去细细品味她那小巧玲珑的双唇呢？\n在一阵欢呼声中，我们闭上双眼，紧紧相拥，用一个吻接受了对方的一切，宣誓着名为“爱”的誓言，久久没有分开，仿佛世间再无他物，唯余彼此的体温与拼命克制的鼻息在热烈交换着\n唇上的触感是如此厚重，令我的脑中一片空白，仿佛天国近在咫尺，仅存的想法是：真想把她娇小的身躯抱起来，更加热烈地吻她...不过要是我真这样做的话，她肯定会生气的\n一阵难掩的笑意中断了这荒谬的想法，也让两人恋恋不舍地分开紧贴的双唇，温柔地注视着对方。她的眼眸是如此迷人，仿佛能囊括整个宇宙般摄人心魄\n“好了，别傻站着了，来切蛋糕吧。”\n婚礼的最后，大轴必然是这个蛋糕。它将毫无疑问地成为点缀这场盛大宴席的最后一颗明珠\n我们一大一小的两只手重叠在一起，带着两人的紧紧相连的心意，让西点刀深深嵌入柔软的蛋糕，小心翼翼地将其切开\n今后，我们也将像这样一起制作更多蛋糕，毕竟这份幸福独属于我们，但这份甜蜜——" 
 tongyong_event.27.a:0 "我们誓要分享给全世界"
 tongyong_event.28.t:0 "与夏莉的婚礼"
 tongyong_event.28.d:0 "人一生会遇到约2920万人，两个人相爱的概率是0.000049。\n\n爱情的开始或许有巧合，但是它的开花结果一定是世间孤品。\n\n想来从第一次注意到心中的这一份情感，两个人已经挺过了多少磨难？但今天，这一切都已经开花结果：我们正式决定在一起，以对方为对象，度过余生。一场婚礼已经开始筹办了。两个依旧笨拙的人突然再次卷入匆匆忙忙的日子，请帖、场地、时间、菜品、仪式……某天甚至累到倒头就睡。只是这一切不同于以往一个人的煎熬，我们会微笑着让那个日子走下梦境，提前到来，以及往后的每一刻都——"
 tongyong_event.28.a:0 "不再孤单"
 tongyong_event.29.t:0 "与来海的婚礼"
 tongyong_event.29.d:0 "夕阳洒在来海精致的脸颊上，来海那标志性的笑容在你眼中闪耀\n“这片沙滩……这个夕阳，都如同当时一样，是你专门挑选的”你看着来海说道，只不过这一次，来海穿的是婚纱\n“这个地方够美，所以专门挑这里来拍婚纱照了”来海笑着说道\n“你本来就美，配上这样的背景，你简直是天使”你夸奖来海说道\n“天使就在这里呢……当着天使面说别人是天使”乃爱从你头顶降落吐槽道\n“毕竟我心里的天使只有来海一个人”你回复乃爱的话让来海很受用\n“啾”来海抱住你的胳膊，轻轻在你侧脸上吻了一下\n“说得这么好听……让我忍不住想奖励你一下呢”来海轻抚头发，脸颊泛起微红说道\n“哎！这张感觉好！可以拍这张！”木下突然叫住你们\n“对对，来海再保持一下刚刚的动作，就轻轻吻住的那一刻”白石也说道\n来海又一次抱住了你的手臂，当然，来海的双峰也挤压在你胳膊上，这一回，不止来海脸红了，你也脸红了\n白石从摄影师那里看着效果，然后笑了出来，木下看到白石笑了也凑过来看了，结果也笑了起来\n“怎么了怎么了！笑什么！”你不知道她们在笑什么，自己拿过相机看了一眼\n然后你发现，你的表情因为来海突然挤上来，很明显的在害羞，脸都红了，眼神还偏向来海那边，而这一幕却恰好被拍了下来\n来海挽着你的手过来一块看到了这张照片，她也露出了和两个闺蜜一样的表情\n“这张好哦，我要留下，给我给我！”来海跟摄影师说道\n“哪好了……”你小声吐槽道\n“这张照片……我要存好久好久，我老公也会有害羞的时候，这可值得保留了”来海笑着说道，只是不知道为什么，你看到这样的笑容有点不太好拒绝来海的要求，本来想要删掉这张照片的，现在看来，只要她高兴，你有意见也张不开口了\n“本来……我只是喜欢你帅气的一面，冒着生命危险保护我，喜欢你平和的性格，喜欢你亲切对待每一个人……现在，我还知道，你也会因为我的各种举动而害羞脸红，这就够了，我能体会到你对我的感情”来海和你对视着，抱住了你\n“哇哦哇哦，当面秀上恩爱了呢”白石说道\n“以后这样的时候多着呢，你们得习惯”来海很直白地怼了回去\n“好好好……小来海为了老公连闺蜜都不要了”木下很委屈的样子说道\n“好了好了，再摆好姿势再拍两张”摄影师打断了来海和闺蜜们的玩笑\n你抱着来海，换了其他动作拍婚纱照，夕阳共同照在你们身上，正如你们刚刚在一起的时候一样，在同一缕夕阳下，你们在一起了，而现在，你们又将在夕阳下见证，共同前往未来的每一步\n你们并肩前行，无论遇到怎样的困难，你们都会一同跨越。携手一同度过——安稳而平凡的每一天"
 tongyong_event.29.a:0 "以心知行"
 tongyong_event.30.t:0 "与爱莉的婚礼"
 tongyong_event.30.d:0 "人一生会遇到约2920万人，两个人相爱的概率是0.000049。\n\n爱情的开始或许有巧合，但是它的开花结果一定是世间孤品。\n\n想来从第一次注意到心中的这一份情感，两个人已经挺过了多少磨难？但今天，这一切都已经开花结果：我们正式决定在一起，以对方为对象，度过余生。一场婚礼已经开始筹办了。两个依旧笨拙的人突然再次卷入匆匆忙忙的日子，请帖、场地、时间、菜品、仪式……某天甚至累到倒头就睡。只是这一切不同于以往一个人的煎熬，我们会微笑着让那个日子走下梦境，提前到来，以及往后的每一刻都——"
 tongyong_event.30.a:0 "不再孤单"
 tongyong_event.31.t:0 "与芦花的婚后日常"
 tongyong_event.31.d:0 "“关于田心屋在市区开分店……当然可以啊，田心屋的甜品和饮品都很好，我们愿意给田心屋投资开分店……之后我们还是需要吃个饭什么的确认一下合作事宜，签一下合同吧。”投资的大老板对你们说道\n你跟着芦花一起去了饭局，但是，饭局上大老板又提到要喝酒，尽管你立马就意识到了问题的严重性，芦花还是喝了酒。把大老板送走以后，芦花突然就倒在了你怀里\n“芦花姐？你没事吧”你抱住芦花有点着急地问道\n“没事~没事~嘿嘿……我还能走路呢！”芦花从你怀里起来又一摇一摆地走着，这已经很明显了，芦花姐又喝醉了！\n你连忙上去拉住芦花的手，你害怕芦花摔倒了，紧紧地抱住了芦花\n“怎么了嘛，就只是喝点酒而已……又没喝醉……不要这么大惊小怪的嘛~”芦花满脸潮红地跟你说着，芦花身上的酒气都快溢出来了，但你还是紧紧抱着芦花。“是是是……没喝醉……走路的时候拉紧我的手哦”你嘴上应和着芦花姐，芦花牵着你的手走在回田心屋的路上\n“呐呐呐，以后我们分店开好以后，你会不会离开我？”芦花虽然醉醺醺的，但还是认真地看着你\n“怎么会呢……我之前就说过不会离开芦花姐的啊”你连忙说道\n“诶？你不去分店……跟我在一起……那分店谁看啊？”芦花有点疑惑地说道\n“诶？？？”你也懵了，你才反应过来，这是芦花在问分店的事\n“嘿嘿……你真可爱……”芦花笑了出来，看着芦花的笑容你明白了，她就是故意这么说的\n“明明是芦花姐才更可爱好吧……”你不甘示弱，回击着芦花\n芦花走着走着突然拉了拉你的手，回头看着你的脸说道：“呐呐，我们这算不算……夫妻店开出分店了？”\n“嗯……那都是芦花姐经营得好。”\n“笨蛋，谁让你说这个了。”芦花敲了一下你的脑袋\n你都专门夸芦花了，芦花还是敲了你一下，这让你很摸不到头脑\n“我要强调的是夫妻店啊，笨蛋。”芦花红着脸说道，虽然喝完酒本来就脸红，但是现在更红了\n你笑了出来，芦花还是这么可爱，你忍不住抱住了芦花，“当然了，你是家里管事的，肯定你说了算咯，没有你，田心屋怎么会走到这一步呢？我也不会这样对你着迷啊。”你轻声在芦花耳边说道\n“后面那半句跟前面的能有什么关系……”芦花害羞了，虽然这一路上都红着脸，但是你知道，如果不是因为晚上光线不好，你肯定能看到芦花的脸红透了\n“就是因为芦花姐一直这样努力，我着迷的就是一直努力的芦花姐啊。”你笑着说道\n田心屋能从穗织一个小地方的甜品屋在城里开分店，这花了多少芦花的心力你是最清楚的\n“呐，芦花姐”你突然叫了一声芦花\n“怎么了？”芦花在你怀里疑惑地说道，想回头看你，但就在芦花要回头看你的时候，你轻轻吻在了芦花的侧颊上\n“我会一直陪伴在芦花姐身边的，在你身旁支持你……所以，感谢你为我们这个小家的努力。”你紧紧抱住芦花，你看不到芦花的表情，但是，你知道芦花肯定是笑着的\n“真是的……你都这么说了……我也要再努力一点，为了更多看到你的笑容……我会更加努力下去。”\n只要跟芦花姐在一起，你就会觉得心情愉悦又放松，你坚信，只要有芦花姐在你身边……无论什么障碍你都能跨过去，芦花就是能这样带给你自信"
 tongyong_event.31.a:0 "「对我来说，你是我重要的人。为了看到你开心的表情，我会努力的」"
 tongyong_event.32.t:0 "与小春的婚礼"
 tongyong_event.32.d:0 "人一生会遇到约2920万人，两个人相爱的概率是0.000049。\n\n爱情的开始或许有巧合，但是它的开花结果一定是世间孤品。\n\n想来从第一次注意到心中的这一份情感，两个人已经挺过了多少磨难？但今天，这一切都已经开花结果：我们正式决定在一起，以对方为对象，度过余生。一场婚礼已经开始筹办了。两个依旧笨拙的人突然再次卷入匆匆忙忙的日子，请帖、场地、时间、菜品、仪式……某天甚至累到倒头就睡。只是这一切不同于以往一个人的煎熬，我们会微笑着让那个日子走下梦境，提前到来，以及往后的每一刻都——"
 tongyong_event.32.a:0 "不再孤单"
 tongyong_event.33.t:0 "与蕾娜的婚礼"
 tongyong_event.33.d:0 "金发少女身着纯白的白无垢，见到了身着黑色纹付羽织袴的你，这是你第一次见到蕾娜穿这种衣服，你受到了强烈的冲击感，你莫名觉得，这似乎比穿着婚纱的蕾娜都要美丽\n芳乃打断了你愣愣地看着蕾娜的动作，拍了一下你的后背提醒了一下你\n芳乃带领着你们这对新人入场，用祓串在你们头顶挥动，为你们修祓\n你牵着蕾娜的手，共同走在婚礼的红毯上，共同走向神主面前\n“奇怪……日本人结婚为什么不需要在礼堂里找神父啊？”蕾娜很小声地说道\n神主是芳乃的爸爸朝武安晴，安晴为你们二人宣读祝词\n芳乃在祝词宣读完毕后，为你们端上了三个杯子，里面装满了清酒\n“分三口喝完，共九口”芳乃给蕾娜提醒着\n蕾娜拿起最小杯，喝第一口就已经面露难色——蕾娜从来没喝过清酒，清酒对蕾娜的冲击丝毫不亚于曾经第一次吃芥末寿司的时候,但好在清酒还是比较容易下肚的，蕾娜强忍着喝完了三杯清酒\n“两位新人请宣读誓词。”安晴对你们二人说道\n“从今往后，不论发生什么，不论疾病还是健康、贫穷还是富裕、历经多少磨难，我们都不离不弃、相互支持”你和蕾娜朗读着准备好的结婚誓言\n对于蕾娜来说，日本的婚礼流程还是太难理解了，但好在已经接近结束，你们在正式的婚礼流程结束后来到了披露宴上\n“好复杂啊……好奇怪啊……为什么日本人的婚礼流程这么奇怪呢？”蕾娜很奇怪地看着你，这时候她真的体会到了文化差异，芬兰人绝对不会强迫新人喝酒！\n“不过……这也是我喜欢日本文化的原因之一嘛，真的很新奇”蕾娜笑着对你说道\n“所以现在……你也算是日本人了，按照我们的传统……你就不姓列支敦瑙尔了”\n“嗯姆……这个我知道，日本传统女性嫁给男性以后要跟夫姓的对吧。”蕾娜说道\n“但是但是！还没完哦！我和家里人说好了！还要再在芬兰进行一次婚礼！”蕾娜很认真地看着你说道\n“可是他们不是已经来了吗……”你看着宴席上蕾娜的家人们，一个个都是金发碧眼，除了蕾娜的父母你真的认不出其他人\n“那也要再回国举行一次，刚好……我也就能带你在我老家一起玩了啊”蕾娜笑了\n“能不要再给我吃那种会让人看到极光的糖了吗……我对你的家乡还是有点……担心。”你想到之前吃了一口蕾娜家乡寄来的糖，你和芳乃都看到了极光，芬兰人难道平时都是这样看到极光的吗\n“真是的……我像那么坏的人吗，那一次是意外啦，我肯定会带你去看真正的极光的。”蕾娜嘟着嘴说道\n“当然当然，蕾娜都已经为了我这么了解日本了，如果作为丈夫我再不对等了解一点蕾娜的故乡，这就说不过去了不是吗？”你笑着说道\n蕾娜听到你自称她的丈夫内心突然触动了一下，“是啊……那我作为妻子也要尽好照顾丈夫的义务呢。”\n“以后……你带我去见更多更多你故乡的一切，把那些都告诉我吧。”你双手抓住蕾娜的手说道.蕾娜脸上露出了笑容\n“当然了……这可是……作为妻子的义务嘛……”"
 tongyong_event.33.a:0 "「愿千年之恋，有朝一日能使万花怒放」"
 tongyong_event.34.t:0 "与千咲的婚礼"
 tongyong_event.34.d:0 "人一生会遇到约2920万人，两个人相爱的概率是0.000049。\n\n爱情的开始或许有巧合，但是它的开花结果一定是世间孤品。\n\n想来从第一次注意到心中的这一份情感，两个人已经挺过了多少磨难？但今天，这一切都已经开花结果：我们正式决定在一起，以对方为对象，度过余生。一场婚礼已经开始筹办了。两个依旧笨拙的人突然再次卷入匆匆忙忙的日子，请帖、场地、时间、菜品、仪式……某天甚至累到倒头就睡。只是这一切不同于以往一个人的煎熬，我们会微笑着让那个日子走下梦境，提前到来，以及往后的每一刻都——"
