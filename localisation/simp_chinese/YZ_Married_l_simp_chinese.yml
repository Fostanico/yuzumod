 tongyong_event.50183671.a:0 "萝莉控！！！增加电压！！！！"
 tongyong_event.50183671.t:0 "与布良梓的婚礼"
 tongyong_event.50183671.d:0 "“喂……我说，你就是萝莉控吧。”直太看着你的结婚对象说道。\n“我才不是小孩子呢！我是大人！”梓很生气地跳起来打直太的头。\n“乖哦乖哦~不理他，别坏了大好日子的心情。”你揉了揉梓的头，一脸微笑地说道。\n“唔姆……才不想被你这样当小孩子对待呢……”梓很不服气地嘟起了嘴，但也只能嘟起嘴。\n“好啦好啦，你也不是小孩子，我知道的。”你温柔地说道。\n“你不是萝莉控吗！我不是小孩子的话……你不喜欢我了怎么办！”梓突然又说起了跟刚刚完全相反的话。\n“啊嘞？”你有点没听懂梓在说什么，刚刚还在说自己是大人，怎么突然又说自己是小孩子了。\n“你不是你不是……之前说过女生12岁往上都是老女人吗……还亲口承认过自己是萝莉控……”梓很紧张地说道。\n“那个那个……我一直在想我如果不是萝莉了……你会不会就不喜欢我了……”梓有点语无伦次，想到哪说哪。\n“笨蛋，你才不是小孩子呢。”你笑了出来，梓到了结婚前也还是这么可爱。\n“那就是不喜欢我了吗！”梓炸毛了。\n“才不是呢，笨蛋，我不是萝莉控，你也不是萝莉，你是成熟的大人，我喜欢的是成熟的布良梓这个人啊。”你公主抱起了梓，向婚礼殿堂走去。\n“那……不就是合法萝莉吗……”梓小声嘟着嘴说道。\n“合法萝莉……那也是合法的。”\n梓气得用小拳头在你胸口锤了你一下，气鼓鼓地说道："  