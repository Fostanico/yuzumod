#国策
yuzu_independence:0 "独立的柚子之国"
yuzu_independence_desc:0 "柚子之国已经通过穗织、鹫逗、御一夜的少女们起义获得了最初的领土，但与此同时，我们与日本政府的关系已经降至冰点，不过这也是暂时的，很快……很快……我们就不会再受到日本政府的态度影响了……"
yuzu_infiltrate_japan:0 "渗透日本领土"
yuzu_infiltrate_japan_desc:0 "日本长久以来的军国主义荼毒了我们的人民，我们需要以柚子社游戏凝聚人民，对抗日本军国主义"
yuzu_liberate_sea_city:0 "解放海上都市"
yuzu_liberate_sea_city_desc:0 "邪恶的日本政府因为害怕吸血鬼的力量而将他们囚禁在孤岛上，我们应该充分利用吸血鬼们的力量，为我们反抗日本军国主义做出准备"
yuzu_use_demon_power:0 "利用魔王力量"
yuzu_use_demon_power_desc:0 "辉耶和乃爱对魔王之力都很了解，我们可以适当利用魔王的力量来增强我们的实力"
yuzu_unite_astral:0 "团结星幽使"
yuzu_unite_astral_desc:0 "鹫逗有大量的星幽使，他们具有超能力，星幽使对我们来说是很强的助力"
yuzu_borrow_divine_power:0 "借用神力"
yuzu_borrow_divine_power_desc:0 "我们的将领中有很多很多神明，卯之花、乃爱、佐奈、栞那、琉璃……她们能够凝聚很多的神力来帮助我们获得神明的支持，以真正的神明之力来根除那个假借神明之名进行暴政的天皇的统治，让他们知道，神明到底站在谁那一边"
yuzu_cross_tsushima:0 "跨过对马海峡"
yuzu_cross_tsushima_desc:0 "我们不能只将柚子文化局限在我国本土，我们应当对被军国主义荼毒的其他人民也进行文化宣传，让他们也加入我们"
yuzu_stand_in_world:0 "柚子之国，屹立于世"
yuzu_stand_in_world_desc:0 "我们已经解决了军国主义，并且消灭了全亚洲的法西斯余孽，接下来我们该对国内进行一系列稳固措施"
yuzu_overthrow_japan:0 "推翻日本军国主义"
yuzu_overthrow_japan_desc:0 "我们已经做好了对日本军国主义的最后一战，我们将鼓舞全国人民，宣布全国总起义，将日本人民从军国主义中救出来"
