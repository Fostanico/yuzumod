yuzu_divine_power:0 "神明之力"
yuzu_japan_collapse_debuff:0 "军心涣散"
yuzu_post_war_reconstruction:0 "战后重建"
yuzu_eliminate_fascism_buff:0 "对法西斯的最后一战"